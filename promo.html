<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extintores Pro - Seguridad Móvil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Configuración de Tailwind para soportar modo oscuro por clase
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        /* Optimización para evitar parpadeos al cargar en móviles */
        .transition-theme { transition: background-color 0.3s ease, color 0.3s ease; }
        /* Ajuste de tamaño de botones para dedos (Touch Targets) */
        button, input, select { min-height: 44px; }
    </style>
</head>
<body class="transition-theme bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-fuchsia-50 font-sans">

    <header class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-rose-600 flex items-center gap-2">
                <i class="fas fa-fire-extinguisher"></i> EXTIN-PRO
            </h1>
            <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-yellow-400 focus:outline-none" aria-label="Cambiar tema">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10 space-y-16">
        <section class="space-y-6">
            <h2 class="text-3xl font-bold text-center">Guía de Uso Rápido</h2>
            <div class="aspect-video w-full rounded-2xl overflow-hidden shadow-lg border dark:border-slate-700">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/cUY1o6Saoc0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </section>

        <section class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border dark:border-slate-700">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-calculator text-rose-500"></i> Calculadora de Carga
            </h3>
            <div class="space-y-4">
                <input type="number" id="areaInput" placeholder="Metros cuadrados (m²)" class="w-full p-4 rounded-xl border dark:bg-slate-700 dark:border-slate-600 outline-none focus:ring-2 focus:ring-rose-500">
                <select id="riskLevel" class="w-full p-4 rounded-xl border dark:bg-slate-700 dark:border-slate-600 outline-none">
                    <option value="1">Riesgo Bajo</option>
                    <option value="1.5">Riesgo Medio</option>
                    <option value="2">Riesgo Alto</option>
                </select>
                <button onclick="calculate()" class="w-full bg-rose-600 text-white font-bold py-4 rounded-xl active:scale-95 transition-transform">
                    Calcular Ahora
                </button>
                <div id="resultBox" class="mt-4 p-4 text-center rounded-xl bg-gray-50 dark:bg-slate-900/50 min-h-[60px] flex items-center justify-center italic text-gray-500">
                    El resultado aparecerá aquí
                </div>
            </div>
        </section>

        <section class="space-y-4">
            <h3 class="text-xl font-bold text-center">Checklist de Inspección</h3>
            <div class="grid gap-3">
                <label class="flex items-center p-4 bg-white dark:bg-slate-800 rounded-xl border dark:border-slate-700 active:bg-gray-100 dark:active:bg-slate-700 transition">
                    <input type="checkbox" class="w-6 h-6 accent-rose-600">
                    <span class="ml-4 text-sm">Presión en zona verde</span>
                </label>
                <label class="flex items-center p-4 bg-white dark:bg-slate-800 rounded-xl border dark:border-slate-700 active:bg-gray-100 dark:active:bg-slate-700 transition">
                    <input type="checkbox" class="w-6 h-6 accent-rose-600">
                    <span class="ml-4 text-sm">Manguera sin grietas</span>
                </label>
            </div>
        </section>
    </main>

    <script>
        // LÓGICA DE TEMA (CORREGIDA PARA MÓVILES)
        const btn = document.getElementById('themeToggle');
        const docEl = document.documentElement;

        // Función para cambiar el tema
        function toggleTheme() {
            if (docEl.classList.contains('dark')) {
                docEl.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                docEl.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }

        // Event listener para clic y touch (celulares)
        btn.addEventListener('click', toggleTheme);

        // Comprobar preferencia guardada al cargar
        if (localStorage.getItem('color-theme') === 'dark' || 
            (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            docEl.classList.add('dark');
        } else {
            docEl.classList.remove('dark');
        }

        // LÓGICA DEL SIMULADOR
        function calculate() {
            const area = document.getElementById('areaInput').value;
            const risk = document.getElementById('riskLevel').value;
            const res = document.getElementById('resultBox');

            if (area > 0) {
                const total = Math.ceil((area * risk) / 20);
                res.innerHTML = `<b class="text-rose-600 text-lg">Necesitas ${total} extintor(es) de 10lbs</b>`;
                res.classList.remove('italic');
            } else {
                res.innerText = "Ingresa un área válida";
            }
        }
    </script>
</body>
    </html>
