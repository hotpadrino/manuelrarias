<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora Colombia | Inversiones Aripar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        #map { height: 500px; width: 100%; border: 6px solid white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); z-index: 1; }
        .card-ninos { background: white; border-radius: 24px; border: 2px solid #e2e8f0; }
        
        /* Estilos para el Botón de Ayuda y Overlay */
        #ayuda-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        #ayuda-overlay img {
            max-width: 90%;
            max-height: 80%;
            border: 8px solid white;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn-ayuda {
            position: fixed;
            bottom: 100px;
            right: 25px;
            z-index: 500;
            background: #0ea5e9;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-ayuda:hover { transform: scale(1.1); background: #0284c7; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

    <div id="ayuda-overlay" onclick="toggleAyuda()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/07/Mapa_de_Colombia_%28regiones_naturales%29.svg" alt="Mapa Real Colombia">
        <button class="mt-6 bg-white text-slate-900 px-8 py-3 rounded-full font-bold">Cerrar Ayuda</button>
    </div>

    <button class="btn-ayuda" onclick="toggleAyuda()">❓ Ayuda</button>

    <div class="flex-grow p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <header class="text-center mb-10">
                <h1 class="text-4xl font-bold text-sky-600">🇨🇴 Colombia y sus Regiones</h1>
                <p class="text-slate-400 font-medium mt-2 italic">Aprende sobre nuestra geografía de forma divertida</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
                <div class="lg:col-span-7">
                    <div id="map"></div>
                </div>

                <div id="info-section" class="lg:col-span-5 scroll-mt-10">
                    <div id="placeholder" class="h-full min-h-[450px] flex flex-col items-center justify-center card-ninos p-10 text-center border-dashed border-4 border-slate-200">
                        <div class="text-6xl mb-4">🌍</div>
                        <p class="text-xl font-bold text-slate-400">Toca el mapa para explorar</p>
                    </div>

                    <div id="region-card" class="hidden card-ninos p-8 h-full shadow-xl border-b-[12px]">
                        <div class="flex items-center gap-4 mb-6">
                            <span id="reg-emoji" class="text-5xl"></span>
                            <h2 id="reg-name" class="text-3xl font-bold text-slate-800 tracking-tight"></h2>
                        </div>
                        
                        <div class="space-y-4">
                            <div class="bg-blue-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-bold text-blue-400 uppercase">⛰️ Paisaje</p>
                                <p id="reg-relieve" class="text-slate-700"></p>
                            </div>
                            <div class="bg-green-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-bold text-green-400 uppercase">🐾 Naturaleza</p>
                                <p id="reg-bio" class="text-slate-700"></p>
                            </div>
                            <div class="bg-amber-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-bold text-amber-500 uppercase">💰 Economía</p>
                                <p id="reg-eco" class="text-slate-700"></p>
                            </div>
                            <div class="bg-sky-600 p-4 rounded-2xl text-white">
                                <p class="text-sky-200 text-[10px] font-bold uppercase">🏙️ Ciudades Principales</p>
                                <p id="reg-cities" class="text-lg font-bold italic"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-6 text-center text-stone-500 font-light uppercase text-[10px] tracking-[0.2em] flex-shrink-0 border-t border-stone-200 mt-auto bg-white">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 max-w-7xl mx-auto px-4 lg:px-0">
            <p>© 2026 • INVERSIONES ARIPAR • Real Estate Management</p>
            <div class="flex gap-6">
                <a href="https://wa.me/573128816469" class="hover:text-sky-500 transition-colors" target="_blank">WhatsApp</a>
                <a href="mailto:alucard8@gmail.com" class="hover:text-sky-500 transition-colors">Email</a>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    const regiones = [
        {
            name: "Región Andina", emoji: "🏔️", color: "#FF6B6B",
            relieve: "Montañas gigantes de los Andes, valles y muchos nevados fríos.",
            bio: "El majestuoso Cóndor, frailejones en los páramos y mucho café.",
            eco: "Agricultura, fábricas y el corazón del comercio de Colombia.",
            cities: "Bogotá, Medellín, Cali",
            // Ajuste de bordes para cerrar espacios con Pacífico y Amazonía
            coords: [
                [1.25, -76.80], [2.15, -75.60], [3.25, -74.85], [4.25, -74.15], 
                [5.20, -73.20], [6.25, -72.45], [7.15, -72.10], [8.45, -72.45], 
                [9.60, -72.75], [10.60, -72.85], [10.10, -73.50], [9.35, -74.12], 
                [8.60, -74.90], [8.40, -75.80], [8.25, -76.40], [7.55, -77.30], 
                [6.79, -77.10], [4.05, -76.97], [2.37, -78.14], [1.34, -78.58], [1.25, -76.80]
            ]
        },
        {
            name: "Región Caribe", emoji: "🏖️", color: "#FACC15",
            relieve: "Playas hermosas, sol y la Sierra Nevada de Santa Marta.",
            bio: "Flamencos, tortugas marinas y corales bajo el agua.",
            eco: "Turismo, barcos y ganadería.",
            cities: "Barranquilla, Cartagena, Santa Marta",
            coords: [
                [11.8, -71.3], [12.5, -71.7], [11.5, -73], [10.5, -75.5], [9.5, -77], 
                [8.25, -76.40], [8.40, -75.80], [8.60, -74.90], [9.35, -74.12], 
                [10.10, -73.50], [10.60, -72.85], [11.8, -71.3]
            ]
        },
        {
            name: "Región Amazónica", emoji: "🐆", color: "#4ADE80",
            relieve: "Una selva inmensa llena de árboles y ríos gigantes.",
            bio: "Delfín rosado, jaguar y micos saltarines.",
            eco: "Protección del planeta y turismo de naturaleza.",
            cities: "Leticia, Florencia, Mocoa",
            coords: [
                [1.25, -76.80], [2.15, -75.60], [3.25, -74.85], [3, -71.5], [3, -69], 
                [4, -67.5], [1, -67], [-1, -69.5], [-4, -70], [-4, -73], [-2, -75], [1.25, -76.80]
            ]
        },
        {
            name: "Región Pacífica", emoji: "🐋", color: "#60A5FA",
            relieve: "Selvas junto al mar donde llueve mucho y hay playas oscuras.",
            bio: "Ballenas jorobadas saltarinas y ranitas de colores.",
            eco: "Pesca, madera y puertos marítimos.",
            cities: "Quibdó, Buenaventura, Tumaco",
            // Se corrigió para cubrir toda la costa sin cortes
            coords: [
                [1.34, -78.58], [2.37, -78.14], [4.05, -76.97], [6.79, -77.10], 
                [7.55, -77.30], [7.80, -77.80], [6.00, -77.70], [4.00, -77.50], 
                [2.00, -78.80], [1.20, -79.20], [1.34, -78.58]
            ]
        },
        {
            name: "Región Orinoquía", emoji: "🤠", color: "#A3E635",
            relieve: "Llanos interminables donde el horizonte parece no tener fin.",
            bio: "Chigüiros simpáticos, venados y caballos llaneros.",
            eco: "Ganadería y petróleo.",
            cities: "Villavicencio, Yopal, Arauca",
            coords: [
                [7.15, -72.10], [6.00, -67.50], [4.00, -67.50], [3.00, -69.00], [3.00, -71.50], 
                [3.25, -74.85], [4.25, -74.15], [5.20, -73.20], [6.25, -72.45], [7.15, -72.10]
            ]
        },
        {
            name: "Región Insular", emoji: "🏝️", color: "#9b59b6",
            relieve: "Islas pequeñas en el mar con arrecifes de coral muy lindos.",
            bio: "Peces de colores, cangrejos negros y palmeras de coco.",
            eco: "Mucho turismo y personas que vienen a bucear.",
            cities: "San Andrés, Providencia, Santa Catalina",
            // Ampliado para facilitar el clic en el mapa
            coords: [
                [13.5, -82.5], [13.5, -81.0], [12.0, -81.0], [12.0, -82.5], [13.5, -82.5]
            ]
        }
    ];

        const map = L.map('map', { zoomControl: false }).setView([4.5, -74], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        function toggleAyuda() {
            const overlay = document.getElementById('ayuda-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function selectRegion(reg) {
            document.getElementById('placeholder').classList.add('hidden');
            const card = document.getElementById('region-card');
            card.classList.remove('hidden');
            
            document.getElementById('reg-name').innerText = reg.name;
            document.getElementById('reg-emoji').innerText = reg.emoji;
            document.getElementById('reg-relieve').innerText = reg.relieve;
            document.getElementById('reg-bio').innerText = reg.bio;
            document.getElementById('reg-eco').innerText = reg.eco;
            document.getElementById('reg-cities').innerText = reg.cities;
            card.style.borderBottomColor = reg.color;

            document.getElementById('info-section').scrollIntoView({ behavior: 'smooth' });
        }

        regiones.forEach(reg => {
            const poly = L.polygon(reg.coords, {
                color: 'white', weight: 2, fillColor: reg.color, fillOpacity: 0.5
            }).addTo(map);

            poly.on('click', () => selectRegion(reg));
            poly.on('mouseover', () => poly.setStyle({ fillOpacity: 0.8, weight: 4 }));
            poly.on('mouseout', () => poly.setStyle({ fillOpacity: 0.5, weight: 2 }));
        });
    </script>
</body>
</html>
