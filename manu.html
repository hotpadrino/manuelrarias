<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Presentación - Manuel Arias</title>
    <style>
        :root {
            --brand-color: #3467F5;
            --brand-dark: #1A47C4;
            --text-main: #1A202C;
            --text-muted: #4A5568;
            --bg-canvas: #E2E8F0;
            --card-bg: rgba(255, 255, 255, 0.96);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px 120px 10px;
            overflow-y: auto;
            position: relative;
        }

        /* CANVAS INTERACTIVO - Fondo de líneas de alta visibilidad */
        #bg-canvas-interactive {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor adaptativo de la tarjeta */
        .card-wrapper {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(52, 103, 245, 0.15), 0 1px 12px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        /* SECCIÓN ANCLADA SUPERIOR */
        .card-sticky-top {
            position: sticky;
            top: 0;
            background-color: #FFFFFF;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
        }

        .header-viewport {
            width: 100%;
            position: relative;
            background-color: #f7fafc;
            line-height: 0;
        }

        .profile-photo {
            width: 100%;
            height: auto;
            display: block;
        }

        .wave-separator {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            z-index: 2;
            line-height: 0;
        }

        .wave-separator svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* CONTENEDOR DE IDENTIDAD BLANCO (Incluye el badge reubicado) */
        .identity-container-white {
            position: relative;
            padding-top: 1px; /* Previene colapso de márgenes */
        }

        /* BADGE REUBICADO: Flotando exactamente sobre el espacio blanco inferior */
        .logo-badge {
            position: absolute;
            top: 0;
            right: 24px;
            transform: translateY(-65%); /* Empuja el badge hacia el espacio blanco cortando la onda */
            width: 75px;
            height: 75px;
            background: #ffffff;
            border-radius: 50%;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .identity-section {
            padding: 15px 24px 18px 24px;
            border-left: 4px solid var(--brand-color);
            margin: 25px 24px 12px 24px; /* Margen superior adaptado para dar aire al badge */
        }

        .full-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .job-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .tags-skills {
            font-size: 14px;
            font-weight: 700;
            color: var(--brand-color);
            margin-bottom: 4px;
        }

        .company-name {
            font-size: 14px;
            font-style: italic;
            color: var(--text-muted);
        }

        /* SECCIÓN DESLIZABLE DE ENLACES */
        .links-body {
            padding: 20px 24px 30px 24px;
            position: relative;
            z-index: 5;
        }

        .links-list {
            list-style: none;
        }

        .links-list li {
            margin-bottom: 12px;
        }

        .link-row {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background-color: rgba(247, 250, 252, 0.85);
            border: 1px solid #CBD5E0;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-row:hover {
            background-color: rgba(237, 242, 247, 1);
            border-color: var(--brand-color);
            transform: translateY(-1px);
        }

        .icon-circle {
            width: 38px;
            height: 38px;
            background-color: var(--brand-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .icon-circle svg {
            width: 18px;
            height: 18px;
            fill: #FFFFFF;
        }

        .link-label {
            font-size: 15px;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* FOOTER GLOBAL PERSISTENTE CON BOTÓN DE ACCIÓN */
        .global-floating-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(226,232,240,1) 75%, rgba(226,232,240,0));
            padding: 24px 20px;
            z-index: 999;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .vcf-download-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 420px;
            background-color: var(--brand-color);
            color: #FFFFFF;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(52, 103, 245, 0.45);
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            pointer-events: auto;
        }

        .vcf-download-btn:hover {
            background-color: var(--brand-dark);
            box-shadow: 0 12px 28px rgba(52, 103, 245, 0.55);
        }

        .vcf-download-btn:active {
            transform: scale(0.98);
        }

        .vcf-download-btn svg {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            fill: currentcolor;
        }
    </style>
</head>

    <!-- Script del Fondo de Nodos Interactivos -->
    <script>
        const canvas = document.getElementById('bg-canvas-interactive');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 40;
        const connectionDistance = 140;
        
        let mouse = {
            x: null,
            y: null,
            radius: 220
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 3 + 1.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.x -= (dx / dist) * force * 0.5;
                        this.y -= (dy / dist) * force * 0.5;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(52, 103, 245, 0.6)';
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDistance) {
                        let alpha = (connectionDistance - dist) / connectionDistance * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(52, 103, 245, ${alpha})`;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                    }
                }

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = particles[i].x - mouse.x;
                    let dy = particles[i].y - mouse.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        let alpha = (mouse.radius - dist) / mouse.radius * 0.45;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = `rgba(52, 103, 245, ${alpha})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
