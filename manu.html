<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3467F5">
    <title>Tarjeta de Presentación - Manuel Arias</title>
    <style>
        :root {
            --brand-color: #3467F5;
            --brand-dark: #1A47C4;
            --brand-glow: rgba(52, 103, 245, 0.45);
            --text-main: #1A202C;
            --text-muted: #4A5568;
            --bg-canvas: #E2E8F0;
            --card-bg: rgba(255, 255, 255, 0.96);
            --success: #22A366;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px calc(120px + env(safe-area-inset-bottom, 0px)) 10px;
            overflow-y: auto;
            position: relative;
        }

        #bg-canvas-interactive {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .card-wrapper {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(52, 103, 245, 0.15), 0 1px 12px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        .card-sticky-top {
            position: sticky;
            top: 0;
            background-color: #FFFFFF;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
        }

        .header-viewport {
            width: 100%;
            position: relative;
            background-color: #f7fafc;
            line-height: 0;
        }

        .profile-photo {
            width: 100%;
            height: auto;
            display: block;
        }

        .wave-separator {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            z-index: 2;
            line-height: 0;
        }

        .wave-separator svg {
            display: block;
            width: 100%;
            height: auto;
        }

        .identity-container-white {
            position: relative;
            padding-top: 1px;
        }

        .logo-badge {
            position: absolute;
            top: 0;
            right: 24px;
            transform: translateY(-65%);
            width: 75px;
            height: 75px;
            background: #ffffff;
            border-radius: 50%;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .identity-section {
            padding: 15px 24px 18px 24px;
            border-left: 4px solid var(--brand-color);
            margin: 25px 24px 12px 24px;
        }

        .full-name {
            font-size: clamp(22px, 6vw, 26px);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .job-title {
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .tags-skills {
            font-size: 14px;
            font-weight: 700;
            color: var(--brand-color);
            margin-bottom: 4px;
        }

        .company-name {
            font-size: 14px;
            font-style: italic;
            color: var(--text-muted);
        }

        .links-body {
            padding: 20px 24px 30px 24px;
            position: relative;
            z-index: 5;
        }

        .links-list {
            list-style: none;
        }

        .links-list li {
            margin-bottom: 12px;
        }

        .link-row {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background-color: rgba(247, 250, 252, 0.85);
            border: 1px solid #CBD5E0;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-row:hover {
            background-color: rgba(237, 242, 247, 1);
            border-color: var(--brand-color);
            transform: translateY(-1px);
        }

        .link-row:focus-visible {
            outline: 2px solid var(--brand-color);
            outline-offset: 2px;
        }

        .icon-circle {
            width: 38px;
            height: 38px;
            background-color: var(--brand-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .icon-circle svg {
            width: 18px;
            height: 18px;
            fill: #FFFFFF;
        }

        .link-label {
            font-size: 15px;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* FOOTER FIJO CON BOTÓN DE DESCARGA */
        .global-floating-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(226,232,240,1) 75%, rgba(226,232,240,0));
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 999;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .vcf-btn-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            pointer-events: auto;
        }

        .vcf-download-btn {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: var(--brand-color);
            color: #FFFFFF;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 10px 25px var(--brand-glow);
            transition: background-color 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
            overflow: visible;
        }

        .vcf-download-btn:hover {
            background-color: var(--brand-dark);
            box-shadow: 0 12px 28px rgba(52, 103, 245, 0.55);
        }

        .vcf-download-btn:active {
            transform: scale(0.97);
        }

        .vcf-download-btn:focus-visible {
            outline: 3px solid #ffffff;
            outline-offset: 3px;
        }

        .vcf-download-btn.is-success {
            background-color: var(--success);
            box-shadow: 0 10px 25px rgba(34, 163, 102, 0.45);
        }

        .vcf-download-btn.is-loading {
            opacity: 0.85;
            cursor: wait;
        }

        .vcf-download-btn.is-loading .icon-download {
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vcf-download-btn svg {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            fill: currentcolor;
            flex-shrink: 0;
        }

        .btn-icon-wrap {
            display: inline-flex;
            width: 18px;
            height: 18px;
            margin-right: 10px;
            position: relative;
        }
        .btn-icon-wrap svg {
            position: absolute;
            top: 0; left: 0;
            margin: 0;
            transition: opacity .2s ease, transform .3s cubic-bezier(.34,1.56,.64,1);
        }
        .icon-download { opacity: 1; transform: scale(1) rotate(0deg); }
        .icon-check { opacity: 0; transform: scale(0.3) rotate(-45deg); }
        .vcf-download-btn.is-success .icon-download { opacity: 0; transform: scale(0.3) rotate(45deg); }
        .vcf-download-btn.is-success .icon-check { opacity: 1; transform: scale(1) rotate(0deg); }

        .btn-label-swap {
            position: relative;
            display: inline-block;
            height: 20px;
            overflow: hidden;
        }
        .btn-label-swap span {
            display: block;
            transition: transform .35s cubic-bezier(.4,0,.2,1);
        }
        .vcf-download-btn.is-success .btn-label-swap span {
            transform: translateY(-20px);
        }
        .label-default, .label-success { height: 20px; line-height: 20px; }

        /* Chispas / confeti al descargar */
        .spark {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--brand-color);
            pointer-events: none;
            opacity: 1;
            animation: spark-fly 700ms ease-out forwards;
        }

        @keyframes spark-fly {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0.3);
            }
        }

        .pulse-ring {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            border: 2px solid var(--success);
            opacity: 0.8;
            pointer-events: none;
            animation: pulse-out 600ms ease-out forwards;
        }

        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            #bg-canvas-interactive { display: none; }
            .spark, .pulse-ring { animation: none; display: none; }
            .vcf-download-btn, .btn-icon-wrap svg, .btn-label-swap span {
                transition: none;
            }
            .vcf-download-btn.is-loading .icon-download {
                animation: none;
            }
        }
    </style>
</head>

    <script>
        // ---------- Generación dinámica del vCard (reemplaza el base64 roto) ----------
        const PHOTO_URL = "https://cdn.hihello.me/o/96031f33-21af-4af4-9ead-a07f153a1241.png";

        // Pliegue de líneas según el estándar vCard (máx. 75 octetos por línea,
        // continuación con un espacio al inicio). Necesario sobre todo para PHOTO en base64.
        function foldLine(line) {
            const maxLen = 75;
            if (line.length <= maxLen) return line;
            let out = line.slice(0, maxLen);
            let rest = line.slice(maxLen);
            while (rest.length > 0) {
                out += "\r\n " + rest.slice(0, maxLen - 1);
                rest = rest.slice(maxLen - 1);
            }
            return out;
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        // Intenta embeber la foto en base64 (funciona en iOS/Android/desktop).
        // Si el CDN bloquea CORS, cae a PHOTO por URL (funciona en Android/desktop, no en iOS).
        async function getPhotoLine() {
            try {
                const res = await fetch(PHOTO_URL, { mode: "cors" });
                if (!res.ok) throw new Error("respuesta no válida");
                const blob = await res.blob();
                const dataUrl = await blobToBase64(blob);
                const base64Data = dataUrl.split(",")[1];
                const type = blob.type.includes("jpeg") ? "JPEG" : "PNG";
                return foldLine(`PHOTO;ENCODING=b;TYPE=${type}:${base64Data}`);
            } catch (e) {
                console.warn("No se pudo embeber la foto en base64, se usará enlace URI:", e);
                return `PHOTO;VALUE=URI:${PHOTO_URL}`;
            }
        }

        async function buildVCF() {
            const photoLine = await getPhotoLine();
            const lines = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "FN:Manuel Arias",
                "N:Arias;Manuel;;;",
                "ORG:Soluciones Aeronáuticas",
                "TITLE:Ingeniero Electrónico",
                "NOTE:Programador, Inteligencia Artificial, Diseño Web",
                "EMAIL;TYPE=INTERNET,WORK:alucard8@gmail.com",
                "TEL;TYPE=CELL,VOICE,TEXT:+573128816469",
                "URL;TYPE=Website:https://hotpadrino.github.io/manuelrarias/",
                "URL;TYPE=LinkedIn:https://www.linkedin.com/in/manuel-arias-6a292962/",
                "URL;TYPE=Airbnb:https://www.airbnb.com.co/users/show/1144128",
                "URL;TYPE=Padlet:https://padlet.com/manuelrarias/",
                photoLine,
                "END:VCARD"
            ];
            return lines.join("\r\n");
        }

        async function triggerVCFDownload() {
            const vcfText = await buildVCF();
            const blob = new Blob([vcfText], { type: "text/vcard;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "manuel-arias.vcf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        // ---------- Decoración al descargar: chispas + anillo de pulso + botón en modo éxito ----------
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function launchSparks(wrapper) {
            if (reduceMotion) return;
            const colors = ['#3467F5', '#22A366', '#1A47C4'];
            const count = 14;
            for (let i = 0; i < count; i++) {
                const spark = document.createElement('span');
                spark.className = 'spark';
                const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.4 - 0.2);
                const distance = 60 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance * 0.6 - 20;
                spark.style.setProperty('--tx', tx + 'px');
                spark.style.setProperty('--ty', ty + 'px');
                spark.style.background = colors[i % colors.length];
                wrapper.appendChild(spark);
                spark.addEventListener('animationend', () => spark.remove());
            }
            const ring = document.createElement('span');
            ring.className = 'pulse-ring';
            wrapper.appendChild(ring);
            ring.addEventListener('animationend', () => ring.remove());
        }

        let downloadTimer = null;
        async function handleDownload() {
            const btn = document.getElementById('vcfBtn');
            const wrapper = document.getElementById('btnWrapper');

            btn.classList.add('is-loading');
            btn.disabled = true;

            await triggerVCFDownload();

            btn.classList.remove('is-loading');
            btn.disabled = false;

            launchSparks(wrapper);
            btn.classList.add('is-success');

            if (navigator.vibrate) navigator.vibrate(15);

            clearTimeout(downloadTimer);
            downloadTimer = setTimeout(() => {
                btn.classList.remove('is-success');
            }, 2000);
        }
    </script>

    <script>
        // ---------- Fondo de partículas (optimizado: se pausa oculto/reduced-motion, escala con el viewport) ----------
        const canvas = document.getElementById('bg-canvas-interactive');
        const reduceMotionBg = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!reduceMotionBg && canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            const isSmall = window.innerWidth < 600;
            const particleCount = isSmall ? 20 : 40;
            const connectionDistance = isSmall ? 100 : 140;

            let mouse = { x: null, y: null, radius: 220 };
            let running = true;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseleave', () => {
                mouse.x = null;
                mouse.y = null;
            });

            document.addEventListener('visibilitychange', () => {
                running = !document.hidden;
                if (running) requestAnimationFrame(animate);
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.8;
                    this.size = Math.random() * 3 + 1.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                    if (mouse.x !== null && mouse.y !== null) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < mouse.radius) {
                            let force = (mouse.radius - dist) / mouse.radius;
                            this.x -= (dx / dist) * force * 0.5;
                            this.y -= (dy / dist) * force * 0.5;
                        }
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(52, 103, 245, 0.6)';
                    ctx.fill();
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            }

            function animate() {
                if (!running) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        let dx = particles[i].x - particles[j].x;
                        let dy = particles[i].y - particles[j].y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < connectionDistance) {
                            let alpha = (connectionDistance - dist) / connectionDistance * 0.5;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(52, 103, 245, ${alpha})`;
                            ctx.lineWidth = 1.2;
                            ctx.stroke();
                        }
                    }
                    if (mouse.x !== null && mouse.y !== null) {
                        let dx = particles[i].x - mouse.x;
                        let dy = particles[i].y - mouse.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < mouse.radius) {
                            let alpha = (mouse.radius - dist) / mouse.radius * 0.45;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.strokeStyle = `rgba(52, 103, 245, ${alpha})`;
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }

            init();
            animate();
        }
    </script>
</body>
