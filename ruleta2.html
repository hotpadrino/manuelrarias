<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEO MÁXIMO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --gold2: #e8a020;
    --bg: #080b14;
    --surface: #0d1220;
    --surface2: #111827;
    --text: #e8eaf0;
    --muted: #4a5568;
    --red: #ff3860;
    --cyan: #00e5ff;
    --purple: #b44fff;
    --green: #00ff88;
    --glow-gold: 0 0 20px rgba(245,200,66,0.6), 0 0 60px rgba(245,200,66,0.2);
    --glow-cyan: 0 0 20px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.15);
    --glow-red: 0 0 30px rgba(255,56,96,0.8), 0 0 80px rgba(255,56,96,0.3);
  }

  /* ── LIGHT THEME ── */
  body.light {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --text: #1a1f2e;
    --muted: #8892a4;
    --gold: #c8960a;
    --gold2: #a07208;
  }

  body.light .wheel {
    box-shadow: 0 0 0 6px #f0f2f8, 0 0 0 8px rgba(200,150,10,0.3), 0 0 40px rgba(0,0,0,0.15);
  }

  body.light textarea {
    background: rgba(0,0,0,0.04);
    border-color: rgba(0,0,0,0.1);
  }

  body.light .display-screen {
    background: #1a1f2e;
  }

  body.light body::after {
    background: none;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }

  /* ── CANVAS DE PARTÍCULAS ── */
  #particle-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── SCANLINES ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 999;
  }

  /* ── LAYOUT ── */
  .shell {
    position: relative; z-index: 1;
    max-width: 1180px; margin: 0 auto;
    padding: 24px 20px 40px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 28px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 20px 0 0;
  }

  .title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(52px, 10vw, 100px);
    letter-spacing: 8px;
    line-height: 1;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 40%, var(--gold2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 24px rgba(245,200,66,0.55));
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 20px rgba(245,200,66,0.5)); }
    50%      { filter: drop-shadow(0 0 40px rgba(245,200,66,0.9)); }
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 6px;
    color: var(--muted); text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* ── CARDS ── */
  .card {
    background: linear-gradient(145deg, var(--surface), var(--surface2));
    border-radius: 20px;
    border: 1px solid rgba(245,200,66,0.15);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(245,200,66,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .card-label {
    font-size: 9px; letter-spacing: 4px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .card-label::before {
    content: '';
    width: 20px; height: 1px;
    background: var(--gold);
    display: inline-block;
  }

  /* ── TEXTAREA ── */
  textarea {
    width: 100%;
    min-height: 220px;
    background: rgba(0,0,0,0.4);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    outline: none;
    resize: vertical;
    transition: border-color 0.3s;
  }

  textarea:focus { border-color: rgba(245,200,66,0.4); }

  textarea.hidden { display: none; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin: 12px 0;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-val { color: var(--gold); font-weight: 700; }

  /* ── BUTTONS ── */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  .btn {
    border: none; border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #080b14;
    box-shadow: 0 4px 20px rgba(245,200,66,0.35);
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--glow-gold); }
  .btn-primary:disabled { background: #2a2a3a; color: #444; box-shadow: none; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(255,56,96,0.3);
  }

  .btn-danger:hover { background: rgba(255,56,96,0.1); border-color: var(--red); }

  /* ── WHEEL CARD ── */
  .wheel-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── WHEEL ── */
  .wheel-wrap {
    position: relative;
    width: 300px; height: 300px;
  }

  .wheel-outer {
    position: absolute; inset: -12px;
    border-radius: 50%;
    border: 2px solid rgba(245,200,66,0.25);
    animation: outerRotate 8s linear infinite;
  }

  @keyframes outerRotate { to { transform: rotate(360deg); } }

  .wheel-outer::before {
    content: '';
    position: absolute; inset: 4px;
    border-radius: 50%;
    border: 1px dashed rgba(245,200,66,0.12);
  }

  /* Dots on outer ring */
  .wheel-outer::after {
    content: '';
    position: absolute;
    top: 6px; left: 50%;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: var(--glow-gold);
  }

  .wheel {
    width: 300px; height: 300px;
    border-radius: 50%;
    position: absolute;
    background: conic-gradient(
      #8b1a2e 0deg 60deg,
      #1a3d8b 60deg 120deg,
      #1a7a3d 120deg 180deg,
      #7a4a1a 180deg 240deg,
      #5a1a8b 240deg 300deg,
      #1a6b7a 300deg 360deg
    );
    transition: transform 5s cubic-bezier(0.08, 0, 0.1, 1);
    box-shadow: 0 0 0 6px #0d1220, 0 0 0 8px rgba(245,200,66,0.3), 0 0 40px rgba(0,0,0,0.8);
  }

  /* Wheel lines */
  .wheel::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      linear-gradient(0deg, transparent 49%, rgba(0,0,0,0.5) 49%, rgba(0,0,0,0.5) 51%, transparent 51%),
      linear-gradient(60deg, transparent 49%, rgba(0,0,0,0.5) 49%, rgba(0,0,0,0.5) 51%, transparent 51%),
      linear-gradient(120deg, transparent 49%, rgba(0,0,0,0.5) 49%, rgba(0,0,0,0.5) 51%, transparent 51%);
  }

  /* Center hub — now replaced by real button, keep ::after as fallback ring */
  .wheel::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
  }

  /* Hub spin button */
  .hub-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 62px; height: 62px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff9e0, var(--gold) 60%, var(--gold2));
    border: 3px solid rgba(255,255,255,0.35);
    box-shadow: 0 0 0 4px rgba(0,0,0,0.5), 0 0 18px rgba(245,200,66,0.7), inset 0 2px 4px rgba(255,255,255,0.4);
    cursor: pointer;
    z-index: 20;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .hub-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 0 4px rgba(0,0,0,0.5), 0 0 32px rgba(245,200,66,1), inset 0 2px 4px rgba(255,255,255,0.4);
  }

  .hub-btn:active {
    transform: translate(-50%, -50%) scale(0.95);
  }

  .hub-btn.spinning-hub {
    animation: hubSpin 0.4s linear infinite;
  }

  @keyframes hubSpin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* Theme toggle button */
  .theme-btn {
    position: fixed; top: 16px; right: 16px;
    z-index: 1000;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(245,200,66,0.25);
    color: var(--gold);
    border-radius: 50px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }

  .theme-btn:hover {
    background: rgba(245,200,66,0.12);
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .theme-btn .theme-icon { font-size: 14px; }

  /* Pointer arrow */
  .pointer {
    position: absolute;
    top: -20px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    filter: drop-shadow(0 0 8px var(--red));
  }

  .pointer svg { display: block; }

  /* ── DISPLAY SCREEN ── */
  .display-screen {
    width: 100%;
    background: #000;
    border-radius: 14px;
    border: 1px solid rgba(0,229,255,0.2);
    padding: 20px 24px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(0,229,255,0.08);
    position: relative;
    overflow: hidden;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .display-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,229,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .display-label {
    font-size: 9px; letter-spacing: 4px;
    color: rgba(0,229,255,0.4);
    text-transform: uppercase;
    position: absolute; top: 8px; left: 16px;
  }

  .display-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,229,255,0.8), 0 0 40px rgba(0,229,255,0.4);
    transition: all 0.05s;
    text-align: center;
    line-height: 1;
  }

  .display-name.winner-glow {
    color: var(--gold);
    text-shadow: 0 0 20px rgba(245,200,66,1), 0 0 60px rgba(245,200,66,0.6);
    animation: winnerPulse 0.5s ease-in-out 4;
  }

  @keyframes winnerPulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  .display-result {
    font-size: 11px; letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
    text-transform: uppercase;
    height: 16px;
    transition: opacity 0.3s;
  }

  /* ── WINNERS ── */
  .winners-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center;
  }

  .winner-chip {
    background: rgba(245,200,66,0.06);
    border: 1px solid rgba(245,200,66,0.2);
    color: var(--gold);
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; letter-spacing: 1px;
    animation: chipIn 0.3s ease-out;
  }

  @keyframes chipIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── SPIN OVERLAY (full screen flash) ── */
  #flash-overlay {
    position: fixed; inset: 0;
    background: var(--gold);
    opacity: 0; pointer-events: none;
    z-index: 9998;
    mix-blend-mode: overlay;
    transition: opacity 0.05s;
  }

  /* ── CONFETTI ── */
  #confetti-layer {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9997;
    overflow: hidden;
  }

  /* ── SHORTCUT HINT ── */
  .hint {
    font-size: 10px; letter-spacing: 2px;
    color: var(--muted); text-align: center;
    padding-top: 4px;
  }

  .hint kbd {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; padding: 1px 6px;
    font-family: inherit; font-size: 10px;
  }

  /* ── SPINNING STATE ── */
  body.spinning .wheel-outer { animation: outerRotate 0.6s linear infinite; }

  /* ── LOADING BAR ── */
  .progress-bar {
    width: 100%; height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--cyan), var(--purple), var(--gold));
    border-radius: 2px;
    transition: width linear;
  }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div id="flash-overlay"></div>
<div id="confetti-layer"></div>

<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
  <span class="theme-icon">🌙</span> <span id="themeTxt">OSCURO</span>
</button>

<div class="shell">
  <header>
    <div class="title">SORTEO</div>
    <div class="subtitle">Sistema de selección aleatoria · v2.0</div>
  </header>

  <div class="main-grid">
    <!-- LEFT: Input -->
    <div class="card">
      <div class="card-label">Participantes</div>

      <textarea id="namesList" placeholder="Un nombre por línea...&#10;Jugador 1&#10;Jugador 2&#10;..."></textarea>

      <div class="stats-bar">
        <div class="stat">TOTAL <span class="stat-val" id="statTotal">0</span></div>
        <div class="stat" style="margin-left: auto;">
          <span style="font-size:9px">↑ UN NOMBRE · UNA LÍNEA</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="spinBtn" onclick="startSpin()">▶ GIRAR</button>
        <button class="btn btn-ghost"   id="stopBtn" onclick="stopSpin()" disabled>■ DETENER</button>
        <button class="btn btn-ghost"   onclick="toggleList()">◎ LISTA</button>
        <button class="btn btn-danger"  onclick="clearAll()">✕ LIMPIAR</button>
      </div>

      <div class="hint" style="margin-top:14px">
        <kbd>ESPACIO</kbd> · <kbd>ENTER</kbd> · o click en <kbd>▶ GIRAR</kbd>
      </div>
    </div>

    <!-- RIGHT: Wheel + screen -->
    <div class="card wheel-card">
      <div class="card-label">Ruleta</div>

      <div class="wheel-wrap">
        <div class="wheel-outer" id="wheelOuter"></div>
        <div class="wheel" id="ruleta"></div>
        <button class="hub-btn" id="hubBtn" onclick="isSpinning ? stopSpin() : startSpin()" title="Girar / Detener">✦</button>
        <div class="pointer">
          <svg width="28" height="38" viewBox="0 0 28 38">
            <polygon points="14,38 0,0 28,0" fill="#ff3860"/>
            <polygon points="14,32 4,4 24,4" fill="#ff6080"/>
          </svg>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="display-screen">
        <div class="display-label">En sorteo</div>
        <div class="display-name" id="spinningNames">LISTO</div>
        <div class="display-result" id="result"></div>
      </div>

      <div>
        <div style="font-size:9px;letter-spacing:3px;color:var(--muted);text-align:center;margin-bottom:10px;">— ÚLTIMOS GANADORES —</div>
        <div class="winners-row" id="lastWinners"></div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ─── STATE ─── */
  let names = [], eligible = [];
  let isSpinning = false;
  let spinInterval = null, autoTimer = null;
  let currentRotation = 0;
  let winners = [];
  let currentPool = [];

  /* ─── INIT ─── */
  window.onload = () => {
    const ta = document.getElementById('namesList');
    if (!ta.value.trim()) {
      ta.value = Array.from({length:10},(_,i)=>`Jugador ${i+1}`).join('\n');
    }
    updateStats();
    loadWinners();
    ta.addEventListener('input', updateStats);
    initParticles();
  };

  /* ─── STATS — mode secret: names ending with a literal space char ─── */
  function updateStats() {
    const text = document.getElementById('namesList').value;
    names    = text.split('\n').filter(n => n.trim() !== '');
    eligible = text.split('\n').filter(n => n.endsWith(' ') && n.trim() !== '');
    document.getElementById('statTotal').textContent = names.length;
  }

  /* ─── THEME ─── */
  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    document.getElementById('themeBtn').innerHTML =
      isLight
        ? '<span class="theme-icon">☀️</span> <span id="themeTxt">CLARO</span>'
        : '<span class="theme-icon">🌙</span> <span id="themeTxt">OSCURO</span>';
  }

  /* ─── SPIN ─── */
  function startSpin() {
    if (isSpinning || names.length === 0) return;

    // SECRET MODE: if there are eligible names (ending with space), use only those
    currentPool = eligible.length > 0 ? eligible : names;

    isSpinning = true;
    document.body.classList.add('spinning');
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('result').textContent = '';
    document.getElementById('spinningNames').classList.remove('winner-glow');
    document.getElementById('hubBtn').classList.add('spinning-hub');
    document.getElementById('hubBtn').textContent = '■';

    // Wheel animation
    const extraSpins = 6 + Math.random() * 6;
    currentRotation += extraSpins * 360;
    document.getElementById('ruleta').style.transform = `rotate(${currentRotation}deg)`;

    // Progress bar
    const fill = document.getElementById('progressFill');
    fill.style.transition = 'none'; fill.style.width = '0%';
    requestAnimationFrame(() => {
      fill.style.transition = 'width 5s linear';
      fill.style.width = '100%';
    });

    // Name ticker — always shows ALL names (not the secret pool)
    spinInterval = setInterval(() => {
      const rnd = names[Math.floor(Math.random() * names.length)];
      const el = document.getElementById('spinningNames');
      el.textContent = rnd.trim();
    }, 80);

    autoTimer = setTimeout(stopSpin, 5000);
  }

  function stopSpin() {
    if (!isSpinning) return;
    clearInterval(spinInterval);
    clearTimeout(autoTimer);

    const winner = currentPool[Math.floor(Math.random() * currentPool.length)].trim();

    const nameEl = document.getElementById('spinningNames');
    nameEl.textContent = winner;
    nameEl.classList.add('winner-glow');
    document.getElementById('result').textContent = `✦ ${winner.toUpperCase()} HA GANADO ✦`;

    // Reset progress bar
    const fill = document.getElementById('progressFill');
    fill.style.transition = 'none'; fill.style.width = '0%';

    addWinner(winner);
    doFlash();
    launchConfetti();

    isSpinning = false;
    document.body.classList.remove('spinning');
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('hubBtn').classList.remove('spinning-hub');
    document.getElementById('hubBtn').textContent = '✦';
  }

  /* ─── WINNERS ─── */
  function addWinner(name) {
    winners.unshift(name);
    winners = winners.slice(0, 5);
    try { localStorage.setItem('sorteoWinners', JSON.stringify(winners)); } catch(e){}
    renderWinners();
  }

  function renderWinners() {
    document.getElementById('lastWinners').innerHTML =
      winners.map(w => `<div class="winner-chip">✦ ${w}</div>`).join('');
  }

  function loadWinners() {
    try {
      const s = localStorage.getItem('sorteoWinners');
      if (s) { winners = JSON.parse(s); renderWinners(); }
    } catch(e){}
  }

  /* ─── UI HELPERS ─── */
  function clearAll() {
    document.getElementById('namesList').value = '';
    winners = [];
    try { localStorage.removeItem('sorteoWinners'); } catch(e){}
    renderWinners();
    updateStats();
    document.getElementById('spinningNames').textContent = 'LISTO';
    document.getElementById('result').textContent = '';
  }

  function toggleList() {
    document.getElementById('namesList').classList.toggle('hidden');
  }

  /* ─── KEYBOARD ─── */
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      isSpinning ? stopSpin() : startSpin();
    }
  });

  /* ─── FLASH EFFECT ─── */
  function doFlash() {
    const el = document.getElementById('flash-overlay');
    el.style.opacity = '0.6';
    setTimeout(() => { el.style.opacity = '0'; }, 120);
  }

  /* ─── CONFETTI ─── */
  function launchConfetti() {
    const layer = document.getElementById('confetti-layer');
    layer.innerHTML = '';
    const shapes = ['✦','✧','◆','◇','★','✿','●','■'];
    const colors = ['#f5c842','#ff3860','#00e5ff','#b44fff','#00ff88','#fff'];

    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      const shape = shapes[Math.floor(Math.random()*shapes.length)];
      const color = colors[Math.floor(Math.random()*colors.length)];
      const x = Math.random() * 100;
      const size = 12 + Math.random() * 16;
      const duration = 1.2 + Math.random() * 1.5;
      const delay = Math.random() * 0.6;
      const drift = (Math.random() - 0.5) * 200;

      s.textContent = shape;
      s.style.cssText = `
        position: absolute;
        left: ${x}%;
        top: -30px;
        font-size: ${size}px;
        color: ${color};
        text-shadow: 0 0 10px ${color};
        animation: confettiFall ${duration}s ${delay}s ease-in forwards;
        --drift: ${drift}px;
      `;
      layer.appendChild(s);
    }

    // Inject keyframe once
    if (!document.getElementById('confettiKF')) {
      const st = document.createElement('style');
      st.id = 'confettiKF';
      st.textContent = `
        @keyframes confettiFall {
          0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:1; }
          100% { transform: translateY(100vh) translateX(var(--drift)) rotate(720deg); opacity:0; }
        }
      `;
      document.head.appendChild(st);
    }

    setTimeout(() => layer.innerHTML = '', 3000);
  }

  /* ─── PARTICLE BACKGROUND ─── */
  function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = 0.5 + Math.random() * 1.2;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = -0.1 - Math.random() * 0.3;
        this.alpha = 0.1 + Math.random() * 0.35;
        const c = [
          [245,200,66],
          [0,229,255],
          [180,79,255],
          [0,255,136]
        ][Math.floor(Math.random()*4)];
        this.color = `rgba(${c[0]},${c[1]},${c[2]},`;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.y < -10 || this.x < -10 || this.x > W+10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.color + this.alpha + ')';
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    (function loop() {
      ctx.clearRect(0,0,W,H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    })();
  }
</script>
