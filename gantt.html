<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gantt Pro - Cronogramas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; overflow: hidden; background-color: #f8fafc; margin: 0; }
        
        :root {
            --header-h: 90px;
            --row-h: 48px;
        }

        .gantt-scroll::-webkit-scrollbar { width: 4px; height: 6px; }
        .gantt-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .row-h { 
            height: var(--row-h); 
            min-height: var(--row-h); 
            max-height: var(--row-h);
            display: flex; 
            align-items: center; 
        }
        .header-total-h { height: var(--header-h); min-height: var(--header-h); }

        #today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #f43f5e; z-index: 10; pointer-events: none; }
        #today-label { position: absolute; top: 0; transform: translateX(-50%); background: #f43f5e; color: white; font-size: 8px; padding: 2px 4px; border-radius: 0 0 4px 4px; font-weight: bold; }

        /* Corrección de scroll en barra lateral */
        #task-list {
            overflow-y: hidden; /* Sincronizado por JS con el cronograma */
        }

        @media (max-width: 768px) {
            #task-sidebar { 
                position: absolute; left: -280px; z-index: 50; 
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                width: 280px; height: 100%; box-shadow: 10px 0 15px -3px rgba(0,0,0,0.1);
            }
            #task-sidebar.open { left: 0; }
        }
    </style>
</head>
<body class="p-1 sm:p-4 flex flex-col">

    <div id="detail-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 border border-slate-100">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modal-title" class="text-xs font-black text-slate-900 uppercase">Detalles</h3>
                <button onclick="closeModal()" class="text-slate-400 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-content" class="text-xs space-y-3">
                <p><b class="text-slate-400">ID:</b> <span id="m-id" class="font-bold text-rose-500"></span></p>
                <p><b class="text-slate-400">Responsable:</b> <span id="m-owner"></span></p>
                <p><b class="text-slate-400">Periodo:</b> <span id="m-period"></span></p>
                <div class="bg-slate-50 p-4 rounded-xl italic text-slate-600 border border-slate-100 min-h-[80px]" id="m-obs"></div>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold text-[10px] uppercase">Cerrar</button>
        </div>
    </div>

    <div class="flex-grow flex flex-col bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden relative">
        <div class="p-3 sm:p-4 border-b border-slate-200 flex flex-wrap items-center justify-between gap-2 bg-white z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl border border-slate-200 text-slate-500"><i class="fas fa-bars"></i></button>
                <div>
                    <h2 class="text-[8px] sm:text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Gantt Enterprise</h2>
                    <p class="text-[9px] sm:text-[10px] font-bold text-slate-800">Visualizador de cronogramas con barras</p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200 scale-90 sm:scale-100">
                    <button onclick="setViewMode('days')" id="btn-days" class="px-3 py-1 text-[8px] font-bold uppercase rounded-lg transition">Días</button>
                    <button onclick="setViewMode('weeks')" id="btn-weeks" class="px-3 py-1 text-[8px] font-bold uppercase rounded-lg transition">Semanas</button>
                    <button onclick="setViewMode('months')" id="btn-months" class="px-3 py-1 text-[8px] font-bold uppercase rounded-lg transition">Meses</button>
                </div>

                <div class="relative">
                    <button onclick="document.getElementById('drop-menu').classList.toggle('hidden')" class="h-9 px-3 bg-slate-50 text-slate-700 text-[9px] font-bold rounded-xl border border-slate-200 flex items-center gap-2">
                        <i class="fas fa-database text-rose-500"></i> DATOS
                    </button>
                    <div id="drop-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-slate-100 z-[60] overflow-hidden">
                        <label class="flex items-center gap-3 px-4 py-4 text-[9px] font-bold text-slate-600 hover:bg-slate-50 cursor-pointer border-b border-slate-50">
                            <i class="fas fa-file-import text-blue-500"></i> IMPORTAR CSV
                            <input type="file" id="csvIn" class="hidden" accept=".csv" onchange="handleFile(this)">
                        </label>
                        <button onclick="exportCSV()" class="w-full flex items-center gap-3 px-4 py-4 text-[9px] font-bold text-slate-600 hover:bg-slate-50 text-left">
                            <i class="fas fa-file-export text-emerald-500"></i> EXPORTAR CSV
                        </button>
                    </div>
                </div>
                
                <button onclick="scrollToToday()" class="h-9 px-4 sm:px-5 bg-rose-500 text-white text-[9px] font-black rounded-xl shadow-lg uppercase transition">Hoy</button>
            </div>
        </div>

        <div class="flex-grow flex overflow-hidden relative">
            <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/10 z-40 md:hidden" onclick="toggleSidebar()"></div>
            
            <div id="task-sidebar" class="flex-shrink-0 border-r border-slate-100 flex flex-col bg-white h-full transition-all">
                <div class="header-total-h flex flex-col justify-center px-5 font-bold bg-slate-50 border-b border-slate-100">
                    <span class="text-[9px] text-slate-400 uppercase tracking-widest">Estructura WBS</span>
                    <span class="text-[7px] text-slate-300 font-normal mt-1 italic hidden sm:block">Clic para localizar</span>
                </div>
                <div id="task-list" class="flex-grow"></div>
            </div>

            <div id="timeline-viewport" class="flex-grow overflow-auto gantt-scroll relative bg-white">
                <div id="gantt-header-container" class="sticky top-0 z-20 bg-white border-b border-slate-100">
                    <div id="month-header" class="flex border-b border-slate-50 text-[10px] font-bold text-slate-400 bg-slate-50 h-[40px] items-center"></div>
                    <div id="unit-header" class="flex h-[50px]"></div>
                </div>
                <div id="bars-container" class="relative pb-10">
                    <div id="today-line"><span id="today-label">HOY</span></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-3 text-center text-slate-400 flex-shrink-0">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-1 max-w-4xl mx-auto px-6">
            <p class="text-[9px] font-bold uppercase tracking-widest">© 2026 • Landing Gear Certification</p>
            <div class="flex justify-center gap-4 text-[9px] font-bold">
                <a href="https://wa.me/573128816469" class="hover:text-green-600 transition">WhatsApp</a>
                <a href="mailto:alucard8@gmail.com" class="hover:text-blue-600 transition">Email</a>
            </div>
        </div>
    </footer>

    <script>
        let tasks = [];
        let viewMode = 'days'; 
        let columnWidth = 45;
        const projectStart = new Date(2026, 2, 1);

        const defaultCSVData = `ID;Tarea;Responsable;Inicio;Fin;Observaciones
1;Levantamiento de Requisitos;Dir. Proy;01/03/2026;20/03/2026;Fase de definición técnica.
1.1;Revisión de Normativa;Ing. Diseño;01/03/2026;07/03/2026;Análisis de aeronavegabilidad.
1.1.1;Estudio de Tolerancias;Técnico A;01/03/2026;04/03/2026;Ajustes mecánicos.
1.2;Hito: Requisitos Definidos;Cliente;20/03/2026;20/03/2026;Firma de acta inicial.
2;Bases de Certificación;Ing. Cert;21/03/2026;15/04/2026;Criterios de seguridad.
3;Fase de Ensayos;Jefe Lab;16/05/2026;10/07/2026;Validación técnica.
4;Cierre y Certificación;Autoridad;11/07/2026;31/07/2026;Fin del proyecto exitoso.`;

        async function loadInitialData() {
            try {
                const response = await fetch('gantt.csv');
                if (!response.ok) throw new Error();
                const text = await response.text();
                tasks = parseCSV(text);
            } catch (e) {
                tasks = parseCSV(defaultCSVData);
            }
            render();
            setTimeout(scrollToToday, 500);
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(';');
                if (cols.length >= 6) {
                    const idStr = cols[0].trim();
                    const level = idStr.split('.').filter(n => n !== "").length;
                    data.push({ id: idStr, level: level, name: cols[1].trim(), owner: cols[2].trim(), start: cols[3].trim(), end: cols[4].trim(), obs: cols[5].trim(), open: true });
                }
            }
            return data;
        }

        function parseDate(str) {
            const [d, m, y] = str.split('/').map(Number);
            return new Date(y, m - 1, d);
        }

        function diffDays(d1, d2) {
            return Math.ceil((d1 - d2) / (1000 * 60 * 60 * 24));
        }

        function setViewMode(mode) {
            viewMode = mode;
            columnWidth = mode === 'days' ? 45 : (mode === 'weeks' ? 80 : 140);
            ['days', 'weeks', 'months'].forEach(m => {
                document.getElementById(`btn-${m}`).className = `px-3 py-1 text-[8px] font-bold uppercase rounded-lg transition ${mode === m ? 'bg-white shadow-sm' : 'hover:bg-white/50'}`;
            });
            render();
        }

        function render() {
            const listObj = document.getElementById('task-list');
            const monthHeader = document.getElementById('month-header');
            const unitHeader = document.getElementById('unit-header');
            const barsObj = document.getElementById('bars-container');
            const todayLine = document.getElementById('today-line');

            listObj.innerHTML = ''; monthHeader.innerHTML = ''; unitHeader.innerHTML = '';
            Array.from(barsObj.children).forEach(c => { if(c.id !== 'today-line') c.remove(); });

            const totalProjectDays = 250;
            const today = new Date();
            const dayOfToday = diffDays(today, projectStart);
            const scaleFactor = columnWidth / (viewMode === 'days' ? 1 : (viewMode === 'weeks' ? 7 : 30.4));
            todayLine.style.left = (dayOfToday * scaleFactor) + "px";

            // Headers logic... (se mantiene igual)
            if (viewMode !== 'months') {
                monthHeader.classList.remove('hidden');
                let curMonth = -1; let monthBox = null;
                const units = viewMode === 'days' ? totalProjectDays : Math.ceil(totalProjectDays / 7);
                for (let i = 0; i < units; i++) {
                    const cur = new Date(projectStart); cur.setDate(cur.getDate() + (i * (viewMode === 'days' ? 1 : 7)));
                    if (cur.getMonth() !== curMonth) {
                        curMonth = cur.getMonth();
                        monthBox = document.createElement('div');
                        monthBox.className = "flex-shrink-0 border-r border-slate-100 px-3 uppercase tracking-tighter flex items-center bg-slate-50 text-[10px] text-slate-500 font-bold";
                        monthBox.innerText = cur.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
                        monthHeader.appendChild(monthBox);
                    }
                    monthBox.style.width = (parseFloat(monthBox.style.width || 0) + columnWidth) + "px";
                    const d = document.createElement('div');
                    d.className = `flex-shrink-0 border-r border-slate-100 flex items-center justify-center text-[9px] ${cur.toDateString() === today.toDateString() && viewMode === 'days' ? 'bg-rose-50 text-rose-500 font-bold' : 'text-slate-400'}`;
                    d.style.width = columnWidth + "px"; d.style.height = "50px";
                    d.innerText = viewMode === 'days' ? cur.getDate() : `S${i+1}`;
                    unitHeader.appendChild(d);
                }
            } else {
                monthHeader.classList.add('hidden');
                for (let i = 0; i < 10; i++) {
                    const cur = new Date(projectStart); cur.setMonth(cur.getMonth() + i);
                    const d = document.createElement('div');
                    d.className = "flex-shrink-0 border-r border-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-500 bg-slate-50";
                    d.style.width = columnWidth + "px"; d.style.height = "90px";
                    d.innerText = cur.toLocaleDateString('es-ES', { month: 'long' }).toUpperCase();
                    unitHeader.appendChild(d);
                }
            }

            tasks.forEach((t) => {
                let isHidden = false;
                const parts = t.id.split('.');
                if (parts.length > 1) {
                    const p1 = tasks.find(x => x.id === parts[0]);
                    if (p1 && !p1.open) isHidden = true;
                    if (parts.length > 2) {
                        const p2 = tasks.find(x => x.id === parts[0] + '.' + parts[1]);
                        if (p2 && !p2.open) isHidden = true;
                    }
                }

                // Lista Lateral Row
                const lRow = document.createElement('div');
                lRow.className = `row-h px-4 border-b border-slate-50 text-[9px] sm:text-[10px] hover:bg-slate-50 transition-all ${isHidden ? 'hidden' : ''}`;
                lRow.style.paddingLeft = (t.level === 1 ? 10 : t.level === 2 ? 22 : 36) + "px";
                const hasChildren = tasks.some(x => x.id.startsWith(t.id + '.') && x.level === t.level + 1);
                const arrow = hasChildren ? `<i class="fas ${t.open ? 'fa-chevron-down' : 'fa-chevron-right'} mr-2 text-rose-400 w-3 cursor-pointer" onclick="event.stopPropagation(); toggleNode('${t.id}')"></i>` : '<i class="fas fa-circle text-[3px] mr-2 text-slate-300 w-3"></i>';
                lRow.innerHTML = `<span class="truncate cursor-pointer flex items-center" onclick="focusOnTask('${t.id}')">${arrow} <span class="truncate"><b class="text-rose-500/60 mr-1 font-black">${t.id}</b> ${t.name}</span></span>`;
                listObj.appendChild(lRow);

                // Bar Row
                const startDays = diffDays(parseDate(t.start), projectStart);
                const dur = diffDays(parseDate(t.end), parseDate(t.start)) + 1;
                const bRow = document.createElement('div');
                bRow.className = `row-h border-b border-slate-50 relative ${isHidden ? 'hidden' : ''}`;
                bRow.style.width = (250 * columnWidth) + "px";

                let barStyles = t.start === t.end ? "bg-amber-400 text-amber-950 border-amber-500 shadow-md z-10" : (t.level === 1 ? "bg-rose-500 text-white border-rose-600 shadow-md" : (t.level === 2 ? "bg-slate-700 text-white border-slate-800 shadow-sm" : "bg-slate-50 text-slate-700 border-slate-300"));
                const bar = document.createElement('div');
                bar.className = `absolute top-3 rounded-lg flex items-center px-2 text-[8px] font-bold border cursor-pointer transition-all ${barStyles}`;
                bar.style.left = (startDays * scaleFactor) + "px";
                bar.style.width = Math.max(10, (dur * scaleFactor)) + "px";
                bar.style.height = "22px";
                bar.innerText = t.start === t.end ? "◆" : t.owner;
                bar.onclick = () => openModal(t);
                bRow.appendChild(bar);
                barsObj.appendChild(bRow);
            });
        }

        // --- Funciones de Utilidad ---
        function toggleNode(id) {
            const t = tasks.find(x => x.id === id);
            if (t) { t.open = !t.open; render(); }
        }

        function focusOnTask(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            const vp = document.getElementById('timeline-viewport');
            const startDays = diffDays(parseDate(t.start), projectStart);
            const scaleFactor = columnWidth / (viewMode === 'days' ? 1 : (viewMode === 'weeks' ? 7 : 30.4));
            vp.scrollTo({ left: (startDays * scaleFactor) - 100, behavior: 'smooth' });
            if (window.innerWidth < 768) toggleSidebar(); 
        }

        function openModal(t) {
            document.getElementById('m-id').innerText = t.id;
            document.getElementById('m-owner').innerText = t.owner;
            document.getElementById('m-period').innerText = `${t.start} a ${t.end}`;
            document.getElementById('m-obs').innerText = t.obs || "Sin notas.";
            document.getElementById('modal-title').innerText = t.name;
            document.getElementById('detail-modal').classList.remove('hidden');
            document.getElementById('detail-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-modal').classList.remove('flex');
        }

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { tasks = parseCSV(e.target.result); render(); };
            reader.readAsText(file, 'ISO-8859-1');
            document.getElementById('drop-menu').classList.add('hidden');
        }

        function exportCSV() {
            let csv = "ID;Tarea;Responsable;Inicio;Fin;Observaciones\n";
            tasks.forEach(t => csv += `${t.id};${t.name};${t.owner};${t.start};${t.end};${t.obs}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'gantt.csv'; a.click();
            document.getElementById('drop-menu').classList.add('hidden');
        }

        function scrollToToday() {
            const vp = document.getElementById('timeline-viewport');
            const dayOfToday = diffDays(new Date(), projectStart);
            const scaleFactor = columnWidth / (viewMode === 'days' ? 1 : (viewMode === 'weeks' ? 7 : 30.4));
            vp.scrollTo({ left: (dayOfToday * scaleFactor) - (vp.offsetWidth / 2), behavior: 'smooth' });
        }

        function toggleSidebar() {
            const sb = document.getElementById('task-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sb.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }

        // --- Sincronización de Scroll ---
        document.getElementById('timeline-viewport').onscroll = function() {
            document.getElementById('task-list').scrollTop = this.scrollTop;
        };

        loadInitialData();
        setViewMode('days');
    </script>
</body>
</html>
