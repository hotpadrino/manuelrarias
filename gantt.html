
        <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Pro Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gantt-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .gantt-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .row-h { height: 46px; }
        
        #today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #f43f5e; z-index: 10; pointer-events: none; }
        #today-label { position: absolute; top: 0; transform: translateX(-50%); background: #f43f5e; color: white; font-size: 9px; padding: 2px 5px; border-radius: 0 0 4px 4px; font-weight: bold; }

        /* Sidebar móvil */
        @media (max-width: 768px) {
            #task-sidebar {
                position: absolute; left: -280px; z-index: 50;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 10px 0 15px -3px rgba(0, 0, 0, 0.05);
            }
            #task-sidebar.open { left: 0; }
            .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 45; backdrop-filter: blur(2px); }
            .mobile-overlay.active { display: block; }
        }

        /* Modal Animación */
        .modal-animate { transition: opacity 0.2s ease, transform 0.2s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="detail-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 modal-animate scale-95 border border-slate-100">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modal-title" class="text-lg font-bold text-slate-900">Detalles de Tarea</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3 text-sm">
                <p class="flex justify-between border-b border-slate-50 pb-2"><span class="text-slate-400">ID:</span> <span id="m-id" class="font-bold text-rose-500"></span></p>
                <p class="flex justify-between border-b border-slate-50 pb-2"><span class="text-slate-400">Responsable:</span> <span id="m-owner" class="font-semibold"></span></p>
                <p class="flex justify-between border-b border-slate-50 pb-2"><span class="text-slate-400">Inicia Día:</span> <span id="m-start"></span></p>
                <p class="flex justify-between"><span class="text-slate-400">Duración:</span> <span id="m-dur" class="bg-slate-100 px-2 rounded"></span></p>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 bg-slate-900 text-white py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto mt-6 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden relative">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between bg-white/80 backdrop-blur">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden w-10 h-10 flex items-center justify-center text-slate-600 bg-slate-50 rounded-xl border border-slate-200">
                    <i class="fas fa-indent"></i>
                </button>
                <div class="hidden sm:block">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Gestión de Proyecto</h2>
                    <p class="text-xs font-bold text-slate-800">Cronograma Maestro</p>
                </div>
            </div>
            
            <div class="flex gap-2 items-center">
                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                    <button onclick="setZoom(40)" class="px-3 py-1 text-[9px] font-bold uppercase hover:bg-white rounded-lg transition">Días</button>
                    <button onclick="setZoom(110)" class="px-3 py-1 text-[9px] font-bold uppercase hover:bg-white rounded-lg transition">Meses</button>
                </div>
                <button onclick="scrollToToday()" class="h-8 px-4 bg-rose-500 text-white text-[9px] font-black rounded-xl shadow-lg shadow-rose-200 active:scale-95 transition">HOY</button>
            </div>
        </div>

        <div class="flex overflow-hidden relative" style="height: 50vh;">
            <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>
            
            <div id="task-sidebar" class="w-[260px] md:w-64 flex-shrink-0 border-r border-slate-100 flex flex-col bg-white h-full">
                <div class="row-h flex items-center px-5 font-bold bg-slate-50/50 border-b border-slate-100 text-[9px] text-slate-400 uppercase tracking-widest">Estructura Detallada</div>
                <div id="task-list" class="flex-grow overflow-y-auto gantt-scroll"></div>
            </div>

            <div id="timeline-viewport" class="flex-grow overflow-auto gantt-scroll relative">
                <div id="timeline-header" class="flex sticky top-0 z-20 bg-white/90 backdrop-blur border-b border-slate-100"></div>
                <div id="bars-container" class="relative">
                    <div id="today-line"><span id="today-label">HOY</span></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-16 mb-10 px-8">
        <div class="max-w-4xl mx-auto">
            <div class="w-full h-px bg-slate-200 mb-8 opacity-50"></div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left space-y-1">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">© 2026 • Tecnología de vanguardia</p>
                    <div class="flex items-center justify-center md:justify-start gap-2 text-[9px] text-slate-300 font-medium">
                        <span>HTML5</span><span>•</span><span>Tailwind</span><span>•</span><span>JS</span>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <a href="https://wa.me/573128816469" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white text-slate-500 hover:text-green-600 transition-colors text-[11px] font-bold border border-slate-200 shadow-sm">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="mailto:alucard8@gmail.com" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white text-slate-500 hover:text-blue-600 transition-colors text-[11px] font-bold border border-slate-200 shadow-sm">
                        <i class="far fa-envelope"></i> Email
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let tasks = [
            { id: 1, level: 1, name: "Instalaciones Eléctricas", owner: "Ing. Rivas", start: 1, duration: 8, open: true },
            { id: 2, level: 2, name: "Cableado Estructurado", owner: "Técnico A", start: 1, duration: 4, parent: 1 },
            { id: 3, level: 2, name: "Montaje de Tableros", owner: "Técnico B", start: 5, duration: 4, parent: 1 },
            { id: 4, level: 1, name: "Fase de Acabados", owner: "Arq. Luna", start: 9, duration: 6, open: true },
            { id: 5, level: 2, name: "Luminarias de Techo", owner: "Equipo 1", start: 9, duration: 3, parent: 4 },
            { id: 6, level: 2, name: "Pruebas de Red", owner: "Ing. Rivas", start: 12, duration: 3, parent: 4 }
        ];

        let zoom = 40;
        let dayOfToday = 8;

        function toggleSidebar() {
            document.getElementById('task-sidebar').classList.toggle('open');
            document.getElementById('mobile-overlay').classList.toggle('active');
        }

        function openModal(t) {
            document.getElementById('modal-title').innerText = t.name;
            document.getElementById('m-id').innerText = t.dId;
            document.getElementById('m-owner').innerText = t.owner;
            document.getElementById('m-start').innerText = t.start;
            document.getElementById('m-dur').innerText = t.duration + " días";
            
            const m = document.getElementById('detail-modal');
            m.classList.remove('hidden');
            m.classList.add('flex');
            setTimeout(() => m.children[0].classList.remove('scale-95'), 10);
        }

        function closeModal() {
            const m = document.getElementById('detail-modal');
            m.children[0].classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 200);
        }

        function render() {
            const listObj = document.getElementById('task-list');
            const headerObj = document.getElementById('timeline-header');
            const barsObj = document.getElementById('bars-container');
            const todayLine = document.getElementById('today-line');

            listObj.innerHTML = ''; headerObj.innerHTML = '';
            Array.from(barsObj.children).forEach(c => { if(c.id !== 'today-line') c.remove(); });

            const maxDays = 25;
            todayLine.style.left = ((dayOfToday - 1) * zoom + (zoom/2)) + "px";

            for(let i=1; i<=maxDays; i++) {
                const d = document.createElement('div');
                d.className = `flex-shrink-0 border-r border-slate-100 text-[9px] flex items-center justify-center ${i === dayOfToday ? 'text-rose-500 font-bold bg-rose-50' : 'text-slate-300'}`;
                d.style.width = zoom + "px"; d.style.height = "46px";
                d.innerText = i; headerObj.appendChild(d);
            }

            let mIdx = 0; let sIdx = 0;
            tasks.forEach((t) => {
                if(t.level === 1) { mIdx++; sIdx = 0; t.dId = mIdx; }
                else { sIdx++; t.dId = `${mIdx}.${sIdx}`; }

                const isHidden = t.parent && !tasks.find(p => p.id === t.parent).open;

                const lRow = document.createElement('div');
                lRow.className = `row-h flex items-center px-5 border-b border-slate-50 text-[10px] hover:bg-slate-50/80 transition-colors ${isHidden ? 'hidden' : ''}`;
                lRow.style.paddingLeft = (t.level === 1 ? 15 : 30) + "px";
                lRow.innerHTML = `<span class="truncate cursor-pointer text-slate-700 font-medium"><b class="text-rose-500/60 mr-2 font-black">${t.dId}</b> ${t.name}</span>`;
                lRow.onclick = () => { if(t.level === 1) { t.open = !t.open; render(); } };
                listObj.appendChild(lRow);

                const bRow = document.createElement('div');
                bRow.className = `row-h border-b border-slate-50/50 relative ${isHidden ? 'hidden' : ''}`;
                bRow.style.width = (maxDays * zoom) + "px";

                const bar = document.createElement('div');
                bar.className = `absolute top-3 rounded-lg flex items-center px-3 text-[9px] font-bold border shadow-sm cursor-pointer transition-transform active:scale-95
                    ${t.level === 1 ? 'bg-rose-500 text-white border-rose-600' : 'bg-white text-slate-500 border-slate-200'}`;
                bar.style.left = ((t.start - 1) * zoom) + "px";
                bar.style.width = (t.duration * zoom) + "px";
                bar.style.height = "22px";
                bar.innerText = t.owner;
                bar.onclick = (e) => { e.stopPropagation(); openModal(t); };

                bRow.appendChild(bar);
                barsObj.appendChild(bRow);
            });
        }

        function scrollToToday() {
            const vp = document.getElementById('timeline-viewport');
            vp.scrollTo({ left: ((dayOfToday - 1) * zoom) - (vp.offsetWidth / 2.5), behavior: 'smooth' });
        }

        function setZoom(v) { zoom = v; render(); }

        document.getElementById('timeline-viewport').onscroll = function() {
            document.getElementById('task-list').scrollTop = this.scrollTop;
        };

        render();
        setTimeout(scrollToToday, 500);
    </script>
</body>
    </html>
