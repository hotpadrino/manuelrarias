<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL DE ENTRENAMIENTO CAMAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --azul-fac: #003366;
            --azul-claro: #e3f2fd;
            --gris-fondo: #f4f7f9;
        }
        
        /* ESTRUCTURA BASE PARA FOOTER AL FONDO (CORREGIDA) */
        body { 
            background-color: var(--gris-fondo); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding-top: 90px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0; /* Asegura que no haya márgenes ocultos */
        }

        .main-content {
            flex-grow: 1; /* Empuja el footer hacia abajo */
            width: 100%;
            padding-bottom: 40px; /* Da un poco de respiro antes del footer */
        }
        
        /* HEADER FIJO */
        .header-caman {
            position: fixed;
            top: 0;
            left: 0;
            right: 0; 
            box-sizing: border-box; 
            background-color: var(--azul-fac);
            color: white;
            padding: 12px 24px;
            z-index: 1050;
            box-shadow: 0 4px 15px rgba(0,51,102,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 0;
        }

        .header-caman img { height: 50px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        .header-title { 
            font-weight: 800; 
            font-size: 1.25rem; 
            margin: 0; 
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* SECCIÓN DE USUARIO */
        .user-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
            max-width: 45%; 
        }

        #userName {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e3f2fd;
            width: 100%;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        .btn-logout {
            font-size: 0.75rem;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: bold;
            transition: all 0.2s;
            white-space: nowrap;
        }

        /* TARJETAS MODERNAS */
        .card-modern {
            background: white;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* DISEÑO DE TABLA */
        .table-custom {
            margin-bottom: 0;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .table-custom thead th {
            background-color: transparent;
            color: #6c757d;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #edf2f7;
            padding: 16px;
        }

        .table-custom tbody tr:hover { background-color: #f8fafc; }

        .table-custom tbody td {
            padding: 16px;
            vertical-align: middle;
            border-bottom: 1px solid #edf2f7;
            color: #2d3748;
        }

        .vence-3-meses { background-color: rgba(255, 193, 7, 0.05) !important; }
        .vence-3-meses td:first-child { border-left: 6px solid #ffc107; }

        .vencido { background-color: rgba(220, 53, 69, 0.05) !important; }
        .vencido td:first-child { border-left: 6px solid #dc3545; }

        .badge-status { padding: 6px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; }

        /* FOOTER ESTILO INVERSIONES ARIPAR (CORREGIDO) */
        .footer-aripar {
            background-color: #1a202c;
            color: #a0aec0;
            padding: 30px 0;
            border-top: 4px solid var(--azul-fac);
            width: 100%; /* Forzamos a que ocupe todo el ancho */
            margin-top: auto; /* La magia de Flexbox: empuja el footer hasta el fondo exacto */
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-content p { margin: 0; font-size: 0.9rem; letter-spacing: 0.5px; }

        .footer-links { display: flex; gap: 20px; }

        .footer-links a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }

        .footer-links a.whatsapp:hover { color: #25D366; background: rgba(37, 211, 102, 0.1); }
        .footer-links a.email:hover { color: #63b3ed; background: rgba(99, 179, 237, 0.1); }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .header-title { display: none; } 
            .footer-content { text-align: center; }
            .footer-links { flex-direction: column; gap: 10px; width: 100%; }
            .footer-links a { justify-content: center; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="header-caman">
    <div class="brand-section">
        <img src="https://www.fac.mil.co/sites/default/files/gallery/unidadesaereas/caman-logo.png" alt="CAMAN">
        <h1 class="header-title">CONTROL DE ENTRENAMIENTO</h1>
    </div>
    
    <div id="userInfo" class="user-section hidden">
        <span id="userName">Cargando...</span>
        <button onclick="signOut()" class="btn btn-outline-light btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
</header>

<main class="main-content container">
    <div id="authSection" class="card-modern mx-auto p-5 mt-5" style="max-width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock text-primary" style="font-size: 2.5rem;"></i>
            <h5 class="fw-bold text-dark mt-2">Acceso al Sistema</h5>
        </div>
        <input type="email" id="email" class="form-control form-control-lg mb-3" placeholder="Correo institucional" style="border-radius: 10px;">
        <input type="password" id="password" class="form-control form-control-lg mb-4" placeholder="Contraseña" style="border-radius: 10px;">
        <button onclick="signIn()" id="loginBtn" class="btn btn-primary btn-lg w-100" style="border-radius: 10px; font-weight: 600;">Entrar</button>
    </div>

    <div id="mainSection" class="hidden mt-4">
        
        <div class="card-modern p-4 mb-4">
            <label class="form-label fw-bold text-secondary mb-3"><i class="bi bi-search me-2"></i>CONSULTA DE PERSONAL</label>
            <div class="input-group input-group-lg shadow-sm" style="border-radius: 12px; overflow: hidden;">
                <input type="text" id="searchCedula" class="form-control border-0 bg-light" placeholder="Ingrese número de cédula...">
                <button onclick="fetchData()" class="btn btn-dark px-4 fw-bold">Buscar</button>
            </div>
        </div>

        <div id="adminForm" class="card-modern p-4 mb-4 hidden border border-primary border-opacity-25">
            <h6 class="text-primary fw-bold mb-3"><i class="bi bi-plus-circle me-2"></i>Registrar Nuevo Curso</h6>
            <div class="row g-3">
                <div class="col-12 col-md-2"><input type="text" id="inCedula" class="form-control bg-light" placeholder="Cédula"></div>
                <div class="col-12 col-md-4"><input type="text" id="inCurso" class="form-control bg-light" placeholder="Nombre del Curso"></div>
                <div class="col-6 col-md-2"><label class="small text-muted mb-1">Realización</label><input type="date" id="inFecha" class="form-control bg-light"></div>
                <div class="col-6 col-md-2"><label class="small text-muted mb-1">Vencimiento</label><input type="date" id="inVence" class="form-control bg-light"></div>
                <div class="col-12 col-md-2 d-flex align-items-end"><button onclick="upsertData()" class="btn btn-primary w-100 fw-bold"><i class="bi bi-save me-2"></i>Guardar</button></div>
            </div>
        </div>

        <div class="card-modern overflow-hidden">
            <div class="table-responsive">
                <table class="table table-custom w-100">
                    <thead>
                        <tr>
                            <th class="ps-4">Cédula</th>
                            <th>Capacitación</th>
                            <th>Vencimiento</th>
                            <th>Estado</th>
                            <th id="thAcciones" class="hidden text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr>
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                Ingrese una cédula para ver los resultados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer class="footer-aripar">
    <div class="container footer-content">
        <p class="fw-bold"><i class="bi bi-buildings me-2"></i>© 2026 • Inversiones Aripar • Gestión Documental</p>
        <div class="footer-links">
            <a href="https://wa.me/573128816469" class="whatsapp" target="_blank">
                <i class="bi bi-whatsapp"></i> WhatsApp
            </a>
            <a href="mailto:alucard8@gmail.com" class="email">
                <i class="bi bi-envelope-at"></i> Email
            </a>
        </div>
    </div>
</footer>

<script>
    const SUPABASE_URL = 'https://yfbfbywjwslxsrgamqhj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_PXth9Sd24jgQOizXrmk5Tw_YVJh4V6j';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let sessionUser = null;
    let isAdmin = false;

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Cargando...';
        btn.disabled = true;
        
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            alert("Error: " + error.message);
            btn.innerHTML = 'Entrar';
            btn.disabled = false;
            return;
        }
        sessionUser = data.user;
        await checkUserRole();
    }

    async function checkUserRole() {
        const { data, error } = await _supabase
            .from('entrenamientos_usuarios')
            .select('es_admin, nombre')
            .eq('email', sessionUser.email)
            .single();

        if (data) {
            isAdmin = data.es_admin;
            const icono = isAdmin ? '<i class="bi bi-person-badge me-1"></i>' : '<i class="bi bi-person me-1"></i>';
            document.getElementById('userName').innerHTML = `${icono} ${data.nombre} (${isAdmin ? 'Admin' : 'Usuario'})`;
            renderUI();
        } else {
            console.error("Error al cargar perfil o permisos RLS.");
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = 'Entrar';
            btn.disabled = false;
        }
    }

    function renderUI() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        if (isAdmin) {
            document.getElementById('adminForm').classList.remove('hidden');
            document.getElementById('thAcciones').classList.remove('hidden');
        }
    }

    async function fetchData() {
        const cedula = document.getElementById('searchCedula').value;
        if (!cedula) return;

        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>';

        const { data, error } = await _supabase
            .from('entrenamientos')
            .select('*')
            .eq('cedula', cedula)
            .order('fecha_vencimiento', { ascending: true });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">Error: ${error.message}</td></tr>`;
            return;
        }

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted"><i class="bi bi-search fs-2 d-block mb-2"></i>No se encontraron cursos para esta cédula.</td></tr>';
            return;
        }

        tbody.innerHTML = '';

        data.forEach(row => {
            const tr = document.createElement('tr');
            const statusInfo = getStatusInfo(row.fecha_vencimiento);
            
            if (statusInfo.class) tr.className = statusInfo.class;

            tr.innerHTML = `
                <td class="ps-4 fw-medium">${row.cedula}</td>
                <td class="fw-bold text-dark">${row.curso}</td>
                <td><i class="bi bi-calendar3 me-2 text-muted"></i>${row.fecha_vencimiento}</td>
                <td><span class="badge ${statusInfo.badgeClass} badge-status">${statusInfo.text}</span></td>
                ${isAdmin ? `<td class="text-center"><button class="btn btn-light text-danger btn-sm rounded-circle shadow-sm" onclick="deleteRecord('${row.id}')" title="Eliminar"><i class="bi bi-trash3-fill"></i></button></td>` : ''}
            `;
            tbody.appendChild(tr);
        });
    }

    async function upsertData() {
        const payload = {
            cedula: document.getElementById('inCedula').value,
            curso: document.getElementById('inCurso').value,
            fecha_realizacion: document.getElementById('inFecha').value,
            fecha_vencimiento: document.getElementById('inVence').value
        };
        const { error } = await _supabase.from('entrenamientos').insert([payload]);
        if (error) alert(error.message); else { 
            document.getElementById('inCurso').value = "";
            fetchData(); 
        }
    }

    async function deleteRecord(id) {
        if (confirm("¿Confirmar eliminación de este registro?")) {
            await _supabase.from('entrenamientos').delete().eq('id', id);
            fetchData();
        }
    }

    function getStatusInfo(fecha) {
        const hoy = new Date();
        const vence = new Date(fecha);
        const diffDias = (vence - hoy) / (1000 * 60 * 60 * 24);
        
        if (vence < hoy) {
            return { class: 'vencido', badgeClass: 'bg-danger', text: 'Vencido' };
        }
        if (diffDias <= 90) {
            return { class: 'vence-3-meses', badgeClass: 'bg-warning text-dark', text: 'Vence pronto' };
        }
        return { class: '', badgeClass: 'bg-success', text: 'Vigente' };
    }

    function signOut() { _supabase.auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
