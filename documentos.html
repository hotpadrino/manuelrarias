<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos Documental - Certificación</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 20px; color: #333; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #003366; text-align: center; border-bottom: 2px solid #003366; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Contador destacado */
        #counterDisplay { 
            background-color: #eef6ff; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            color: #003366; 
            border-left: 6px solid #0055ff;
            font-size: 1.1em;
            display: block; /* Asegura visibilidad */
        }

        .table-wrapper { max-height: 65vh; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; min-width: 900px; }
        
        th { background-color: #003366; color: white; padding: 12px; position: sticky; top: 0; z-index: 10; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; line-height: 1.4; }
        
        .doc-highlight { color: #0055ff; font-weight: bold; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f1f1; }
        
        .filter-input { 
            width: 100%; padding: 6px; margin-top: 8px; border: 1px solid #ccc; 
            border-radius: 4px; box-sizing: border-box; font-weight: normal; color: #333;
        }
        
        .date-col { width: 110px; }
        .doc-col { width: 160px; }
        .title-col { width: 280px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Base de Datos Documental - Certificación</h2>
    
    <div id="counterDisplay">Iniciando sistema...</div>
    
    <div class="table-wrapper">
        <table id="techTable">
            <thead>
                <tr>
                    <th class="date-col">Fecha<br><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="Filtro..."></th>
                    <th class="doc-col">Documento<br><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="Filtro..."></th>
                    <th class="title-col">Título<br><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="Filtro..."></th>
                    <th>Observaciones (Búsqueda Global)<br><input type="text" class="filter-input" id="globalFilter" onkeyup="filterTable()" placeholder="Buscar en toda la fila..."></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

        ["PDTE", "STANAG 4746", "LIGHT ROTARY WING UAS AIRWORTHINESS", "AEP-89. EN ESTUDIO, SIN PUBLICAR (a 16feb26)."]

async function init() {
        const tbody = document.getElementById('tableBody');
        try {
            const response = await fetch('aeronaves.csv');
            if (!response.ok) throw new Error();
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            tbody.innerHTML = '';
            let count = 0;
            rows.forEach(line => {
                if (line.trim() === '') return;
                const cols = line.split(';');
                if (cols.length >= 4) { renderRow(cols); count++; }
            });
            updateCounter(count);
        } catch (error) {
            console.warn("Cargando datos de respaldo.");
            tbody.innerHTML = ''; 
            fallbackData.forEach(cols => renderRow(cols));
            updateCounter(fallbackData.length);
        }
    }

    function renderRow(cols) {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${cols[0] || ''}</td>
            <td class="doc-highlight">${cols[1] || ''}</td>
            <td>${cols[2] || ''}</td>
            <td>${cols[3] || ''}</td>
        `;
        tbody.appendChild(tr);
    }

    function filterTable() {
        const inputs = document.getElementsByClassName("filter-input");
        const globalInput = document.getElementById("globalFilter").value.toUpperCase();
        const tr = document.getElementById("techTable").getElementsByTagName("tr");
        let visibleCount = 0;

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].innerText.toUpperCase();
            let matchesGlobal = rowText.indexOf(globalInput) > -1;
            
            let matchesSpecific = true;
            // Solo verificamos los primeros 3 filtros individuales
            for (let j = 0; j < 3; j++) {
                const val = inputs[j].value.toUpperCase();
                const cell = tr[i].getElementsByTagName("td")[j];
                if (cell && val && cell.innerText.toUpperCase().indexOf(val) === -1) {
                    matchesSpecific = false;
                    break;
                }
            }

            if (matchesGlobal && matchesSpecific) {
                tr[i].style.display = "";
                visibleCount++;
            } else {
                tr[i].style.display = "none";
            }
        }
        updateCounter(visibleCount);
    }

    function updateCounter(n) {
        document.getElementById('counterDisplay').textContent = `Mostrando todos los registros (${n})`;
    }

    window.onload = init;
</script>

</html>
