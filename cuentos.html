<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniCuentos Interactivos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --accent-color: #e67e22;
            --card-bg: #ffffff;
            --header-h: 60px;
            --footer-h: 80px;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #ecf0f1;
            --accent-color: #f39c12;
            --card-bg: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            height: 100dvh; /* Altura dinámica para móviles */
            overflow: hidden; /* Evita el scroll global */
            display: flex;
            flex-direction: column;
        }

        /* --- Cabecera Fija --- */
        header {
            height: var(--header-h);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        /* --- Contenedor Principal --- */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .menu-screen {
            text-align: center;
            width: 100%;
            max-width: 600px;
            max-height: 100%;
            overflow-y: auto;
            padding: 20px;
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .option-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            font-weight: bold;
        }

        .option-card:hover { transform: translateY(-3px); background: var(--accent-color); color: white; }

        /* --- El Lector Estilo Libro --- */
        #reader {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .book-frame {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .image-side {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #ddd; /* Color de carga */
        }

        .text-side {
            padding: 30px;
            overflow-y: auto; /* Scroll solo para el texto */
            font-family: 'Comic Neue', cursive;
            display: flex;
            flex-direction: column;
        }

        .text-side h2 { margin-bottom: 15px; color: var(--accent-color); font-size: 1.8rem; }
        .text-side p { font-size: 1.4rem; line-height: 1.5; }

        /* --- Navegación Fija Inferior --- */
        footer {
            height: var(--footer-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        #resumeBanner {
            background: var(--accent-color);
            color: white;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        /* --- Animaciones --- */
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            .book-frame { grid-template-columns: 1fr; grid-template-rows: 40% 60%; }
            .text-side { padding: 20px; }
            .text-side p { font-size: 1.2rem; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <header>
        <span id="storyIndicator" style="font-weight: bold;">📚 MiniLector</span>
        <div>
            <button onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button onclick="goHome()" id="homeBtn" class="hidden">🏠</button>
        </div>
    </header>

    <main>
        <div id="resumeContainer" class="hidden">
            <div id="resumeBanner" onclick="resumeLastSession()">
                ¿Continuar leyendo donde lo dejaste? 📖
            </div>
        </div>

        <div id="languageMenu" class="menu-screen">
            <h1>Elige un idioma</h1>
            <div id="langGrid" class="grid-options"></div>
        </div>

        <div id="storyMenu" class="menu-screen hidden">
            <h1 id="langTitle">Cuentos disponibles</h1>
            <div id="storyGrid" class="grid-options"></div>
        </div>

        <div id="reader">
            <div class="book-frame fade-in" id="bookFrame">
                <div class="image-side" id="pageImg"></div>
                <div class="text-side" id="textContainer">
                    <h2 id="pageTitle"></h2>
                    <p id="pageText"></p>
                </div>
            </div>
            <footer>
                <button onclick="prevPage()">⬅ Atrás</button>
                <span id="pageCounter">1 / 1</span>
                <button onclick="nextPage()" id="nextBtn">Siguiente ➡</button>
            </footer>
        </div>
    </main>

    <script>
        let allCuentos = [];
        let currentStory = null;
        let currentPage = 0;

        async function loadData() {
            try {
                const resp = await fetch('cuentos.txt');
                const text = await resp.text();
                parseCuentos(text);
                checkPersistence();
                showLanguageMenu();
            } catch (e) {
                alert("Error: Asegúrate de que cuentos.txt esté en la misma carpeta y usa un servidor local (Live Server).");
            }
        }

        function parseCuentos(raw) {
            const blocks = raw.split(/^# /m).filter(b => b.trim());
            allCuentos = blocks.map((block, idx) => {
                const lines = block.split('\n');
                const header = lines.shift();
                const lang = (header.match(/\[(.*?)\]/) || ["", "ES"])[1].toUpperCase();
                const title = header.replace(/\[.*?\]/, "").trim();
                
                const chapters = block.split(/^## /m).slice(1).map(chap => {
                    const cLines = chap.split('\n').filter(l => l.trim());
                    const cTitle = cLines.shift();
                    const img = (chap.match(/!\[.*?\]\((.*?)\)/) || ["", ""])[1];
                    const content = cLines.filter(l => !l.startsWith('![')).join('<br><br>');
                    return { title: cTitle, image: img, text: content };
                });
                return { id: idx, title, lang, chapters };
            });
        }

        function showLanguageMenu() {
            const langs = [...new Set(allCuentos.map(c => c.lang))];
            const grid = document.getElementById('langGrid');
            grid.innerHTML = langs.map(l => `<div class="option-card" onclick="showStories('${l}')">${l}</div>`).join('');
            
            document.getElementById('languageMenu').classList.remove('hidden');
            document.getElementById('storyMenu').classList.add('hidden');
            document.getElementById('reader').style.display = 'none';
            document.getElementById('homeBtn').classList.add('hidden');
        }

        function showStories(lang) {
            const filtered = allCuentos.filter(c => c.lang === lang);
            const grid = document.getElementById('storyGrid');
            grid.innerHTML = filtered.map(c => `<div class="option-card" onclick="startReading(${c.id}, 0)">${c.title}</div>`).join('');
            
            document.getElementById('languageMenu').classList.add('hidden');
            document.getElementById('storyMenu').classList.remove('hidden');
            document.getElementById('homeBtn').classList.remove('hidden');
        }

        function startReading(id, pageIndex) {
            currentStory = allCuentos.find(c => c.id === id);
            currentPage = pageIndex;
            
            document.getElementById('storyMenu').classList.add('hidden');
            document.getElementById('languageMenu').classList.add('hidden');
            document.getElementById('reader').style.display = 'flex';
            document.getElementById('resumeContainer').classList.add('hidden');
            
            renderPage();
        }

        function renderPage() {
            const page = currentStory.chapters[currentPage];
            const isLast = currentPage === currentStory.chapters.length - 1;
            
            // Reset de scroll de texto al cambiar de página
            document.getElementById('textContainer').scrollTop = 0;
            
            document.getElementById('pageImg').style.backgroundImage = `url('${page.image}')`;
            document.getElementById('pageTitle').innerText = page.title;
            document.getElementById('pageText').innerHTML = page.text;
            document.getElementById('pageCounter').innerText = `${currentPage + 1} / ${currentStory.chapters.length}`;
            
            // Botón Siguiente cambia a "Terminar" en la última página
            document.getElementById('nextBtn').innerText = isLast ? "Terminar 🏁" : "Siguiente ➡";
            
            saveState();
        }

        function nextPage() {
            if (currentPage < currentStory.chapters.length - 1) {
                currentPage++;
                document.getElementById('bookFrame').classList.remove('fade-in');
                void document.getElementById('bookFrame').offsetWidth; // Trigger reflow
                document.getElementById('bookFrame').classList.add('fade-in');
                renderPage();
            } else {
                // Al terminar, vuelve a la lista de cuentos de ese idioma
                clearState();
                showStories(currentStory.lang);
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }

        function goHome() {
            clearState();
            showLanguageMenu();
        }

        // --- Persistencia ---
        function saveState() {
            const data = { id: currentStory.id, page: currentPage, theme: document.body.getAttribute('data-theme') };
            localStorage.setItem('kids_reader_save', JSON.stringify(data));
        }

        function clearState() {
            const currentTheme = document.body.getAttribute('data-theme');
            localStorage.setItem('kids_reader_save', JSON.stringify({ theme: currentTheme }));
        }

        function checkPersistence() {
            const saved = JSON.parse(localStorage.getItem('kids_reader_save'));
            if (saved && saved.id !== undefined) {
                document.getElementById('resumeContainer').classList.remove('hidden');
            }
            if (saved && saved.theme) setTheme(saved.theme);
        }

        function resumeLastSession() {
            const saved = JSON.parse(localStorage.getItem('kids_reader_save'));
            if (saved) startReading(saved.id, saved.page);
        }

        function toggleTheme() {
            const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
            saveState();
        }

        window.onload = loadData;
    </script>
</body>
</html>
