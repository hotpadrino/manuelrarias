<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Cuentos Infantiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --accent-color: #e67e22;
            --card-bg: #ffffff;
            --transition: 0.4s ease;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #ecf0f1;
            --accent-color: #f39c12;
            --card-bg: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- UI Components --- */
        .header-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- Menus --- */
        .menu-screen {
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .menu-screen h1 { margin-bottom: 20px; font-size: 2.5rem; }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .option-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .option-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        /* --- Book Reader --- */
        #reader {
            display: none;
            width: 100%;
            max-width: 1100px;
            perspective: 1500px;
        }

        .book-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 600px;
            position: relative;
            transform-origin: center;
        }

        .image-side {
            background-size: cover;
            background-position: center;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .text-side {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Comic Neue', cursive;
        }

        .text-side h2 { margin-bottom: 20px; color: var(--accent-color); }
        .text-side p { font-size: 1.6rem; line-height: 1.6; }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }

        /* --- Animations --- */
        @keyframes pageFlip {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(-90deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        .animating { animation: pageFlip 0.6s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive --- */
        @media (max-width: 850px) {
            .book-page { grid-template-columns: 1fr; }
            .image-side { height: 300px; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); }
            .text-side { padding: 30px; }
            .text-side p { font-size: 1.3rem; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <div class="header-controls">
        <button onclick="toggleTheme()" id="themeBtn">🌙 Modo Oscuro</button>
        <button onclick="goBack()" id="backBtn" class="hidden">🏠 Menú</button>
    </div>

    <div class="container">
        <div id="languageMenu" class="menu-screen">
            <h1>Escoge tu idioma</h1>
            <div id="langGrid" class="grid-options"></div>
        </div>

        <div id="storyMenu" class="menu-screen hidden">
            <h1>¿Qué quieres leer hoy?</h1>
            <div id="storyGrid" class="grid-options"></div>
        </div>

        <div id="reader">
            <div class="book-page" id="bookContent">
                <div class="image-side" id="pageImg"></div>
                <div class="text-side">
                    <h2 id="pageTitle"></h2>
                    <p id="pageText"></p>
                </div>
            </div>
            <div class="nav-buttons">
                <button onclick="prevPage()">⬅ Anterior</button>
                <button onclick="nextPage()">Siguiente ➡</button>
            </div>
        </div>
    </div>

    <script>
        let allCuentos = [];
        let currentLang = "";
        let currentStory = null;
        let currentPage = 0;

        // 1. Cargar y Parsear el archivo txt
        async function loadCuentos() {
            try {
                const response = await fetch('cuentos.txt');
                const text = await response.text();
                parseCuentos(text);
                initApp();
            } catch (err) {
                console.error("Error cargando cuentos.txt:", err);
                alert("No se encontró el archivo cuentos.txt en la raíz.");
            }
        }

        function parseCuentos(rawText) {
            const stories = rawText.split(/^# /m).filter(s => s.trim());
            
            allCuentos = stories.map((storyBlock, index) => {
                const lines = storyBlock.split('\n');
                const firstLine = lines.shift(); // Título del cuento [IDIOMA]
                const langMatch = firstLine.match(/\[(.*?)\]/);
                const title = firstLine.replace(/\[.*?\]/, "").trim();
                const lang = langMatch ? langMatch[1].toUpperCase() : "ES";

                // Dividir por capítulos (##)
                const chapters = storyBlock.split(/^## /m).slice(1).map(chap => {
                    const chapLines = chap.split('\n').filter(l => l.trim());
                    const chapTitle = chapLines.shift();
                    const imgMatch = chap.match(/!\[.*?\]\((.*?)\)/);
                    const imgUrl = imgMatch ? imgMatch[1] : "";
                    const contentText = chapLines
                        .filter(l => !l.startsWith('!['))
                        .join('<br><br>');

                    return { title: chapTitle, image: imgUrl, text: contentText };
                });

                return { id: index, title, lang, chapters };
            });
        }

        // 2. Lógica de Menús e Interfaz
        function initApp() {
            const langs = [...new Set(allCuentos.map(c => c.lang))];
            const langGrid = document.getElementById('langGrid');
            
            langGrid.innerHTML = langs.map(l => `
                <div class="option-card" onclick="selectLanguage('${l}')">${l}</div>
            `).join('');

            // Cargar persistencia
            const saved = JSON.parse(localStorage.getItem('bookReaderState'));
            if (saved) {
                setTheme(saved.theme || 'light');
                // Podrías saltar directo al cuento aquí si lo deseas
            }
        }

        function selectLanguage(lang) {
            currentLang = lang;
            document.getElementById('languageMenu').classList.add('hidden');
            document.getElementById('storyMenu').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');

            const filtered = allCuentos.filter(c => c.lang === lang);
            const storyGrid = document.getElementById('storyGrid');
            storyGrid.innerHTML = filtered.map(c => `
                <div class="option-card" onclick="startStory(${c.id})">${c.title}</div>
            `).join('');
        }

        function startStory(id, resumePage = 0) {
            currentStory = allCuentos.find(c => c.id === id);
            currentPage = resumePage;
            document.getElementById('storyMenu').classList.add('hidden');
            document.getElementById('reader').style.display = 'block';
            renderPage();
            saveProgress();
        }

        function renderPage() {
            const page = currentStory.chapters[currentPage];
            const bookContent = document.getElementById('bookContent');
            
            // Animación
            bookContent.classList.add('animating');
            setTimeout(() => {
                document.getElementById('pageImg').style.backgroundImage = `url('${page.image}')`;
                document.getElementById('pageTitle').innerText = page.title;
                document.getElementById('pageText').innerHTML = page.text;
                bookContent.classList.remove('animating');
            }, 300);
        }

        function nextPage() {
            if (currentPage < currentStory.chapters.length - 1) {
                currentPage++;
                renderPage();
                saveProgress();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
                saveProgress();
            }
        }

        function goBack() {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('storyMenu').classList.add('hidden');
            document.getElementById('languageMenu').classList.remove('hidden');
            document.getElementById('backBtn').classList.add('hidden');
        }

        // 3. Persistencia y Tema
        function saveProgress() {
            const state = {
                storyId: currentStory ? currentStory.id : null,
                page: currentPage,
                theme: document.body.getAttribute('data-theme')
            };
            localStorage.setItem('bookReaderState', JSON.stringify(state));
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙 Modo Oscuro' : '☀️ Modo Claro';
            saveProgress();
        }

        window.onload = loadCuentos;
    </script>
</body>
</html>
