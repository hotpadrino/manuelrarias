<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cuentos Mágicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fef9f0;
            --surface: #fffdf7;
            --surface2: #f5ede0;
            --text: #2d1f0e;
            --text2: #6b4c2a;
            --accent: #e05c1a;
            --accent2: #f5a623;
            --border: #e8d8c0;
            --shadow: rgba(100, 60, 20, 0.15);
            --page-flip: #e8c99a;
            --img-bg: linear-gradient(135deg, #f5a623 0%, #e05c1a 100%);
            --font-display: 'Baloo 2', cursive;
            --font-body: 'Lora', serif;
            --header-h: 56px;
            --nav-h: 64px;
            --radius: 20px;
        }

        [data-theme="dark"] {
            --bg: #1a1208;
            --surface: #251a0d;
            --surface2: #2e2010;
            --text: #f5e9d5;
            --text2: #c4a06a;
            --accent: #f5793a;
            --accent2: #f5c842;
            --border: #3d2c15;
            --shadow: rgba(0,0,0,0.4);
            --page-flip: #3d2c15;
            --img-bg: linear-gradient(135deg, #6b3a1f 0%, #3d1a08 100%);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s, color 0.4s;
        }

        /* ── HEADER ── */
        .header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--surface2);
            color: var(--text);
            border: 1.5px solid var(--border);
            transition: all 0.2s;
            line-height: 1;
            white-space: nowrap;
        }
        .btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn:active { transform: scale(0.96); }
        .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.hidden { display: none !important; }

        /* ── MAIN LAYOUT ── */
        .app-wrap {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .main {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
        }

        /* ── MENU SCREENS ── */
        .screen {
            width: 100%;
            max-width: 560px;
            text-align: center;
            animation: fadeUp 0.4s ease;
        }

        .screen h1 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }
        .screen .subtitle {
            color: var(--text2);
            font-style: italic;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
        }

        /* Language picker — 2×2 grid, bigger cards */
        .lang-grid {
            grid-template-columns: repeat(2, 1fr);
            max-width: 420px;
            margin: 0 auto;
            gap: 16px;
        }

        .lang-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 16px 20px;
            cursor: pointer;
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--text);
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }
        .lang-card .flag { font-size: 3rem; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
        .lang-card .lang-name { font-size: 1.1rem; }
        .lang-card .lang-phrase {
            font-size: 0.72rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text2);
            text-align: center;
            line-height: 1.3;
        }
        .lang-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .lang-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 24px var(--shadow); }
        .lang-card:hover .lang-phrase { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 16px;
            cursor: pointer;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .card .card-emoji { font-size: 2rem; line-height: 1; }
        .card:hover {
            border-color: var(--accent);
            background: var(--surface2);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        /* Progress badge */
        .progress-badge {
            font-size: 0.7rem;
            background: var(--accent2);
            color: var(--bg);
            border-radius: 20px;
            padding: 2px 8px;
            font-weight: 600;
        }

        /* ── READER ── */
        #reader {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .reader-inner {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .book-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .book {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 12px 40px var(--shadow), 0 2px 8px var(--shadow);
            border: 1.5px solid var(--border);
        }

        /* Image side */
        .img-side {
            position: relative;
            overflow: hidden;
            background: var(--img-bg);
        }

        .img-side img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s;
        }

        .img-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, rgba(0,0,0,0.3));
            pointer-events: none;
        }

        .img-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
        }
        .img-placeholder .big-emoji { font-size: 5rem; }
        .img-placeholder p { font-family: var(--font-display); font-size: 0.9rem; }

        /* Text side */
        .text-side {
            display: flex;
            flex-direction: column;
            padding: 32px 36px;
            overflow: hidden;
        }

        .chapter-badge {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .chapter-title {
            font-family: var(--font-display);
            font-size: clamp(1.2rem, 2.5vw, 1.9rem);
            font-weight: 800;
            color: var(--text);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .chapter-text {
            flex: 1;
            overflow-y: auto;
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            line-height: 1.75;
            color: var(--text);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            padding-right: 4px;
        }
        .chapter-text::-webkit-scrollbar { width: 4px; }
        .chapter-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Page indicator */
        .page-dots {
            display: flex;
            gap: 6px;
            margin-top: 20px;
            flex-shrink: 0;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }
        .dot.active {
            background: var(--accent);
            width: 20px;
            border-radius: 4px;
        }

        /* ── FOOTER INFANTIL ── */
        .footer-infantil {
            background: var(--surface);
            border-top: 2px solid var(--border);
            padding: 10px 20px;
            z-index: 30;
            flex-shrink: 0; /* Evita que se comprima */
        }
        
        .footer-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        
        .footer-texto {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text2);
        }
        
        .footer-links {
            display: flex;
            gap: 12px;
        }
        
        .footer-links a {
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 4px;
            transition: transform 0.2s;
        }
        
        .footer-links a:hover {
            transform: scale(1.05);
            color: var(--accent2);
        }
        
        /* Ajuste para móviles */
        @media (max-width: 700px) {
            .footer-infantil {
                padding: 8px 12px;
            }
            .footer-container {
                flex-direction: column;
                gap: 6px;
                text-align: center;
            }
            .footer-texto {
                font-size: 0.7rem;
            }
            .footer-links {
                gap: 15px;
            }
        }

        /* ── NAV ── */
        .nav {
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            background: var(--surface);
            color: var(--text);
            border: 2px solid var(--border);
            transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
        .nav-btn.next-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
        .nav-btn.next-btn:hover { background: var(--accent2); border-color: var(--accent2); color: var(--text); }

        .page-counter {
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--text2);
            font-weight: 600;
        }

        /* ── PAGE FLIP ANIMATION ── */
        @keyframes flipOut {
            0%   { transform: rotateY(0deg) scaleX(1); opacity: 1; }
            50%  { transform: rotateY(-15deg) scaleX(0.92); opacity: 0.6; }
            100% { transform: rotateY(0deg) scaleX(1); opacity: 1; }
        }

        .flipping { animation: flipOut 0.5s ease-in-out; }

        /* ── MISC ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        /* ── RESPONSIVE MOBILE ── */
        @media (max-width: 700px) {
            :root {
                --header-h: 52px;
                --nav-h: 60px;
            }
            .app-title { font-size: 1.1rem; }
            .book { grid-template-columns: 1fr; grid-template-rows: 42% 1fr; }
            .text-side { padding: 16px 20px; }
            .chapter-title { margin-bottom: 12px; }
            .page-dots { margin-top: 12px; }
            .nav-btn { padding: 9px 16px; font-size: 0.85rem; }
            .main { padding: 8px 10px; }
            .lang-grid { max-width: 100%; gap: 12px; }
            .lang-card { padding: 20px 10px 16px; }
            .lang-card .flag { font-size: 2.4rem; }
            .lang-card .lang-name { font-size: 1rem; }
        }

        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr 1fr; }
            .card { padding: 16px 10px; font-size: 0.9rem; }
        }
    </style>
</head>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ════════════════════════════════════════════════
//  LOAD & PARSE cuentos.md
// ════════════════════════════════════════════════
let RAW_STORIES = [];

const FALLBACK_STORIES = [
    {
        id: 0, lang: 'ES', title: 'La Tortuga y el Conejo', emoji: '🐢',
        chapters: [
            { title: 'El Gran Reto', image: 'https://ririro.com/wp-content/uploads/2024/08/la-liebre-y-la-tortuga-1536x1536.jpg', text: 'Había una vez un conejo muy presumido que siempre se burlaba de la tortuga por ser tan lenta. Pasaba corriendo, le decía que no estorbara y la hacía sentir muy mal.' },
            { title: 'La Carrera del Siglo', image: 'https://ririro.com/wp-content/uploads/2024/08/la-liebre-y-la-tortuga-2-1536x1536.jpg', text: 'Un día, la tortuga, cansada de las bromas, lo desafió a una carrera. Todos los animales del bosque se reunieron para ver quién ganaría.' },
            { title: 'Una Siesta Inesperada', image: 'https://ririro.com/wp-content/uploads/2024/08/la-liebre-y-la-tortuga-3-770x770.jpg', text: 'El conejo salió corriendo y pronto dejó a la tortuga muy atrás. Confiado en su velocidad, decidió tomar una siesta bajo un árbol. La tortuga siguió paso a paso, sin detenerse.' },
            { title: 'El Sabor de la Victoria', image: 'https://ririro.com/wp-content/uploads/2024/08/la-liebre-y-la-tortuga-4-770x770.jpg', text: '¡La tortuga cruzó la meta mientras el conejo aún dormía! Todos la felicitaron. El conejo se disculpó y prometió no burlarse de nadie nunca más.' }
        ]
    },
    {
        id: 1, lang: 'EN', title: 'The Brave Little Seed', emoji: '🌻',
        chapters: [
            { title: 'Deep in the Ground', image: 'https://imgv2-1-f.scribdassets.com/img/document/858239248/original/961f5aa486/1?v=1', text: 'Once there was a tiny seed living under the dark soil. She was a bit scared of the big world outside. "Wait for the sun," whispered the Earth. So the little seed waited and drank the cool rainwater.' },
            { title: 'Reaching for the Sun', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6W796ltiMQerPa0gTOknyc6cFBzk6uo1-Ig&s', text: 'One morning, she felt a warm touch — it was the Sun! She pushed and pushed until she popped out of the ground. She was no longer a tiny seed; she had become a beautiful, bright yellow sunflower.' }
        ]
    }
];

async function loadCuentos() {
    let usedFallback = false;
    try {
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 4000); // 4s timeout
        let res;
        try {
            res = await fetch('cuentos.md?' + Date.now(), { signal: controller.signal });
        } catch(_) { throw new Error('fetch_failed'); }
        clearTimeout(tid);

        if (!res.ok) throw new Error('not_ok');

        let text;
        try { text = await res.text(); } catch(_) { throw new Error('read_failed'); }

        let parsed;
        try { parsed = parseTxt(text); } catch(_) { throw new Error('parse_failed'); }

        if (!parsed.length) throw new Error('empty');
        RAW_STORIES = parsed;
    } catch(e) {
        console.warn('cuentos.md no disponible (' + e.message + '), usando ejemplos.');
        RAW_STORIES = FALLBACK_STORIES;
        usedFallback = true;
    }

    try {
        init(usedFallback);
    } catch(e) {
        console.error('Error en init:', e);
    }
}

function parseTxt(raw) {
    // Split on story headers "# Title [LANG]"
    const storyBlocks = raw.split(/\n(?=# )/).filter(s => s.trim());
    const EMOJI_MAP = {
        'tortuga':'🐢','liebre':'🐇','conejo':'🐇','tortoise':'🐢','hare':'🐇',
        'astronauta':'🚀','dragón':'🐉','dragon':'🐉',
        'seed':'🌻','cat':'🐱','puss':'🐱','gato':'🐱',
        'moon':'🌙','umbrella':'☂️',
        'lion':'🦁','león':'🦁','leão':'🦁',
        'mouse':'🐭','ratón':'🐭','rato':'🐭',
        'pigs':'🐷','cerditos':'🐷','porquinhos':'🐷','cochons':'🐷',
        'riding hood':'🧣','caperucita':'🧣','chapeuzinho':'🧣','chaperon':'🧣',
        'duckling':'🦢','patito':'🦢','patinho':'🦢','canard':'🦢',
        'boots':'👢','botas':'👢',
        'tartaruga':'🐢','lebre':'🐇',
        'default':'📖'
    };

    return storyBlocks.map((block, idx) => {
        const lines = block.split('\n');
        const headerLine = lines.shift().replace(/^#\s*/, '').trim();
        const langMatch = headerLine.match(/\[([A-Z]{2})\]/);
        const lang = langMatch ? langMatch[1] : 'ES';
        const title = headerLine.replace(/\[.*?\]/, '').trim();

        // Pick emoji from title keywords
        const titleLow = title.toLowerCase();
        const emoji = Object.entries(EMOJI_MAP).find(([k]) => titleLow.includes(k))?.[1] ?? '📖';

        // Split remaining text into chapters on "## "
        const chapBlocks = lines.join('\n').split(/\n(?=## )/).filter(c => c.trim());

        const chapters = chapBlocks.map((chap, ci) => {
            const chapLines = chap.split('\n');
            const chapTitle = chapLines.shift().replace(/^##\s*/, '').trim();

            const imgMatch = chap.match(/!\[.*?\]\((.+?)\)/);
            const rawUrl = imgMatch ? imgMatch[1].trim() : null;
            const image = rawUrl && rawUrl !== 'URL_DE_TU_IMAGEN' ? rawUrl : null;

            const text = chapLines
                .filter(l => l.trim() && !l.trim().startsWith('!['))
                .join(' ')
                .trim();

            return { title: chapTitle, image, text };
        });

        return { id: idx, lang, title, emoji, chapters };
    });
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let currentLang = null;
let currentStory = null;
let currentPage = 0;

// ════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════
let flipAudio = null;
let audioCtx = null;
let mp3Failed = false;

function playArpeggio() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50];
        const master = audioCtx.createGain();
        master.gain.value = 0.18;
        master.connect(audioCtx.destination);
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const env = audioCtx.createGain();
            const t = now + i * 0.07;
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t);
            env.gain.setValueAtTime(0, t);
            env.gain.linearRampToValueAtTime(0.9, t + 0.02);
            env.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
            const osc2 = audioCtx.createOscillator();
            const env2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 2, t);
            env2.gain.setValueAtTime(0, t);
            env2.gain.linearRampToValueAtTime(0.25, t + 0.01);
            env2.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
            osc.connect(env);  env.connect(master);
            osc2.connect(env2); env2.connect(master);
            osc.start(t);  osc.stop(t + 0.55);
            osc2.start(t); osc2.stop(t + 0.3);
        });
    } catch(e) {}
}

function playFlip() {
    if (mp3Failed) { playArpeggio(); return; }
    try {
        if (!flipAudio) {
            flipAudio = new Audio('cuentos.mp3');
            flipAudio.volume = 0.7;
            flipAudio.onerror = () => { mp3Failed = true; flipAudio = null; playArpeggio(); };
        }
        flipAudio.currentTime = 0;
        flipAudio.play().catch(() => { mp3Failed = true; playArpeggio(); });
    } catch(e) { mp3Failed = true; playArpeggio(); }
}

// ════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════
window.addEventListener('keydown', (e) => {
    if (document.getElementById('reader').style.display === 'none') return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); prevPage(); }
    if (e.key === 'ArrowUp')    { e.preventDefault(); goFirstPage(); }
});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
// Phrase shown on each language card (in that language)
const LANG_PHRASES = {
    ES: '«Había una vez…»',
    EN: '"Once upon a time…"',
    PT: '«Era uma vez…»',
    FR: '«Il était une fois…»'
};

function init(demo = false) {
    loadState();
    buildLangMenu(demo);
}

function buildLangMenu(demo = false) {
    const langs = [...new Set(RAW_STORIES.map(s => s.lang))];
    document.getElementById('langGrid').innerHTML = langs.map(l => {
        const m = LANG_META[l] || { emoji: '🌐', label: l };
        const phrase = LANG_PHRASES[l] || '';
        return `<div class="lang-card" onclick="selectLang('${l}')">
            <span class="flag">${m.emoji}</span>
            <span class="lang-name">${m.label}</span>
            <span class="lang-phrase">${phrase}</span>
        </div>`;
    }).join('');

    const sub = document.getElementById('langSubtitle');
    if (demo) sub.textContent = '⚠️ Modo demo · cuentos.md no encontrado';
}

function selectLang(lang) {
    currentLang = lang;
    saveState();
    pushState('story');
    showStoryMenu();
}

function showStoryMenu() {
    if (window.lockTouchBriefly) lockTouchBriefly();
    const meta = LANG_META[currentLang] || { menuTitle: 'Stories', menuSub: '', emoji: '🌐', label: currentLang };
    document.getElementById('storyMenuTitle').textContent = meta.menuTitle;
    document.getElementById('storyMenuSub').textContent = meta.menuSub;

    const stories = RAW_STORIES.filter(s => s.lang === currentLang);
    const state = loadStateObj();

    document.getElementById('storyGrid').innerHTML = stories.map((s) => {
        const saved = state.progress?.[s.id];
        const badge = saved > 0
            ? `<span class="progress-badge">${meta.chapterWord} ${saved + 1}/${s.chapters.length}</span>` : '';
        return `<div class="card" onclick="startStory(${s.id})">
            <span class="card-emoji">${s.emoji}</span>
            <span>${s.title}</span>
            ${badge}
        </div>`;
    }).join('');

    show('storyScreen');
    hide('langScreen');
    hide('reader');
    document.getElementById('backBtn').classList.remove('hidden');
}

function startStory(id) {
    if (window.lockTouchBriefly) lockTouchBriefly();
    currentStory = RAW_STORIES.find(s => s.id === id);
    const state = loadStateObj();
    currentPage = state.progress?.[id] ?? 0;
    if (currentPage >= currentStory.chapters.length) currentPage = 0;

    hide('storyScreen');
    const reader = document.getElementById('reader');
    reader.style.display = 'flex';
    reader.style.flexDirection = 'column';
    reader.style.width = '100%';
    reader.style.height = '100%';

    pushState('reader');
    buildDots();
    renderPage(false);
    saveState();
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
const GRADIENTS = [
    'linear-gradient(135deg,#f5a623,#e05c1a)',
    'linear-gradient(135deg,#6dd5fa,#2980b9)',
    'linear-gradient(135deg,#a8edea,#fed6e3)',
    'linear-gradient(135deg,#d4fc79,#96e6a1)',
    'linear-gradient(135deg,#fccb90,#d57eeb)',
    'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    'linear-gradient(135deg,#f093fb,#f5576c)',
    'linear-gradient(135deg,#4facfe,#00f2fe)',
];

const CHAPTER_EMOJIS = ['🌟','🌙','🚀','🌈','🦋','🌸','⭐','🔮'];

function buildDots() {
    document.getElementById('pageDots').innerHTML =
        currentStory.chapters.map((_, i) => `<div class="dot" id="dot-${i}"></div>`).join('');
}

function renderPage(animate = true) {
    const chap = currentStory.chapters[currentPage];
    const book  = document.getElementById('book');

    const doRender = () => {
        // ── IMAGE ──
        const imgEl      = document.getElementById('pageImg');
        const placeholder = document.getElementById('imgPlaceholder');
        const imgSide    = document.getElementById('imgSide');

        imgSide.style.background = GRADIENTS[currentPage % GRADIENTS.length];

        if (chap.image) {
            placeholder.style.display = 'none';
            imgEl.style.opacity = '0';

            // Reset src to force reload and guarantee onload fires even if cached
            imgEl.src = '';
            imgEl.onload  = () => { imgEl.style.opacity = '1'; };
            imgEl.onerror = () => {
                imgEl.style.opacity = '0';
                placeholder.style.display = 'flex';
                placeholder.querySelector('.big-emoji').textContent =
                    CHAPTER_EMOJIS[currentPage % CHAPTER_EMOJIS.length];
            };
            imgEl.src = chap.image;

            // If already cached, onload won't fire — force it
            if (imgEl.complete && imgEl.naturalWidth > 0) {
                imgEl.style.opacity = '1';
                placeholder.style.display = 'none';
            }
        } else {
            imgEl.src = '';
            imgEl.style.opacity = '0';
            placeholder.style.display = 'flex';
            placeholder.querySelector('.big-emoji').textContent =
                CHAPTER_EMOJIS[currentPage % CHAPTER_EMOJIS.length];
        }

        const meta = LANG_META[currentLang] || LANG_META['ES'];
        // ── TEXT ──
        const total = currentStory.chapters.length;
        document.getElementById('chapterBadge').textContent = `${meta.chapterWord} ${currentPage + 1}`;
        document.getElementById('pageTitle').textContent = chap.title;
        document.getElementById('pageText').textContent  = chap.text;

        // ── DOTS ──
        document.querySelectorAll('.dot').forEach((d, i) =>
            d.classList.toggle('active', i === currentPage));

        // ── COUNTER & BUTTONS ──
        document.getElementById('pageCounter').textContent = `${currentPage + 1} / ${total}`;
        document.getElementById('prevBtn').disabled  = currentPage === 0;
        document.getElementById('firstBtn').disabled = currentPage === 0;
        document.getElementById('prevBtn').textContent  = meta.prev;
        document.getElementById('firstBtn').textContent = meta.first;

        const nextBtn = document.getElementById('nextBtn');
        const isLast  = currentPage === total - 1;
        nextBtn.textContent = isLast ? meta.moreStories : meta.next;
        nextBtn.classList.toggle('next-btn', !isLast);
        nextBtn.style.background   = isLast ? '#27ae60' : '';
        nextBtn.style.borderColor  = isLast ? '#27ae60' : '';
        nextBtn.style.color        = isLast ? '#fff'    : '';
    };

    if (animate) {
        book.classList.add('flipping');
        playFlip();
        setTimeout(doRender, 160);
        setTimeout(() => book.classList.remove('flipping'), 500);
    } else {
        doRender();
    }
}

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
function nextPage() {
    if (currentPage < currentStory.chapters.length - 1) {
        currentPage++;
        renderPage();
        saveState();
    } else {
        // Story complete: reset progress to 0 so next visit starts fresh
        currentPage = 0;
        saveState();
        // Small delay before showing menu to avoid ghost-click / tap-through
        // landing on a story card at the same screen position
        setTimeout(() => showStoryMenu(), 120);
    }
}

function prevPage() {
    if (currentPage > 0) { currentPage--; renderPage(); saveState(); }
}

function goFirstPage() {
    if (!currentStory || currentPage === 0) return;
    currentPage = 0;
    renderPage();
    saveState();
}

function goBack() {
    history.back();
}

// ════════════════════════════════════════════════
//  THEME
// ════════════════════════════════════════════════
function toggleTheme() {
    const next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', next);
    document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀️';
    saveState();
}

// ════════════════════════════════════════════════
//  PERSISTENCE
// ════════════════════════════════════════════════
function loadStateObj() {
    try { return JSON.parse(localStorage.getItem('cuentos_v2')) || {}; }
    catch(e) { return {}; }
}

function saveState() {
    try {
        const state = loadStateObj();
        state.theme = document.body.getAttribute('data-theme');
        state.lang  = currentLang;
        if (currentStory) {
            if (!state.progress) state.progress = {};
            state.progress[currentStory.id] = currentPage;
        }
        localStorage.setItem('cuentos_v2', JSON.stringify(state));
    } catch(e) {}
}

function loadState() {
    const state = loadStateObj();
    if (state.theme) {
        document.body.setAttribute('data-theme', state.theme);
        document.getElementById('themeBtn').textContent = state.theme === 'light' ? '🌙' : '☀️';
    }
    if (state.lang) currentLang = state.lang;
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) {
    const el = document.getElementById(id);
    if (id === 'reader') el.style.display = 'none';
    else el.classList.add('hidden');
}

// ════════════════════════════════════════════════
//  HISTORY API — back button support
// ════════════════════════════════════════════════
function pushState(screen) {
    // screen: 'lang' | 'story' | 'reader'
    history.pushState({ screen }, '');
}

window.addEventListener('popstate', (e) => {
    const screen = e.state?.screen;
    if (screen === 'reader' || screen === 'story') {
        // Going back from reader → story list
        if (document.getElementById('reader').style.display !== 'none') {
            saveState();
            hide('reader');
            showStoryMenu();
            // don't push again, the popstate already moved back
        } else if (!document.getElementById('storyScreen').classList.contains('hidden')) {
            hide('storyScreen');
            show('langScreen');
            document.getElementById('backBtn').classList.add('hidden');
        }
    } else {
        // lang screen — nothing behind it
        hide('storyScreen');
        hide('reader');
        show('langScreen');
        document.getElementById('backBtn').classList.add('hidden');
    }
});

// ════════════════════════════════════════════════
//  TOUCH — swipe left/right + tap to advance
// ════════════════════════════════════════════════
(function setupTouch() {
    let startX = 0, startY = 0, startT = 0;
    const SWIPE_MIN = 50;
    const SWIPE_MAX_Y = 80;
    const TAP_MAX_DIST = 10;
    const TAP_MAX_MS   = 250;
    let locked = false; // blocks ghost clicks during screen transitions

    const book = () => document.getElementById('book');

    // Call this whenever we switch screens to block stray taps for 350ms
    window.lockTouchBriefly = () => {
        locked = true;
        setTimeout(() => { locked = false; }, 350);
    };

    function onTouchStart(e) {
        startX = e.changedTouches[0].clientX;
        startY = e.changedTouches[0].clientY;
        startT = Date.now();
    }

    function onTouchEnd(e) {
        if (locked) return;
        if (document.getElementById('reader').style.display === 'none') return;

        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        const dt = Date.now() - startT;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (absDx >= SWIPE_MIN && absDy < SWIPE_MAX_Y) {
            if (dx < 0) nextPage();
            else        prevPage();
            return;
        }

        if (dt < TAP_MAX_MS && absDx < TAP_MAX_DIST && absDy < TAP_MAX_DIST) {
            if (!e.target.closest('button, a')) {
                nextPage();
            }
        }
    }

    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchend',   onTouchEnd,   { passive: true });
})();

window.addEventListener('load', loadCuentos);
