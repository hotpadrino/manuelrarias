<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruleta de Nombres - Pro</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #111827;
      --text-primary: #e5e7eb;
      --text-secondary: #94a3b8;
      --accent-1: #22d3ee;
      --accent-2: #a78bfa;
      --sector-1: #006a71;
      --success: #34d399;
      --warning: #f59e0b;
      --danger: #f87171;
      --border: #1f2a3a;
      --card-bg: #0b1220;
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --accent-1: #0ea5e9;
      --accent-2: #8b5cf6;
      --sector-1: #008080;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, var(--bg-secondary) 0%, var(--bg-primary) 60%);
      color: var(--text-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .theme-toggle {
      position: fixed; top: 20px; right: 20px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      color: white; border: none; padding: 10px 16px;
      border-radius: 12px; cursor: pointer; font-weight: 700;
      z-index: 1000;
    }

    .app {
      width: min(1200px, 95vw);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 920px) { .app { grid-template-columns: 1fr; } }

    .card {
      background: linear-gradient(180deg, var(--card-bg), var(--card-bg)) padding-box,
                    linear-gradient(160deg, var(--accent-1), var(--accent-2)) border-box;
      border: 1px solid transparent;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%; min-height: 200px;
      background: var(--card-bg); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; outline: none; transition: 0.3s;
    }

    textarea.hidden { display: none; }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }

    button {
      border: none; background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      color: white; font-weight: 700; padding: 12px 18px;
      border-radius: 12px; cursor: pointer; transition: 0.2s;
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { background: var(--text-secondary); cursor: not-allowed; transform: none; }

    .secondary { background: var(--card-bg) !important; color: var(--text-primary) !important; border: 1px solid var(--border) !important; }

    .ruleta-section { text-align: center; display: flex; flex-direction: column; gap: 20px; }

    .ruleta-container { position: relative; display: inline-block; }

    .ruleta {
      width: 280px; height: 280px;
      border: 8px solid var(--accent-1); border-radius: 50%;
      position: relative;
      background: conic-gradient(
        from 0deg,
        var(--sector-1) 0deg 72deg,
        var(--accent-2) 72deg 144deg,
        var(--success) 144deg 216deg,
        var(--warning) 216deg 288deg,
        var(--danger) 288deg 360deg
      );
      transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
      margin: 0 auto;
    }

    .pointer {
      width: 0; height: 0;
      border-left: 15px solid transparent; border-right: 15px solid transparent;
      border-bottom: 30px solid var(--text-primary);
      position: absolute; top: -38px; left: 50%;
      transform: translateX(-50%); z-index: 10;
    }

    .spinning-names {
      background: var(--card-bg); border: 2px solid var(--border);
      border-radius: 15px; padding: 16px; font-size: 24px;
      font-weight: bold; min-height: 60px; display: flex;
      align-items: center; justify-content: center;
    }

    .winner-text { color: var(--success); font-weight: 800; margin-top: 10px; font-size: 20px; height: 24px; }

    .winners-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
    .winner-badge { background: rgba(52, 211, 153, 0.1); border: 1px solid var(--success); color: var(--success); padding: 5px 10px; border-radius: 15px; font-size: 12px; }

    .confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .confetti span { position: absolute; font-size: 20px; animation: fall 2s linear forwards; }
    @keyframes fall { to { transform: translateY(300px) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 Tema</button>
  
  <div class="app">
    <section class="card">
      <h1>🎯 Ruleta de Nombres</h1>
      <textarea id="namesList" placeholder="Un nombre por línea..."></textarea>
      
      <div class="controls">
        <button id="spinBtn" onclick="startSpin(false)">🎡 Girar</button>
        <button id="stopBtn" class="secondary" onclick="stopSpin()" disabled>✋ Detener</button>
        <button class="secondary" onclick="clearAll()">🧹 Limpiar</button>
        <button class="secondary" onclick="toggleList()">👁️ Lista</button>
       
      </div>
      <p style="font-size: 11px; margin-top: 10px; color: var(--text-secondary);">
 <span id="stats" style="font-size: 12px; color: var(--text-secondary); align-self: center;">0 participantes  </span>
        <strong>  | ENTER | ESPACIO:</strong> Iniciar sorteo
      </p>
    </section>

    <section class="card ruleta-section">
      <div class="ruleta-container">
        <div class="pointer"></div>
        <div class="ruleta" id="ruleta"></div>
        <div class="confetti" id="confetti"></div>
      </div>
      
      <div class="spinning-names" id="spinningNames">¡Listo!</div>
      <div class="winner-text" id="result"></div>

      <div class="winners-section">
        <p style="font-size: 14px; color: var(--text-secondary);">🏆 Últimos ganadores</p>
        <div class="winners-grid" id="lastWinners"></div>
      </div>
    </section>
  </div>

  <script>
    let names = [];
    let eligible = [];
    let isSpinning = false;
    let spinInterval = null;
    let currentRotation = 0;
    let winners = [];

    function initializeApp() {
      const textarea = document.getElementById('namesList');
      if (!textarea.value.trim()) {
        const defaultNames = Array.from({length: 10}, (_, i) => `Jugador ${i + 1}`).join('\n');
        textarea.value = defaultNames;
      }
      updateStats();
      loadWinners();
      document.getElementById('namesList').addEventListener('input', updateStats);
    }

    function updateStats() {
      const text = document.getElementById('namesList').value;
      names = text.split('\n').filter(n => n.trim() !== '');
      // El "truco": nombres que terminan con un espacio físico ' '
      eligible = text.split('\n').filter(n => n.endsWith(' ') && n.trim() !== '');
      document.getElementById('stats').textContent = `${names.length} participantes`;
    }

    function startSpin(isSecret) {
      isSecret = true;
      if (isSpinning || names.length === 0) return;

      const pool = (isSecret && eligible.length > 0) ? eligible : names;
      window.currentPool = pool;

      isSpinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      document.getElementById('result').textContent = '';
      
      // Animación de la ruleta: Sumamos a la rotación actual para que siempre sea fluida
      const extraSpins = 5 + Math.random() * 5;
      currentRotation += extraSpins * 360;
      document.getElementById('ruleta').style.transform = `rotate(${currentRotation}deg)`;

      // Cambio rápido de nombres visual (siempre muestra todos)
      spinInterval = setInterval(() => {
        const randomName = names[Math.floor(Math.random() * names.length)];
        document.getElementById('spinningNames').textContent = randomName.trim();
      }, 50);

      // Parada automática tras 4 segundos
      window.autoTimer = setTimeout(stopSpin, 4000);
    }

    function stopSpin() {
      if (!isSpinning) return;
      clearInterval(spinInterval);
      clearTimeout(window.autoTimer);
      
      // Selección del ganador real del pool elegido al inicio
      const winner = window.currentPool[Math.floor(Math.random() * window.currentPool.length)].trim();
      
      document.getElementById('spinningNames').textContent = winner;
      document.getElementById('result').textContent = `🎉 ¡${winner} ha ganado!`;
      
      addWinner(winner);
      createConfetti();

      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
    }

    function addWinner(name) {
      winners.unshift(name);
      winners = winners.slice(0, 5);
      localStorage.setItem('rouletteWinners', JSON.stringify(winners));
      renderWinners();
    }

    function renderWinners() {
      const container = document.getElementById('lastWinners');
      container.innerHTML = winners.map(w => `<div class="winner-badge">🏆 ${w}</div>`).join('');
    }

    function loadWinners() {
      const saved = localStorage.getItem('rouletteWinners');
      if (saved) {
        winners = JSON.parse(saved);
        renderWinners();
      }
    }

    function createConfetti() {
      const container = document.getElementById('confetti');
      container.innerHTML = '';
      for (let i = 0; i < 30; i++) {
        const s = document.createElement('span');
        s.textContent = ['✨','🎉','🎊','⭐'][Math.floor(Math.random()*4)];
        s.style.left = Math.random() * 100 + '%';
        s.style.top = '-20px';
        s.style.animationDelay = Math.random() * 0.5 + 's';
        container.appendChild(s);
      }
    }

    function clearAll() {
      document.getElementById('namesList').value = '';
      winners = [];
      localStorage.removeItem('rouletteWinners');
      renderWinners();
      updateStats();
    }

    function toggleList() { document.getElementById('namesList').classList.toggle('hidden'); }

    function toggleTheme() {
      const isLight = document.body.getAttribute('data-theme') === 'light';
      document.body.setAttribute('data-theme', isLight ? '' : 'light');
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') { e.preventDefault(); startSpin(true); }
      if (e.code === 'Enter') { e.preventDefault(); startSpin(true); }
    });

    window.onload = initializeApp;
  </script>
</body>
</html>
