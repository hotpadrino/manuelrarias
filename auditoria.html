<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auditoría Digital - Aripar</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text: #2c3e50;
            --primary: #0056b3; --secondary: #6c757d; --border: #dee2e6;
            --modal-bg: rgba(0,0,0,0.9);
        }
        [data-theme="dark"] {
            --bg-body: #1a1a1a; --bg-card: #2d2d2d; --text: #ecf0f1;
            --primary: #3498db; --border: #444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        
        /* UI Elements */
        .header-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 25px; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); width: 100%; box-sizing: border-box; }
        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg-card); padding: 10px 0; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        
        .question-card { border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; page-break-inside: avoid; }
        .combo-res { font-weight: bold; border: 2px solid var(--primary); margin-top: 10px; }
        
        /* Sección de Firmas */
        .signature-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; }
        .sig-block { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .sig-display { width: 200px; height: 80px; border-bottom: 1px solid #000; margin-bottom: 10px; display: flex; align-items: flex-end; justify-content: center; }
        .sig-display img { max-height: 100%; max-width: 100%; }
        .sig-data { font-size: 14px; line-height: 1.4; }
        .sig-role { font-weight: bold; text-transform: uppercase; color: var(--primary); margin-bottom: 5px; border: none; text-align: center; background: transparent; }

        /* Modal */
        .sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 10001; flex-direction: column; }
        .modal-body { flex: 1; background: #fff; margin: 20px; border-radius: 10px; position: relative; }
        #signature-pad { position: absolute; left: 0; top: 0; width: 100%; height: 100%; cursor: crosshair; }

        /* Botones */
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; }
        .btn-save { background: #27ae60; color: white; }
        .btn-pdf { background: #c0392b; color: white; }
        .btn-danger { background: #e74c3c; color: white; font-size: 11px; }
        
        .progress-bar { height: 20px; background: #27ae60; text-align: center; color: white; font-size: 12px; border-radius: 10px; transition: 0.5s; }
        .hidden { display: none !important; }

        /* --- CONFIGURACIÓN DE IMPRESIÓN --- */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; }
            .btn, .search-container, #fileInput, label[for="fileInput"], .sig-modal, .btn-danger, #auditSelector, #chart-container, .theme-btn { 
                display: none !important; 
            }
            .question-card { border: none; border-bottom: 1px solid #eee; padding: 10px 0; }
            textarea { border: none; resize: none; overflow: hidden; padding: 0; }
            select { border: none; appearance: none; -webkit-appearance: none; font-weight: bold; padding: 0; }
            .sig-role { color: black; border: none; }
            .sig-block { page-break-inside: avoid; }
            .progress-bar { border: 1px solid #27ae60; color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">📋 Auditoría Aripar</h2>
        <div class="theme-btn">
            <button onclick="toggleTheme()" class="btn" style="border:1px solid #ccc">🌓</button>
            <button onclick="clearAll()" class="btn btn-danger">🗑️ Limpiar</button>
        </div>
    </div>

    <div class="header-grid">
        <input type="text" id="empresa" placeholder="Empresa Auditada" oninput="save()">
        <input type="text" id="departamento" placeholder="Área / Proceso" oninput="save()">
        <input type="date" id="fecha" oninput="save()">
        <select id="auditSelector" onchange="renderChecklist()"></select>
        <input type="file" id="fileInput" accept=".txt" style="display:none;">
        <label for="fileInput" class="btn" style="border:1px solid #ccc; text-align:center; cursor:pointer; font-size:12px;">Cargar Normas .txt</label>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="🔍 Buscar..." oninput="filter()">
        <small id="results-counter"></small>
    </div>

    <div id="checklist"></div>

    <div id="chart-container" style="margin-top: 30px; height: 250px;">
        <canvas id="chart"></canvas>
    </div>

    <div style="margin: 20px 0;">
        <div style="background: #eee; border-radius: 10px;"><div id="mainProgress" class="progress-bar" style="width:0%">0%</div></div>
    </div>

    <div class="signature-section">
        <div class="sig-block">
            <div class="sig-display" id="display-sig1">
                <span style="color:#ccc; font-size:12px;" class="btn">Click en "Firmar" abajo</span>
            </div>
            <div class="sig-data">
                <input type="text" id="role-1" class="sig-role" value="Auditor" oninput="save()">
                <input type="text" id="name-1" placeholder="Nombre completo" style="border:none; text-align:center; font-weight:bold;" oninput="save()">
                <input type="text" id="pos-1" placeholder="Cargo / Grado" style="border:none; text-align:center; font-size:12px;" oninput="save()">
            </div>
            <button class="btn btn-main btn-sm" style="margin-top:10px; font-size:11px;" onclick="openSig('sig1')">🖊️ Firmar</button>
        </div>

        <div class="sig-block">
            <div class="sig-display" id="display-sig2">
                <span style="color:#ccc; font-size:12px;" class="btn">Click en "Firmar" abajo</span>
            </div>
            <div class="sig-data">
                <input type="text" id="role-2" class="sig-role" value="Auditado" oninput="save()">
                <input type="text" id="name-2" placeholder="Nombre completo" style="border:none; text-align:center; font-weight:bold;" oninput="save()">
                <input type="text" id="pos-2" placeholder="Cargo / Grado" style="border:none; text-align:center; font-size:12px;" oninput="save()">
            </div>
            <button class="btn btn-main btn-sm" style="margin-top:10px; font-size:11px;" onclick="openSig('sig2')">🖊️ Firmar</button>
        </div>
    </div>

    <div style="margin-top: 40px; display: flex; gap: 10px;" class="btn-group">
        <button class="btn btn-save" style="flex:1" onclick="save()">💾 Guardar Progreso</button>
        <button class="btn btn-pdf" style="flex:2" onclick="printReport()">📄 Abrir Vista de Impresión (PDF)</button>
    </div>
</div>

<div id="sig-modal" class="sig-modal">
    <div class="modal-body"><canvas id="signature-pad"></canvas></div>
    <div style="display: flex; gap: 10px; padding: 20px; justify-content: center;">
        <button class="btn" style="background:#666; color:white;" onclick="closeSig()">Cancelar</button>
        <button class="btn btn-main" onclick="acceptSig()">Aceptar Firma</button>
    </div>
</div>

<script>
    const defaultData = { "ISO 9001": { "General": ["¿Pregunta de ejemplo?"] } };
    let auditData = defaultData, chart = null, signaturePad, currentTarget = null, sigs = { sig1: null, sig2: null };

    window.onload = () => {
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
        load();
        updateSels();
        render();
    };

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }

    function clearAll() {
        if(confirm("¿Borrar todo?")) { localStorage.removeItem('aripar_audit_v7'); location.reload(); }
    }

    function openSig(id) {
        currentTarget = id;
        document.getElementById('sig-modal').style.display = 'flex';
        setTimeout(() => {
            const canvas = document.getElementById('signature-pad');
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }, 100);
    }

    function closeSig() { document.getElementById('sig-modal').style.display = 'none'; }

    function acceptSig() {
        const img = signaturePad.toDataURL();
        sigs[currentTarget] = img;
        document.getElementById(`display-${currentTarget}`).innerHTML = `<img src="${img}">`;
        closeSig();
        save();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const lines = this.result.split('\n');
            let curA = "", curS = "";
            auditData = {};
            lines.forEach(l => {
                const line = l.trim();
                if(line.startsWith('##')) {
                    curS = line.replace('##','').trim();
                    if(curA) auditData[curA][curS] = [];
                } else if(line.startsWith('#')) {
                    curA = line.replace('#','').trim();
                    auditData[curA] = {};
                } else if(line && curA && curS) {
                    auditData[curA][curS].push(line);
                }
            });
            updateSels();
            render();
        };
        reader.readAsText(e.target.files[0]);
    });

    function updateSels() {
        const sel = document.getElementById('auditSelector');
        sel.innerHTML = Object.keys(auditData).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function render() {
        const audit = document.getElementById('auditSelector').value;
        const container = document.getElementById('checklist');
        container.innerHTML = "";
        if(!auditData[audit]) return;

        Object.keys(auditData[audit]).forEach(sec => {
            let html = `<h3 style="color:var(--primary); margin-top:25px; border-bottom:1px solid var(--border);">${sec}</h3>`;
            auditData[audit][sec].forEach((q, i) => {
                const id = `q_${audit}_${sec}_${i}`.replace(/\s+/g,'_');
                html += `
                    <div class="question-card" data-section="${sec}">
                        <div class="question-text" style="font-weight:bold;">${q}</div>
                        <select id="res_${id}" class="combo-res" onchange="updateUI('${id}')">
                            <option value="">-- Resultado --</option>
                            <option value="C">Conforme</option>
                            <option value="NCMenor">NC Menor</option>
                            <option value="NCMayor">NC Mayor</option>
                            <option value="NA">No Aplica</option>
                        </select>
                        <textarea id="obs_${id}" placeholder="Evidencias y notas..." style="margin-top:10px;" oninput="save()"></textarea>
                    </div>`;
            });
            container.innerHTML += html;
        });
        loadResponses();
        calculate();
    }

    function updateUI(id) { calculate(); save(); }

    function filter() {
        const term = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.question-card');
        let visible = 0;
        cards.forEach(c => {
            const q = c.querySelector('.question-text').innerText.toLowerCase();
            const n = c.querySelector('textarea').value.toLowerCase();
            const match = q.includes(term) || n.includes(term);
            c.classList.toggle('hidden', !match);
            if(match) visible++;
        });
        document.getElementById('results-counter').innerText = `Mostrando ${visible} de ${cards.length}`;
    }

    function calculate() {
        const cards = document.querySelectorAll('.question-card');
        let total = 0, ok = 0;
        const stats = {};
        cards.forEach(c => {
            const sec = c.getAttribute('data-section');
            const res = c.querySelector('.combo-res').value;
            if(!stats[sec]) stats[sec] = {t:0, c:0};
            if(res && res !== 'NA') {
                stats[sec].t++; total++;
                if(res === 'C') { stats[sec].c++; ok++; }
            }
        });
        const p = total === 0 ? 0 : Math.round((ok/total)*100);
        document.getElementById('mainProgress').style.width = p + "%";
        document.getElementById('mainProgress').innerText = p + "% Cumplimiento";
        renderChart(stats);
    }

    function renderChart(stats) {
        const labels = Object.keys(stats);
        const data = labels.map(l => stats[l].t === 0 ? 0 : Math.round((stats[l].c/stats[l].t)*100));
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: { labels, datasets: [{ label: '%', data, backgroundColor: '#0056b3' }] },
            options: { maintainAspectRatio: false }
        });
    }

    function save() {
        const data = {
            meta: { 
                e: document.getElementById('empresa').value, 
                d: document.getElementById('departamento').value,
                f: document.getElementById('fecha').value,
                sel: document.getElementById('auditSelector').value,
                r1: document.getElementById('role-1').value, n1: document.getElementById('name-1').value, p1: document.getElementById('pos-1').value,
                r2: document.getElementById('role-2').value, n2: document.getElementById('name-2').value, p2: document.getElementById('pos-2').value
            },
            res: {}, sigs: sigs
        };
        document.querySelectorAll('.combo-res').forEach(s => data.res[s.id] = s.value);
        document.querySelectorAll('textarea').forEach(t => data.res[t.id] = t.value);
        localStorage.setItem('aripar_audit_v7', JSON.stringify(data));
    }

    function load() {
        const s = JSON.parse(localStorage.getItem('aripar_audit_v7'));
        if(!s) return;
        document.getElementById('empresa').value = s.meta.e || '';
        document.getElementById('departamento').value = s.meta.d || '';
        document.getElementById('fecha').value = s.meta.f || '';
        document.getElementById('role-1').value = s.meta.r1 || 'Auditor';
        document.getElementById('name-1').value = s.meta.n1 || '';
        document.getElementById('pos-1').value = s.meta.p1 || '';
        document.getElementById('role-2').value = s.meta.r2 || 'Auditado';
        document.getElementById('name-2').value = s.meta.n2 || '';
        document.getElementById('pos-2').value = s.meta.p2 || '';
        if(s.sigs) {
            sigs = s.sigs;
            if(sigs.sig1) document.getElementById('display-sig1').innerHTML = `<img src="${sigs.sig1}">`;
            if(sigs.sig2) document.getElementById('display-sig2').innerHTML = `<img src="${sigs.sig2}">`;
        }
        window.tempRes = s.res;
    }

    function loadResponses() {
        if(!window.tempRes) return;
        Object.keys(window.tempRes).forEach(key => {
            const el = document.getElementById(key);
            if(el) el.value = window.tempRes[key];
        });
    }

    function printReport() {
        const empresa = document.getElementById('empresa').value || 'Auditoria';
        const now = new Date();
        const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        document.title = `${ts}-${empresa}`;
        window.print();
    }
</script>
</body>
    </html>
