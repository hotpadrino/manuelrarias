<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auditoría Pro — Inversiones Aripar</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn9OTPC90ZXh0Pjwvc3ZnPg==">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #f7f6f3; --surface: #ffffff; --text: #1a1916; --muted: #7a7670;
            --accent: #2d5be3; --border: #e4e0d8; --error: #d93025;
        }
        [data-theme="dark"] {
            --bg: #121212; --surface: #1e1e1e; --text: #e0e0e0; --muted: #a0a0a0;
            --accent: #4d7cff; --border: #333333;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 140px; transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 15px 0; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px; width: 100%; box-sizing: border-box; }

        /* NAVEGACIÓN SLIDER */
        .nav-slider { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav-slider::-webkit-scrollbar { display: none; }
        .nav-btn { padding: 8px 18px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; white-space: nowrap; background: var(--surface); color: var(--muted); font-weight: 600; font-size: 13px; flex-shrink: 0; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* FILA COMPACTA: Resultado + Evidencia */
        .question-card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; gap: 12px; }
        .q-num { font-weight: bold; color: var(--accent); min-width: 25px; }
        .q-body { flex: 1; }
        .q-text { font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .q-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .q-controls select { width: 150px; font-weight: bold; border: 2px solid var(--accent); }
        .q-controls textarea { flex: 1; min-width: 200px; height: 40px; resize: none; }

        /* FIRMAS */
        .sig-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .sig-box { text-align: center; border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: var(--bg); }
        .sig-display { width: 100%; height: 80px; border-bottom: 2px solid var(--text); margin-bottom: 10px; display: flex; align-items: flex-end; justify-content: center; background: white; border-radius: 4px 4px 0 0; }
        .sig-display img { max-height: 100%; }

        .progress-container { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 20px 0; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1916; color: white; text-align: center; padding: 15px 0; font-size: 12px; z-index: 1000; }
        footer a { color: #4d7cff; text-decoration: none; margin: 0 10px; font-weight: bold; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-accent { background: var(--accent); color: white; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; padding: 15px; }
        .modal-content { flex: 1; background: white; border-radius: 12px; position: relative; }
        #sig-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1 style="font-size: 18px; margin:0;">📋 Aripar Audit Studio</h1>
        <div>
            <button class="btn" onclick="toggleTheme()" style="background:none; border:1px solid var(--border);">🌓</button>
            <button class="btn" onclick="clearData()" style="color:var(--error); background:none; font-size: 11px;">🗑️ Reiniciar</button>
        </div>
    </div>

    <div class="header-grid">
        <input type="text" id="empresa" placeholder="Empresa Auditada" oninput="save()">
        <input type="text" id="area" placeholder="Área / Proceso" oninput="save()">
        <input type="date" id="fecha" oninput="save()">
        <select id="auditSelector" onchange="renderChecklist(true)"></select>
        <div style="display:flex;">
            <input type="file" id="fileInput" accept=".txt" style="display:none;" onchange="handleFileUpload(this)">
            <label for="fileInput" class="btn" style="border:1px solid var(--border); font-size:11px; width:100%; text-align:center; cursor:pointer;">📂 Cargar .txt</label>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="🔍 Buscar..." oninput="filter()">
        <span id="results-counter" style="font-size: 11px; font-weight: bold; color: var(--accent); margin-top:5px; display:block;">Cargando...</span>
    </div>

    <div id="sectionSlider" class="nav-slider"></div>
    <div id="checklist"></div>

    <div class="progress-container"><div id="progress-fill"></div></div>
    <div id="chart-container" style="height: 220px;"><canvas id="chart"></canvas></div>

    <div class="sig-section">
        <div class="sig-box">
            <div class="sig-display" id="view-sig1"></div>
            <input type="text" id="name1" placeholder="Nombre Auditor" style="text-align:center; border:none; font-weight:bold;" oninput="save()">
            <button class="btn btn-accent" style="font-size:10px; margin-top:5px;" onclick="openSig('sig1')">Firma Digital</button>
        </div>
        <div class="sig-box">
            <div class="sig-display" id="view-sig2"></div>
            <input type="text" id="name2" placeholder="Nombre Auditado" style="text-align:center; border:none; font-weight:bold;" oninput="save()">
            <button class="btn btn-accent" style="font-size:10px; margin-top:5px;" onclick="openSig('sig2')">Firma Digital</button>
        </div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button class="btn btn-accent" style="flex:1; background:#28a745;" onclick="save()">💾 Guardar Todo</button>
        <button class="btn btn-accent" style="flex:2; background:#dc3545;" onclick="generateReport()">📄 Generar Reporte (PDF)</button>
    </div>
</div>

<footer>
    Inversiones Aripar | <a href="https://wa.me/573128816469" target="_blank">📲 WhatsApp</a> | <a href="mailto:alucard8@gmail.com">✉️ Correo</a>
</footer>

<div id="sigModal" class="modal">
    <div class="modal-content"><canvas id="sig-canvas"></canvas></div>
    <div style="display: flex; gap: 10px; padding: 15px; justify-content: center;">
        <button class="btn" onclick="closeSig()">Cancelar</button>
        <button class="btn btn-accent" onclick="acceptSig()">Guardar Firma</button>
    </div>
</div>

<script>
let auditData = {}, chart = null, sigPad, currentSigTarget = null, sigs = { sig1: null, sig2: null };
let currentSecIdx = 0;

window.onload = async () => {
    const c = document.getElementById('sig-canvas');
    sigPad = new SignaturePad(c, { backgroundColor: 'white' });
    
    try {
        const res = await fetch('auditoria.txt');
        if (res.ok) processTxt(await res.text());
    } catch (e) { document.getElementById('results-counter').innerText = "Cargue el archivo auditoria.txt"; }

    load();
    renderChecklist();
};

function toggleTheme() {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('aripar_theme', t);
}

function processTxt(text) {
    if (!text) return;
    const lines = text.split('\n');
    let curA = "", curS = "";
    auditData = {};
    lines.forEach(l => {
        const line = l.trim();
        if (!line) return;
        if (line.startsWith('##')) {
            curS = line.replace('##','').trim();
            if (curA) auditData[curA].secciones[curS] = [];
        } else if (line.startsWith('#')) {
            curA = line.replace('#','').trim();
            auditData[curA] = { secciones: {} };
        } else if (curA && curS) {
            auditData[curA].secciones[curS].push(line);
        }
    });
    updateSelectors();
    renderChecklist(true);
}

function handleFileUpload(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => { processTxt(e.target.result); };
        reader.readAsText(input.files[0]);
    }
}

function updateSelectors() {
    const sel = document.getElementById('auditSelector');
    sel.innerHTML = Object.keys(auditData).map(k => `<option value="${k}">${k}</option>`).join('');
}

function renderChecklist(reset = false) {
    const audit = document.getElementById('auditSelector').value;
    const container = document.getElementById('checklist');
    const slider = document.getElementById('sectionSlider');
    if (!auditData[audit]) return;
    if (reset) currentSecIdx = 0;

    const secciones = Object.keys(auditData[audit].secciones);
    slider.innerHTML = secciones.map((s, i) => 
        `<button class="nav-btn ${i === currentSecIdx ? 'active' : ''}" onclick="changeSec(${i})">${s}</button>`
    ).join('');

    const activeSec = secciones[currentSecIdx];
    container.innerHTML = "";
    auditData[audit].secciones[activeSec].forEach((q, i) => {
        const id = `q_${audit}_${activeSec}_${i}`.replace(/\s+/g, '_');
        container.innerHTML += `
            <div class="question-card">
                <div class="q-num">${i + 1}</div>
                <div class="q-body">
                    <div class="q-text">${q}</div>
                    <div class="q-controls">
                        <select id="res_${id}" onchange="save(); calculate();">
                            <option value="">Resultado...</option>
                            <option value="C">Conforme</option>
                            <option value="NCMenor">NC Menor</option>
                            <option value="NCMayor">NC Mayor</option>
                            <option value="NA">No Aplica</option>
                        </select>
                        <textarea id="obs_${id}" placeholder="Evidencias y hallazgos..." oninput="save()"></textarea>
                    </div>
                </div>
            </div>`;
    });
    loadStoredResponses();
    calculate();
}

function changeSec(i) { currentSecIdx = i; renderChecklist(); save(); }

function calculate() {
    const audit = document.getElementById('auditSelector').value;
    if (!auditData[audit]) return;
    let total = 0, ok = 0;
    const stats = {};
    const saved = JSON.parse(localStorage.getItem('aripar_res')) || {};

    Object.keys(auditData[audit].secciones).forEach(sec => {
        let sT = 0, sOk = 0;
        auditData[audit].secciones[sec].forEach((q, i) => {
            const id = `res_q_${audit}_${sec}_${i}`.replace(/\s+/g, '_');
            const val = saved[id];
            if (val && val !== 'NA') {
                sT++; total++;
                if (val === 'C') { sOk++; ok++; }
            }
        });
        stats[sec] = sT === 0 ? 0 : Math.round((sOk / sT) * 100);
    });

    const p = total === 0 ? 0 : Math.round((ok/total)*100);
    document.getElementById('progress-fill').style.width = p + "%";
    renderChart(stats);
    document.getElementById('results-counter').innerText = `Auditoría: ${Object.keys(auditData[audit].secciones).length} secciones activas.`;
}

function renderChart(stats) {
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: { labels: Object.keys(stats), datasets: [{ label: '% Cumplimiento', data: Object.values(stats), backgroundColor: '#2d5be3' }] },
        options: { maintainAspectRatio: false, scales: { y: { max: 100, beginAtZero: true } } }
    });
}

function save() {
    const data = {
        emp: document.getElementById('empresa').value,
        area: document.getElementById('area').value,
        f: document.getElementById('fecha').value,
        audit: document.getElementById('auditSelector').value,
        idx: currentSecIdx,
        n1: document.getElementById('name1').value, n2: document.getElementById('name2').value,
        sigs: sigs
    };
    localStorage.setItem('aripar_meta', JSON.stringify(data));
    const res = JSON.parse(localStorage.getItem('aripar_res')) || {};
    document.querySelectorAll('select, textarea').forEach(el => { if(el.id) res[el.id] = el.value; });
    localStorage.setItem('aripar_res', JSON.stringify(res));
}

function load() {
    const t = localStorage.getItem('aripar_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    const m = JSON.parse(localStorage.getItem('aripar_meta'));
    if (!m) return;
    document.getElementById('empresa').value = m.emp || '';
    document.getElementById('area').value = m.area || '';
    document.getElementById('fecha').value = m.f || '';
    document.getElementById('auditSelector').value = m.audit || '';
    currentSecIdx = m.idx || 0;
    document.getElementById('name1').value = m.n1 || '';
    document.getElementById('name2').value = m.n2 || '';
    if (m.sigs) {
        sigs = m.sigs;
        if(sigs.sig1) document.getElementById('view-sig1').innerHTML = `<img src="${sigs.sig1}">`;
        if(sigs.sig2) document.getElementById('view-sig2').innerHTML = `<img src="${sigs.sig2}">`;
    }
}

function loadStoredResponses() {
    const res = JSON.parse(localStorage.getItem('aripar_res'));
    if (!res) return;
    document.querySelectorAll('select, textarea').forEach(el => { if(res[el.id]) el.value = res[el.id]; });
}

function openSig(id) {
    currentSigTarget = id;
    document.getElementById('sigModal').style.display = 'flex';
    setTimeout(() => {
        const c = document.getElementById('sig-canvas');
        c.width = c.offsetWidth; c.height = c.offsetHeight;
        sigPad.clear();
    }, 150);
}
function closeSig() { document.getElementById('sigModal').style.display = 'none'; }
function acceptSig() {
    sigs[currentSigTarget] = sigPad.toDataURL();
    document.getElementById(`view-${currentSigTarget}`).innerHTML = `<img src="${sigs[currentSigTarget]}">`;
    closeSig(); save();
}

// REPORTE EN PESTAÑA NUEVA (Optimizado para móvil)
function generateReport() {
    const audit = document.getElementById('auditSelector').value;
    if (!auditData[audit]) return;

    const savedRes = JSON.parse(localStorage.getItem('aripar_res')) || {};
    const empresa = document.getElementById('empresa').value || '---';
    const area = document.getElementById('area').value || '---';
    const fecha = document.getElementById('fecha').value || '---';

    let report = `
    <html>
    <head>
        <title>Reporte Aripar - ${empresa}</title>
        <style>
            body { font-family: 'Segoe UI', sans-serif; padding: 30px; color: #333; line-height: 1.5; }
            .h { border-bottom: 3px solid #2d5be3; padding-bottom: 10px; margin-bottom: 20px; }
            .meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 30px; }
            .sec { background: #f0f4ff; padding: 8px; border-left: 4px solid #2d5be3; margin-top: 25px; font-weight: bold; text-transform: uppercase; }
            .item { border-bottom: 1px solid #eee; padding: 12px 0; page-break-inside: avoid; }
            .res { font-size: 12px; color: #2d5be3; font-weight: bold; margin-top: 4px; }
            .sigs { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; text-align: center; }
            .sig-line { border-top: 1px solid #000; margin-top: 60px; padding-top: 8px; font-size: 12px; }
        </style>
    </head>
    <body>
        <div class="h">
            <h1 style="margin:0; color:#2d5be3;">Reporte de Auditoría</h1>
            <small>Inversiones Aripar — Sistema de Gestión</small>
        </div>
        <div class="meta">
            <div><strong>Empresa:</strong> ${empresa}<br><strong>Área:</strong> ${area}</div>
            <div style="text-align:right;"><strong>Fecha:</strong> ${fecha}<br><strong>Norma:</strong> ${audit}</div>
        </div>`;

    Object.keys(auditData[audit].secciones).forEach(sec => {
        report += `<div class="sec">${sec}</div>`;
        auditData[audit].secciones[sec].forEach((q, i) => {
            const id = `q_${audit}_${sec}_${i}`.replace(/\s+/g, '_');
            const r = savedRes[`res_${id}`] || "—";
            const o = savedRes[`obs_${id}`] || "Sin observaciones.";
            const labels = { 'C': 'Conforme', 'NCMenor': 'NC Menor', 'NCMayor': 'NC Mayor', 'NA': 'No Aplica' };
            
            report += `
            <div class="item">
                <div style="font-size:14px;"><strong>${i + 1}.</strong> ${q}</div>
                <div class="res">Resultado: ${labels[r] || 'No evaluado'}</div>
                <div style="font-size:12px; font-style:italic; color:#666;">Evidencias: ${o}</div>
            </div>`;
        });
    });

    report += `
        <div class="sigs">
            <div>
                ${sigs.sig1 ? `<img src="${sigs.sig1}" style="max-height:70px;">` : ''}
                <div class="sig-line"><strong>${document.getElementById('name1').value || 'Firma Auditor'}</strong><br>Auditor</div>
            </div>
            <div>
                ${sigs.sig2 ? `<img src="${sigs.sig2}" style="max-height:70px;">` : ''}
                <div class="sig-line"><strong>${document.getElementById('name2').value || 'Firma Auditado'}</strong><br>Auditado</div>
            </div>
        </div>
        <script>window.onload = () => { setTimeout(() => { window.print(); }, 500); }</s` + `cript>
    </body></html>`;

    const win = window.open('', '_blank');
    win.document.write(report);
    win.document.close();
}

function clearData() { if(confirm("¿Borrar todo el progreso actual?")) { localStorage.clear(); location.reload(); } }

function filter() {
    const term = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.question-card').forEach(c => {
        const match = c.innerText.toLowerCase().includes(term);
        c.classList.toggle('hidden', !match);
    });
}
</script>
</body>
</html>
