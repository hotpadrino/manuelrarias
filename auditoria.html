<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auditoría Pro - Inversiones Aripar</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn9OTPC90ZXh0Pjwvc3ZnPg==">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text: #2c3e50;
            --primary: #0056b3; --secondary: #6c757d; --border: #dee2e6;
            --accent: #e67e22; --modal-bg: rgba(0,0,0,0.9);
        }
        [data-theme="dark"] {
            --bg-body: #1a1a1a; --bg-card: #2d2d2d; --text: #ecf0f1;
            --primary: #3498db; --border: #444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text); margin: 0; padding: 15px; padding-bottom: 120px; transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); width: 100%; box-sizing: border-box; }

        .nav-sections { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; border-bottom: 1px solid var(--border); scrollbar-width: thin; }
        .nav-btn { padding: 8px 18px; border: 1px solid var(--primary); border-radius: 20px; cursor: pointer; white-space: nowrap; background: transparent; color: var(--primary); font-weight: bold; transition: 0.2s; }
        .nav-btn.active { background: var(--primary); color: white; }

        .section-info { font-size: 0.9em; font-weight: bold; color: var(--secondary); margin-bottom: 20px; padding-left: 5px; }

        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg-card); padding: 10px 0; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        #results-counter { font-weight: bold; color: var(--accent); font-size: 0.9em; margin-top: 5px; display: block; }
        .error-msg { color: #e74c3c !important; background: #fdf2f2; padding: 5px; border-radius: 4px; }

        .question-card { border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 18px; background: rgba(0,0,0,0.02); page-break-inside: avoid; display: flex; gap: 15px; }
        .q-number { font-weight: bold; color: var(--primary); font-size: 1.1em; min-width: 30px; }
        .q-content { flex: 1; }
        
        .combo-res { font-weight: bold; border: 2px solid var(--primary); margin-top: 10px; }

        .signature-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; }
        .sig-block { text-align: center; }
        .sig-display { width: 100%; height: 100px; border-bottom: 2px solid #000; margin-bottom: 10px; display: flex; align-items: flex-end; justify-content: center; background: #fff; }
        .sig-display img { max-height: 100%; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #222; color: white; text-align: center; padding: 15px 0; font-size: 14px; z-index: 1000; }
        footer a { color: #00d084; text-decoration: none; margin: 0 10px; font-weight: bold; }

        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .progress-bar { height: 22px; background: #27ae60; text-align: center; color: white; font-size: 13px; border-radius: 11px; transition: 0.5s; line-height: 22px; }
        
        .sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 10001; flex-direction: column; }
        .modal-body { flex: 1; background: #fff; margin: 15px; border-radius: 10px; position: relative; }
        #signature-pad { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }

        /* --- ESTILOS DE IMPRESIÓN --- */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; }
            .btn, .search-container, .nav-sections, .section-info, #fileInput, label, #chart-container, .theme-btn, footer { 
                display: none !important; 
            }
            .question-card { border: none; border-bottom: 1px solid #eee; padding: 10px 0; }
            textarea { border: none; resize: none; overflow: hidden; background: transparent; }
            select { border: none; appearance: none; -webkit-appearance: none; font-weight: bold; }
            .sig-modal { display: none; }
            h3.print-section-title { display: block !important; margin-top: 30px; border-bottom: 2px solid #000; }
        }
        .print-section-title { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h2 style="margin:0;">📋 Auditoría Aripar Pro</h2>
        <div class="theme-btn">
            <button onclick="toggleTheme()" class="btn" style="border:1px solid var(--border)">🌓 Tema</button>
            <button onclick="clearAll()" class="btn btn-danger" style="font-size: 11px;">🗑️ Borrar</button>
        </div>
    </div>

    <div class="header-grid">
        <input type="text" id="empresa" placeholder="Empresa Auditada" oninput="save()">
        <input type="text" id="departamento" placeholder="Área / Proceso" oninput="save()">
        <input type="date" id="fecha" oninput="save()">
        <select id="auditSelector" onchange="renderChecklist(true)"></select>
        <input type="file" id="fileInput" accept=".txt" style="display:none;" onchange="handleFileUpload(this)">
        <label for="fileInput" class="btn" style="border:1px solid #ccc; text-align:center; cursor:pointer; font-size:12px;">📂 Cargar auditoria.txt Local</label>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="🔍 Buscar pregunta o nota..." oninput="filter()">
        <span id="results-counter">Cargando base de datos...</span>
    </div>

    <div id="sectionNav" class="nav-sections"></div>
    <div id="sectionCounter" class="section-info"></div>
    <div id="checklist"></div>

    <div id="chart-container" style="margin-top: 40px; height: 300px;"><canvas id="chart"></canvas></div>
    <div style="background: #eee; border-radius: 11px; margin: 20px 0;"><div id="mainProgress" class="progress-bar" style="width:0%">0% Global</div></div>

    <div class="signature-section">
        <div class="sig-block">
            <div class="sig-display" id="display-sig1"></div>
            <input type="text" id="role-1" value="Auditor" style="text-align:center; border:none; font-weight:bold;" oninput="save()">
            <input type="text" id="name-1" placeholder="Nombre" style="text-align:center; border:none;" oninput="save()">
            <button class="btn btn-main" style="margin-top:10px; font-size:11px;" onclick="openSig('sig1')">Firmar</button>
        </div>
        <div class="sig-block">
            <div class="sig-display" id="display-sig2"></div>
            <input type="text" id="role-2" value="Auditado" style="text-align:center; border:none; font-weight:bold;" oninput="save()">
            <input type="text" id="name-2" placeholder="Nombre" style="text-align:center; border:none;" oninput="save()">
            <button class="btn btn-main" style="margin-top:10px; font-size:11px;" onclick="openSig('sig2')">Firmar</button>
        </div>
    </div>

    <div style="margin-top: 40px; display: flex; gap: 10px;">
        <button class="btn btn-save" style="flex:1; background:#27ae60; color:white;" onclick="save()">💾 Guardar</button>
        <button class="btn btn-pdf" style="flex:2; background:#c0392b; color:white;" onclick="printFullReport()">📄 Imprimir Reporte Completo (Todo)</button>
    </div>
</div>

<footer>
    Inversiones Aripar | 
    <a href="https://wa.me/573128816469" target="_blank">📲 WhatsApp</a> | 
    <a href="mailto:alucard8@gmail.com">✉️ Correo</a>
</footer>

<div id="sig-modal" class="sig-modal">
    <div class="modal-body"><canvas id="signature-pad"></canvas></div>
    <div style="display: flex; gap: 10px; padding: 20px; justify-content: center;">
        <button class="btn" onclick="closeSig()">Cancelar</button>
        <button class="btn btn-main" onclick="acceptSig()">Aceptar</button>
    </div>
</div>

<script>
    let auditData = {}, chart = null, signaturePad, currentSigTarget = null, sigs = { sig1: null, sig2: null };
    let currentSectionIndex = 0;

    window.onload = async () => {
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
        
        try {
            const response = await fetch('auditoria.txt');
            if (response.ok) { processTxt(await response.text()); }
            else { document.getElementById('results-counter').innerText = "auditoria.txt no detectado."; }
        } catch (e) { console.log("Error fetch red."); }

        load();
        updateSelectors();
        renderChecklist();
    };

    function processTxt(text) {
        if (!text) return;
        const lines = text.split(/\r?\n/);
        let curA = "", curS = "";
        let lineCount = 0;
        auditData = {};
        
        lines.forEach(l => {
            const line = l.trim();
            if (!line) return;
            lineCount++;
            if (line.startsWith('##')) {
                curS = line.replace('##', '').trim();
                if (curA) auditData[curA].secciones[curS] = [];
            } else if (line.startsWith('#')) {
                curA = line.replace('#', '').trim();
                auditData[curA] = { secciones: {} };
            } else if (curA && curS) {
                auditData[curA].secciones[curS].push(line);
            }
        });
        
        if (Object.keys(auditData).length === 0) {
            document.getElementById('results-counter').innerHTML = `<span class="error-msg">Error de formato: No se encontraron títulos (# o ##).</span>`;
            return;
        }
        updateSelectors();
        renderChecklist(true);
    }

    function renderChecklist(reset = false) {
        const audit = document.getElementById('auditSelector').value;
        const container = document.getElementById('checklist');
        const nav = document.getElementById('sectionNav');
        const secCounter = document.getElementById('sectionCounter');
        
        container.innerHTML = ""; nav.innerHTML = "";
        if (!auditData[audit]) return;
        
        if (reset) currentSectionIndex = 0;
        const secciones = Object.keys(auditData[audit].secciones);
        
        secciones.forEach((sec, idx) => {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${idx === currentSectionIndex ? 'active' : ''}`;
            btn.innerText = sec;
            btn.onclick = () => { currentSectionIndex = idx; renderChecklist(); save(); };
            nav.appendChild(btn);
        });

        const activeSec = secciones[currentSectionIndex];
        if (activeSec) {
            secCounter.innerText = `Esta sección tiene ${auditData[audit].secciones[activeSec].length} preguntas.`;
            renderQuestions(audit, activeSec, container);
        }
        updateCounter();
        loadStoredResponses();
        calculate();
    }

    function renderQuestions(audit, section, container) {
        auditData[audit].secciones[section].forEach((q, i) => {
            const id = `q_${audit}_${section}_${i}`.replace(/\s+/g, '_');
            const card = document.createElement('div');
            card.className = "question-card";
            card.innerHTML = `
                <div class="q-number">${i + 1}.</div>
                <div class="q-content">
                    <div class="question-text"><strong>${q}</strong></div>
                    <select id="res_${id}" class="combo-res" onchange="save(); calculate();">
                        <option value="">-- Resultado --</option>
                        <option value="C">Conforme</option>
                        <option value="NCMenor">NC Menor</option>
                        <option value="NCMayor">NC Mayor</option>
                        <option value="NA">No Aplica</option>
                    </select>
                    <textarea id="obs_${id}" placeholder="Notas..." oninput="save()"></textarea>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // --- FUNCIÓN CLAVE PARA IMPRIMIR TODO ---
    function printFullReport() {
        const audit = document.getElementById('auditSelector').value;
        const container = document.getElementById('checklist');
        const originalContent = container.innerHTML; // Guardar vista actual
        
        // Unificar todo el contenido para impresión
        let fullHtml = "";
        Object.keys(auditData[audit].secciones).forEach(sec => {
            fullHtml += `<h3 class="print-section-title">${sec}</h3>`;
            auditData[audit].secciones[sec].forEach((q, i) => {
                const id = `q_${audit}_${sec}_${i}`.replace(/\s+/g, '_');
                const savedRes = JSON.parse(localStorage.getItem('aripar_res')) || {};
                const resVal = savedRes[`res_${id}`] || "";
                const obsVal = savedRes[`obs_${id}`] || "";

                fullHtml += `
                    <div class="question-card">
                        <div class="q-number">${i + 1}.</div>
                        <div class="q-content">
                            <div class="question-text"><strong>${q}</strong></div>
                            <div style="margin-top:5px; font-weight:bold; color:var(--primary)">Resultado: ${resVal}</div>
                            <div style="font-style:italic; margin-top:5px;">Notas: ${obsVal || 'Sin observaciones.'}</div>
                        </div>
                    </div>`;
            });
        });

        container.innerHTML = fullHtml; // Reemplazar temporalmente
        
        const emp = document.getElementById('empresa').value || 'Auditoria';
        const now = new Date();
        const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        document.title = `${ts}-${emp}`;

        window.print();
        
        // Restaurar vista por secciones tras imprimir
        renderChecklist();
    }

    // El resto de funciones (save, load, chart, etc.) se mantienen igual
    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        if(chart) calculate();
    }

    function handleFileUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { processTxt(e.target.result); };
            reader.readAsText(input.files[0]);
        }
    }

    function updateSelectors() {
        const sel = document.getElementById('auditSelector');
        sel.innerHTML = Object.keys(auditData).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function updateCounter() {
        const audit = document.getElementById('auditSelector').value;
        if (!auditData[audit]) return;
        let totalQ = 0;
        Object.values(auditData[audit].secciones).forEach(s => totalQ += s.length);
        document.getElementById('results-counter').innerText = `Auditoría: ${Object.keys(auditData[audit].secciones).length} secciones | Total: ${totalQ} preguntas`;
    }

    function calculate() {
        const audit = document.getElementById('auditSelector').value;
        if (!auditData[audit]) return;
        let total = 0, ok = 0;
        const stats = {};
        const saved = JSON.parse(localStorage.getItem('aripar_res')) || {};
        
        Object.keys(auditData[audit].secciones).forEach(sec => {
            let sTotal = 0, sOk = 0;
            auditData[audit].secciones[sec].forEach((q, i) => {
                const id = `res_q_${audit}_${sec}_${i}`.replace(/\s+/g, '_');
                const val = saved[id];
                if (val && val !== 'NA') {
                    sTotal++; total++;
                    if (val === 'C') { sOk++; ok++; }
                }
            });
            stats[sec] = sTotal === 0 ? 0 : Math.round((sOk / sTotal) * 100);
        });

        const p = total === 0 ? 0 : Math.round((ok / total) * 100);
        const pb = document.getElementById('mainProgress');
        pb.style.width = p + "%";
        pb.innerText = p + "% Global Cumplido";
        renderChart(stats);
    }

    function renderChart(stats) {
        if (chart) chart.destroy();
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const textColor = isDark ? '#fff' : '#2c3e50';
        chart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: Object.keys(stats),
                datasets: [{ label: '% Cumplimiento', data: Object.values(stats), backgroundColor: '#3498db' }]
            },
            options: { 
                maintainAspectRatio: false, 
                plugins: { legend: { labels: { color: textColor } } },
                scales: { 
                    y: { max: 100, beginAtZero: true, ticks: { color: textColor } },
                    x: { ticks: { color: textColor } }
                }
            }
        });
    }

    function save() {
        const data = {
            empresa: document.getElementById('empresa').value,
            depto: document.getElementById('departamento').value,
            fecha: document.getElementById('fecha').value,
            audit: document.getElementById('auditSelector').value,
            secIdx: currentSectionIndex,
            roles: {
                r1: document.getElementById('role-1').value, n1: document.getElementById('name-1').value,
                r2: document.getElementById('role-2').value, n2: document.getElementById('name-2').value
            },
            sigs: sigs
        };
        localStorage.setItem('aripar_meta', JSON.stringify(data));
        const res = JSON.parse(localStorage.getItem('aripar_res')) || {};
        document.querySelectorAll('.combo-res, textarea').forEach(el => { if (el.id) res[el.id] = el.value; });
        localStorage.setItem('aripar_res', JSON.stringify(res));
    }

    function load() {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        const meta = JSON.parse(localStorage.getItem('aripar_meta'));
        if (!meta) return;
        document.getElementById('empresa').value = meta.empresa || '';
        document.getElementById('departamento').value = meta.depto || '';
        document.getElementById('fecha').value = meta.fecha || '';
        document.getElementById('auditSelector').value = meta.audit || '';
        currentSectionIndex = meta.secIdx || 0;
        document.getElementById('name-1').value = meta.roles.n1 || '';
        document.getElementById('name-2').value = meta.roles.n2 || '';
        if (meta.sigs) {
            sigs = meta.sigs;
            if (sigs.sig1) document.getElementById('display-sig1').innerHTML = `<img src="${sigs.sig1}">`;
            if (sigs.sig2) document.getElementById('display-sig2').innerHTML = `<img src="${sigs.sig2}">`;
        }
    }

    function loadStoredResponses() {
        const res = JSON.parse(localStorage.getItem('aripar_res'));
        if (!res) return;
        document.querySelectorAll('.combo-res, textarea').forEach(el => { if (res[el.id]) el.value = res[el.id]; });
    }

    function openSig(target) {
        currentSigTarget = target;
        document.getElementById('sig-modal').style.display = 'flex';
        setTimeout(() => {
            const canvas = document.getElementById('signature-pad');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            signaturePad.clear();
        }, 100);
    }
    function closeSig() { document.getElementById('sig-modal').style.display = 'none'; }
    function acceptSig() {
        sigs[currentSigTarget] = signaturePad.toDataURL();
        document.getElementById(`display-${currentSigTarget}`).innerHTML = `<img src="${sigs[currentSigTarget]}">`;
        closeSig(); save();
    }

    function filter() {
        const term = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.question-card').forEach(c => {
            const match = c.innerText.toLowerCase().includes(term) || c.querySelector('textarea').value.toLowerCase().includes(term);
            c.classList.toggle('hidden', !match);
        });
    }

    function clearAll() {
        if (confirm("¿Borrar definitivamente todo el progreso?")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
