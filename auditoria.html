<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auditoría Pro - Inversiones Aripar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root {
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text: #2c3e50;
            --primary: #0056b3; --secondary: #6c757d; --border: #dee2e6;
            --accent: #e67e22; --modal-bg: rgba(0,0,0,0.9);
        }
        [data-theme="dark"] {
            --bg-body: #1a1a1a; --bg-card: #2d2d2d; --text: #ecf0f1;
            --primary: #3498db; --border: #444;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; padding-bottom: 80px; }
        .container { max-width: 1100px; margin: auto; background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        
        /* Buscador y Contador */
        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg-card); padding: 10px 0; margin-bottom: 20px; border-bottom: 2px solid var(--primary); }
        #results-counter { font-weight: bold; color: var(--accent); font-size: 0.9em; margin-top: 5px; display: block; }

        .header-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 25px; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); width: 100%; box-sizing: border-box; font-size: 15px; }
        
        .question-card { border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 18px; background: rgba(0,0,0,0.02); }
        .finding-selector { margin-top: 12px; display: none; background: #fff3cd; color: #856404; font-weight: bold; border: 1px solid #ffeeba; }
        .finding-active { display: block; }

        .signature-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        .sig-box { border: 2px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .role-title { font-weight: bold; border: none; background: transparent; color: var(--primary); text-align: center; font-size: 1.2em; margin-bottom: 15px; text-transform: uppercase; }
        .sig-preview { width: 100%; height: 120px; border: 1px dashed #bbb; background: #fff; margin-top: 15px; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .sig-preview img { max-height: 100%; }

        .sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 10001; flex-direction: column; }
        .modal-body { flex: 1; background: #fff; margin: 15px; border-radius: 10px; position: relative; }
        #signature-pad { position: absolute; left: 0; top: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-main { background: var(--primary); color: white; }
        .btn-save { background: #27ae60; color: white; }
        .btn-pdf { background: #c0392b; color: white; }
        .btn-light { background: transparent; border: 1px solid var(--secondary); color: var(--secondary); }
        .btn-danger { background: #e74c3c; color: white; }
        
        .progress-bar { height: 22px; background: #27ae60; text-align: center; color: white; font-size: 13px; line-height: 22px; border-radius: 11px; transition: 0.5s; font-weight: bold; }
        .hidden { display: none !important; }
        footer { margin-top: 40px; text-align: center; font-size: 14px; color: var(--secondary); border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h2 style="margin:0; color: var(--primary);">📋 Auditoría Digital - Aripar</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="toggleTheme()" class="btn btn-light" style="padding: 5px 15px;">🌓 Tema</button>
            <button onclick="clearAllData()" class="btn btn-danger" style="padding: 5px 15px; font-size: 12px;">🗑️ Borrar Todo</button>
        </div>
    </div>

    <div class="header-grid">
        <input type="text" id="empresa" placeholder="Nombre de la Empresa">
        <input type="text" id="departamento" placeholder="Área / Proceso">
        <input type="date" id="fecha">
        <select id="auditSelector" onchange="renderChecklist()"></select>
        <div style="display: flex; gap: 5px;">
            <label for="fileInput" class="btn btn-light" style="font-size: 12px; cursor: pointer;">Cargar TXT</label>
            <input type="file" id="fileInput" accept=".txt" style="display:none;">
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="🔍 Buscar pregunta o anotación..." oninput="filter()">
        <span id="results-counter">Calculando...</span>
    </div>

    <div id="checklist"></div>

    <div style="margin-top: 40px;">
        <h3>📊 Resumen</h3>
        <div style="background: #eee; border-radius: 11px; margin-bottom: 20px;"><div id="mainProgress" class="progress-bar" style="width:0%">0%</div></div>
        <div style="height: 300px;"><canvas id="chart"></canvas></div>
    </div>

    <div class="signature-section">
        <div class="sig-box">
            <input type="text" id="role-1" class="role-title" value="Auditor">
            <input type="text" id="name-1" placeholder="Nombre completo">
            <input type="text" id="pos-1" placeholder="Cargo o Grado" style="margin-top:8px;">
            <button class="btn btn-main" style="width:100%; margin-top:15px;" onclick="openSignatureModal('sig1')">🖊️ Firmar</button>
            <div id="preview-sig1" class="sig-preview">Pendiente</div>
        </div>

        <div class="sig-box">
            <input type="text" id="role-2" class="role-title" value="Auditado">
            <input type="text" id="name-2" placeholder="Nombre completo">
            <input type="text" id="pos-2" placeholder="Cargo o Grado" style="margin-top:8px;">
            <button class="btn btn-main" style="width:100%; margin-top:15px;" onclick="openSignatureModal('sig2')">🖊️ Firmar</button>
            <div id="preview-sig2" class="sig-preview">Pendiente</div>
        </div>
    </div>

    <div style="margin-top: 40px; display: flex; gap: 15px;">
        <button class="btn btn-save" style="flex:1" onclick="save()">💾 Guardar</button>
        <button class="btn btn-pdf" style="flex:2" onclick="exportPDF()">📄 Descargar PDF</button>
    </div>
</div>

<div id="signature-modal" class="sig-modal">
    <div class="modal-body"><canvas id="signature-pad"></canvas></div>
    <div class="modal-footer" style="display: flex; gap: 10px; padding: 20px; justify-content: center;">
        <button class="btn btn-light" style="color:white;" onclick="closeSignatureModal()">Cancelar</button>
        <button class="btn btn-save" onclick="acceptSignature()">Aceptar</button>
    </div>
</div>

<footer>
    <strong>Inversiones Aripar</strong> | Soporte Técnico
</footer>

<script>
    const defaultData = {
        "ISO 9001": { "Contexto": ["¿Se determinaron riesgos?", "¿Se identificaron partes interesadas?"], "Operación": ["¿Se controlan los cambios?"] },
        "SENA": { "Evaluación": ["¿Las guías están actualizadas?", "¿Existe registro de notas?"] }
    };

    let auditData = defaultData, chart = null, signaturePad, currentSigTarget = null, sigImages = { sig1: null, sig2: null };

    window.onload = () => {
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
        loadSaved();
        updateSelectors();
        renderChecklist();
    };

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }

    function clearAllData() {
        if(confirm("¿Estás seguro de que deseas BORRAR TODOS los datos? Esta acción no se puede deshacer.")) {
            if(confirm("Confirma por segunda vez: ¿Borrar progreso, nombres y firmas?")) {
                localStorage.removeItem('audit_vfinal_aripar');
                location.reload();
            }
        }
    }

    function openSignatureModal(id) {
        currentSigTarget = id;
        document.getElementById('signature-modal').style.display = 'flex';
        setTimeout(() => {
            const canvas = document.getElementById('signature-pad');
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }, 100);
    }

    function closeSignatureModal() { document.getElementById('signature-modal').style.display = 'none'; }

    function acceptSignature() {
        const img = signaturePad.toDataURL();
        sigImages[currentSigTarget] = img;
        document.getElementById(`preview-${currentSigTarget}`).innerHTML = `<img src="${img}">`;
        closeSignatureModal();
        save();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const lines = this.result.split('\n');
            let curA = "", curS = "";
            auditData = {};
            lines.forEach(l => {
                const line = l.trim();
                if(line.startsWith('##')) {
                    curS = line.replace('##','').trim();
                    if(curA) auditData[curA][curS] = [];
                } else if(line.startsWith('#')) {
                    curA = line.replace('#','').trim();
                    auditData[curA] = {};
                } else if(line && curA && curS) {
                    auditData[curA][curS].push(line);
                }
            });
            updateSelectors();
            renderChecklist();
        };
        reader.readAsText(e.target.files[0]);
    });

    function updateSelectors() {
        const sel = document.getElementById('auditSelector');
        sel.innerHTML = Object.keys(auditData).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function renderChecklist() {
        const audit = document.getElementById('auditSelector').value;
        const container = document.getElementById('checklist');
        container.innerHTML = "";
        if(!auditData[audit]) return;

        Object.keys(auditData[audit]).forEach(sec => {
            let html = `<h3 style="color:var(--primary); border-bottom:1px solid var(--border);">${sec}</h3>`;
            auditData[audit][sec].forEach((q, i) => {
                const id = `q_${audit}_${sec}_${i}`.replace(/\s+/g,'_');
                html += `
                    <div class="question-card" data-section="${sec}">
                        <div class="question-text" style="font-weight:bold;">${q}</div>
                        <div style="margin: 10px 0;">
                            <label><input type="radio" name="${id}" value="C" onchange="updateUI('${id}')"> Cumple</label>
                            <label><input type="radio" name="${id}" value="NC" onchange="updateUI('${id}')"> No Cumple</label>
                            <label><input type="radio" name="${id}" value="NA" onchange="updateUI('${id}')"> N/A</label>
                            <select id="hallazgo_${id}" class="finding-selector" style="width:180px;">
                                <option value="Menor">NC Menor</option>
                                <option value="Mayor">NC Mayor</option>
                                <option value="Observación">Observación</option>
                            </select>
                        </div>
                        <textarea id="obs_${id}" placeholder="Notas..." oninput="save()"></textarea>
                    </div>`;
            });
            container.innerHTML += html;
        });
        filter();
        calculate();
    }

    function updateUI(id) {
        const r = document.querySelector(`input[name="${id}"]:checked`);
        if(r) document.getElementById(`hallazgo_${id}`).classList.toggle('finding-active', r.value === 'NC');
        calculate();
        save();
    }

    function filter() {
        const term = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.question-card');
        let visible = 0;
        cards.forEach(c => {
            const q = c.querySelector('.question-text').innerText.toLowerCase();
            const n = c.querySelector('textarea').value.toLowerCase();
            const match = q.includes(term) || n.includes(term);
            c.classList.toggle('hidden', !match);
            if(match) visible++;
        });
        document.getElementById('results-counter').innerText = term === "" ? `Total: ${cards.length}` : `Filtrados: ${visible} de ${cards.length}`;
    }

    function calculate() {
        const cards = document.querySelectorAll('.question-card');
        let total = 0, ok = 0;
        const stats = {};
        cards.forEach(c => {
            const sec = c.getAttribute('data-section');
            const r = c.querySelector('input[type="radio"]:checked');
            if(!stats[sec]) stats[sec] = {t:0, c:0};
            if(r && r.value !== 'NA') {
                stats[sec].t++; total++;
                if(r.value === 'C') { stats[sec].c++; ok++; }
            }
        });
        const p = total === 0 ? 0 : Math.round((ok/total)*100);
        document.getElementById('mainProgress').style.width = p + "%";
        document.getElementById('mainProgress').innerText = p + "% Cumplimiento";
        renderChart(stats);
    }

    function renderChart(stats) {
        const labels = Object.keys(stats);
        const data = labels.map(l => stats[l].t === 0 ? 0 : Math.round((stats[l].c/stats[l].t)*100));
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: { labels, datasets: [{ label: '%', data, backgroundColor: '#0056b3' }] },
            options: { maintainAspectRatio: false, scales: { y: { max: 100, beginAtZero: true } } }
        });
    }

    function save() {
        const data = {
            meta: { 
                e: document.getElementById('empresa').value, 
                d: document.getElementById('departamento').value,
                f: document.getElementById('fecha').value,
                sel: document.getElementById('auditSelector').value,
                r1: document.getElementById('role-1').value, n1: document.getElementById('name-1').value, p1: document.getElementById('pos-1').value,
                r2: document.getElementById('role-2').value, n2: document.getElementById('name-2').value, p2: document.getElementById('pos-2').value
            },
            res: {}, sigs: sigImages
        };
        document.querySelectorAll('input[type="radio"]:checked').forEach(r => data.res[r.name] = r.value);
        document.querySelectorAll('textarea').forEach(t => data.res[t.id] = t.value);
        localStorage.setItem('audit_vfinal_aripar', JSON.stringify(data));
    }

    function loadSaved() {
        const s = JSON.parse(localStorage.getItem('audit_vfinal_aripar'));
        if(!s) return;
        document.getElementById('empresa').value = s.meta.e || '';
        document.getElementById('departamento').value = s.meta.d || '';
        document.getElementById('fecha').value = s.meta.f || '';
        document.getElementById('role-1').value = s.meta.r1 || 'Auditor';
        document.getElementById('name-1').value = s.meta.n1 || '';
        document.getElementById('pos-1').value = s.meta.p1 || '';
        document.getElementById('role-2').value = s.meta.r2 || 'Auditado';
        document.getElementById('name-2').value = s.meta.n2 || '';
        document.getElementById('pos-2').value = s.meta.p2 || '';
        if(s.sigs) {
            sigImages = s.sigs;
            if(sigImages.sig1) document.getElementById('preview-sig1').innerHTML = `<img src="${sigImages.sig1}">`;
            if(sigImages.sig2) document.getElementById('preview-sig2').innerHTML = `<img src="${sigImages.sig2}">`;
        }
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const now = new Date();
        const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        const empresaNombre = document.getElementById('empresa').value.replace(/\s+/g, '_') || 'SinNombre';

        doc.setFillColor(0, 86, 179); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255); doc.setFontSize(18); doc.text("REPORTE DE AUDITORÍA ARIPAR", 105, 20, {align:'center'});
        
        doc.setTextColor(0); doc.setFontSize(10);
        doc.text(`Empresa: ${document.getElementById('empresa').value}`, 20, 45);
        doc.text(`Fecha: ${document.getElementById('fecha').value}`, 150, 45);
        
        if(chart) doc.addImage(chart.canvas.toDataURL(), 'PNG', 15, 60, 180, 75);
        
        if(sigImages.sig1) doc.addImage(sigImages.sig1, 'PNG', 30, 160, 40, 20);
        if(sigImages.sig2) doc.addImage(sigImages.sig2, 'PNG', 130, 160, 40, 20);

        doc.save(`${timestamp}-${empresaNombre}.pdf`);
    }
</script>
</body>
</html>
