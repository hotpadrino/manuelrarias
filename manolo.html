<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mi Mundo de Aprendizaje!</title>
    <link href="https://fonts.googleapis.com/css2?family=Chalkboard+SE&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e0f7fa;
            font-family: 'Comic Neue', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #ff6f61;
            font-size: 3rem;
            text-shadow: 2px 2px #fff;
            margin-bottom: 50px;
        }

        .contenedor {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tarjeta {
            width: 250px;
            height: 320px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 8px solid;
            position: relative;
            animation: flotar 3s ease-in-out infinite;
        }

        /* Colores diferentes para cada tarjeta */
        .regiones { border-color: #ffeb3b; color: #fbc02d; animation-delay: 0s; }
        .mundo { border-color: #4caf50; color: #388e3c; animation-delay: 0.5s; }
        .tablas { border-color: #2196f3; color: #1976d2; animation-delay: 1s; }

        .tarjeta:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .icono {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .titulo {
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* Animación suave de flotar */
        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Decoración de fondo */
        .nube {
            position: absolute;
            background: white;
            width: 100px;
            height: 40px;
            border-radius: 50px;
            z-index: -1;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>✨ ¡Elige tu aventura! ✨</h1>

    <div class="contenedor">
        <a href="regiones.html" class="tarjeta regiones">
            <div class="icono">🗺️</div>
            <div class="titulo">Regiones</div>
        </a>

        <a href="mundo.html" class="tarjeta mundo">
            <div class="icono">🌍</div>
            <div class="titulo">Mundo</div>
        </a>

        <a href="tablas.html" class="tarjeta tablas">
            <div class="icono">🔢</div>
            <div class="titulo">Tablas</div>
        </a>
    </div>

    <div class="nube" style="top: 10%; left: 10%;"></div>
    <div class="nube" style="top: 20%; right: 15%;"></div>
    <div class="nube" style="bottom: 15%; left: 20%;"></div>

</body>
</html>
