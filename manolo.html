    <style>
        /* Configuración Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e0f7fa;
            font-family: 'Comic Neue', cursive;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Nubes Animadas */
        .nubes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .nube {
            position: absolute;
            background: white;
            width: 150px;
            height: 50px;
            border-radius: 50px;
            opacity: 0.8;
            filter: blur(1px);
            animation: moverNube linear infinite;
        }

        /* Diferentes nubes con distintas velocidades y posiciones */
        .n1 { top: 10%; animation-duration: 25s; left: -200px; }
        .n2 { top: 30%; animation-duration: 40s; left: -250px; opacity: 0.5; width: 100px; }
        .n3 { top: 15%; animation-duration: 30s; left: -300px; width: 180px; }
        .n4 { top: 50%; animation-duration: 50s; left: -150px; opacity: 0.4; }
        .n5 { top: 70%; animation-duration: 35s; left: -200px; width: 130px; }
        .n6 { top: 5%; animation-duration: 20s; left: -220px; opacity: 0.6; }

        @keyframes moverNube {
            from { transform: translateX(-10vw); }
            to { transform: translateX(110vw); }
        }

        /* Contenido Principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 120px 20px; /* Padding extra abajo para que no lo tape el footer */
        }

        h1 {
            color: #ff6f61;
            font-size: 3.5rem;
            text-shadow: 4px 4px 0px #fff;
            margin-bottom: 40px;
            text-align: center;
        }

        .contenedor-tarjetas {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1100px;
        }

        .tarjeta {
            width: 260px;
            height: 330px;
            background: white;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 15px 0px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 10px solid;
            animation: flotar 3s ease-in-out infinite;
        }

        .regiones { border-color: #ffeb3b; color: #fbc02d; animation-delay: 0s; }
        .mundo { border-color: #4caf50; color: #388e3c; animation-delay: 0.5s; }
        .tablas { border-color: #2196f3; color: #1976d2; animation-delay: 1s; }

        .tarjeta:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 20px 30px rgba(0,0,0,0.15);
        }

        .icono {
            font-size: 90px;
            margin-bottom: 10px;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.1));
        }

        .titulo-tarjeta {
            font-size: 2.2rem;
            font-weight: 700;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* FOOTER SIEMPRE VISIBLE (Sticky) */
        .footer-infantil {
            background-color: white;
            border-top: 10px solid #ffccbc;
            padding: 20px 0;
            width: 100%;
            position: sticky;
            bottom: 0;
            z-index: 100;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 0 30px;
        }

        .footer-texto {
            font-weight: 700;
            color: #ff6f61;
            font-size: 16px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            text-decoration: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        .link-whatsapp { background-color: #4caf50; }
        .link-email { background-color: #2196f3; }

        .footer-links a:hover {
            transform: translateY(-3px) scale(1.05);
        }

        @media (min-width: 640px) {
            .footer-container {
                flex-direction: row;
                justify-content: space-between;
            }
        }
    </style>
