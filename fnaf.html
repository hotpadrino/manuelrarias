<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF Mobile Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            background: #000; color: white; margin: 0; padding: 0;
            font-family: sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        
        #game-container {
            position: relative; width: 100%; flex-grow: 1;
            background: #111; border: 2px solid #333;
        }

        .status-bar {
            background: #222; padding: 10px; display: flex;
            justify-content: space-between; font-weight: bold;
        }

        /* Vistas */
        #office, #cam-view {
            width: 100%; height: 100%; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #cam-view { background: #001500; display: none; position: absolute; top: 0; }

        /* Controles grandes para dedos */
        .controls {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; padding: 15px; background: #111;
        }

        .btn {
            background: #444; color: white; border: none; padding: 20px;
            font-size: 1.1rem; border-radius: 8px; text-transform: uppercase;
        }

        .btn-door-open { background: #8b0000; }
        .btn-door-closed { background: #006400; }
        .btn-monitor { background: #1e90ff; }

        #static-fx {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUic9Zf2/giphy.gif');
            opacity: 0.05; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>ENERGÍA: <span id="power">100</span>%</span>
        <span><span id="time">12</span> AM</span>
    </div>

    <div id="game-container">
        <div id="static-fx"></div>
        
        <div id="office">
            <h2 id="office-msg">VIGILANDO PASILLO</h2>
            <div id="jumpscare" style="display:none; color:red; font-size:2rem;">¡GAME OVER!</div>
        </div>

        <div id="cam-view">
            <h3 id="cam-label">CAM 01</h3>
            <div id="enemy-status" style="font-size: 1.5rem;">TODO DESPEJADO</div>
        </div>
    </div>

    <div class="controls">
        <button id="door-btn" class="btn btn-door-open" onclick="toggleDoor()">Puerta: ABIERTA</button>
        <button class="btn btn-monitor" onclick="toggleMonitor()">Monitor Cam</button>
        <button id="cam-sel" class="btn" style="display:none;" onclick="switchCam()">Cambiar Cámara</button>
    </div>

    <script>
        let power = 100;
        let hour = 0;
        let doorOpen = true;
        let monitoring = false;
        let enemyPos = 1; // 1 y 2 cams, 3 puerta, 4 pierde
        let currentCam = 1;
        let active = true;

        function toggleDoor() {
            if(!active) return;
            doorOpen = !doorOpen;
            const btn = document.getElementById("door-btn");
            btn.innerText = doorOpen ? "Puerta: ABIERTA" : "Puerta: CERRADA";
            btn.className = doorOpen ? "btn btn-door-open" : "btn btn-door-closed";
        }

        function toggleMonitor() {
            if(!active) return;
            monitoring = !monitoring;
            document.getElementById("cam-view").style.display = monitoring ? "flex" : "none";
            document.getElementById("cam-sel").style.display = monitoring ? "block" : "none";
            updateUI();
        }

        function switchCam() {
            currentCam = currentCam === 1 ? 2 : 1;
            updateUI();
        }

        function updateUI() {
            document.getElementById("cam-label").innerText = "CAM 0" + currentCam;
            const status = document.getElementById("enemy-status");
            if (currentCam === enemyPos) {
                status.innerText = "¡MOVIMIENTO DETECTADO!";
                status.style.color = "yellow";
            } else {
                status.innerText = "TODO DESPEJADO";
                status.style.color = "white";
            }
        }

        // Lógica de juego
        setInterval(() => {
            if(!active) return;
            // Drenaje de energía
            let usage = 0.5;
            if(!doorOpen) usage += 1.5;
            if(monitoring) usage += 1.0;
            power -= usage;
            document.getElementById("power").innerText = Math.floor(power);
            if(power <= 0) gameOver("TE QUEDASTE SIN LUZ");
        }, 1500);

        setInterval(() => {
            if(!active) return;
            // Movimiento enemigo
            if(Math.random() > 0.7) {
                enemyPos++;
                if(enemyPos === 3 && !doorOpen) {
                    enemyPos = 1; // Se va si la puerta está cerrada
                } else if(enemyPos > 3) {
                    gameOver("¡JUMPSCARE!");
                }
                if(monitoring) updateUI();
            }
        }, 4000);

        function gameOver(reason) {
            active = false;
            alert(reason);
            location.reload();
        }
    </script>
</body>
</html>
