<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini FNAF Clone</title>
    <style>
        body { background: #000; color: white; font-family: 'Courier New', Courier, monospace; text-align: center; overflow: hidden; }
        #office { width: 600px; height: 400px; border: 5px solid #333; margin: 20px auto; position: relative; background: #1a1a1a; }
        .door-btn { position: absolute; bottom: 10px; padding: 10px; cursor: pointer; }
        #btn-left { left: 10px; background: red; }
        #cam-monitor { width: 100%; height: 100%; background: #000; position: absolute; top: 0; display: none; z-index: 10; }
        .status { font-size: 1.2rem; margin: 10px; }
        #static { position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0.1; pointer-events: none; background: url('https://media.giphy.com/media/oEI9uWUic9Zf2/giphy.gif'); }
        .ui-btn { background: #444; color: white; border: 1px solid #fff; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Noche 1</h1>
    <div class="status">Energía: <span id="power">100</span>% | Hora: <span id="time">12</span> AM</div>

    <div id="office">
        <div id="static"></div>
        <div id="office-view">
            <p style="margin-top: 150px;">ESTÁS EN LA OFICINA</p>
            <div id="jumpscare" style="display:none; font-size: 50px; color: red; font-weight: bold;">¡TE ATRAPARON!</div>
        </div>

        <div id="cam-monitor">
            <h3 id="cam-name">CAM 01: Pasillo</h3>
            <div id="enemy-view" style="font-size: 20px; margin-top: 100px;">VACÍO</div>
            <button class="ui-btn" onclick="switchCam(1)">CAM 01</button>
            <button class="ui-btn" onclick="switchCam(2)">CAM 02</button>
        </div>

        <button id="btn-left" class="door-btn" onclick="toggleDoor()">PUERTA: ABIERTA</button>
        <button style="position: absolute; bottom: 10px; right: 10px;" class="ui-btn" onclick="toggleMonitor()">MONITOR</button>
    </div>

    <script>
        let power = 100;
        let hour = 0; // 0 es 12 AM
        let doorOpen = true;
        let monitoring = false;
        let currentCam = 1;
        let enemyPos = 1; // 1: Cam1, 2: Cam2, 3: Puerta, 4: Ataque
        let gameOver = false;

        // Bucle de Energía
        setInterval(() => {
            if (gameOver) return;
            let drain = 0.5;
            if (!doorOpen) drain += 1.5;
            if (monitoring) drain += 1;
            
            power -= drain;
            document.getElementById("power").innerText = Math.floor(power);
            if (power <= 0) endGame("Se acabó la luz...");
        }, 2000);

        // Reloj
        setInterval(() => {
            if (gameOver) return;
            hour++;
            document.getElementById("time").innerText = hour;
            if (hour >= 6) endGame("¡Ganaste! Son las 6 AM");
        }, 30000); // Cada 30 seg sube una hora

        // Movimiento del "Animatrónico"
        setInterval(() => {
            if (gameOver) return;
            if (Math.random() > 0.6) {
                enemyPos++;
                if (enemyPos === 3 && !doorOpen) {
                    enemyPos = 1; // Rebota si la puerta está cerrada
                } else if (enemyPos > 3) {
                    endGame("¡Jumpscare!");
                }
                updateCamView();
            }
        }, 5000);

        function toggleDoor() {
            doorOpen = !doorOpen;
            document.getElementById("btn-left").innerText = doorOpen ? "PUERTA: ABIERTA" : "PUERTA: CERRADA";
            document.getElementById("btn-left").style.background = doorOpen ? "red" : "green";
        }

        function toggleMonitor() {
            monitoring = !monitoring;
            document.getElementById("cam-monitor").style.display = monitoring ? "block" : "none";
            updateCamView();
        }

        function switchCam(n) {
            currentCam = n;
            document.getElementById("cam-name").innerText = "CAM 0" + n;
            updateCamView();
        }

        function updateCamView() {
            const view = document.getElementById("enemy-view");
            if (currentCam === enemyPos) {
                view.innerText = "¡ALGO SE MUEVE EN LAS SOMBRAS!";
                view.style.color = "yellow";
            } else {
                view.innerText = "VACÍO";
                view.style.color = "white";
            }
        }

        function endGame(msg) {
            gameOver = true;
            alert(msg);
            if (msg === "¡Jumpscare!") {
                document.getElementById("jumpscare").style.display = "block";
            }
            location.reload();
        }
    </script>
</body>
</html>
