<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Gantt Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root,[data-theme="dark"]{--bg:#0f1117;--surface:#161b27;--surface-2:#1d2435;--surface-3:#232b3e;--border:#2a3348;--border-light:#1f2a3c;--text:#e2e8f4;--text-muted:#6b7fa3;--text-dim:#3d4f6e;--shadow:rgba(0,0,0,.5);--bar-l3-bg:#2a3a5e;--bar-l3-text:#a0b8e8;--bar-l3-border:#3a5080;--weekend:rgba(255,255,255,.018);--stripe:rgba(255,255,255,.012);--bar-hover:rgba(79,142,247,.04)}
[data-theme="light"]{--bg:#f0f4fb;--surface:#fff;--surface-2:#f8fafd;--surface-3:#edf1f9;--border:#d0d9ec;--border-light:#e4eaf5;--text:#1a2340;--text-muted:#5a6a8a;--text-dim:#9aaac4;--shadow:rgba(0,0,0,.12);--bar-l3-bg:#e8edf8;--bar-l3-text:#3a5080;--bar-l3-border:#c0cce8;--weekend:rgba(0,0,0,.025);--stripe:rgba(0,0,0,.018);--bar-hover:rgba(79,142,247,.06)}
:root{--accent:#4f8ef7;--accent-glow:rgba(79,142,247,.18);--accent-2:#f7734f;--accent-2-glow:rgba(247,115,79,.15);--green:#3ecf8e;--yellow:#f5c842;--header-h:62px;--row-h:46px;--sidebar-w:300px;--radius:10px;--font-mono:'Space Mono',monospace;--font-main:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-main);transition:background .25s,color .25s}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.app{height:100vh;display:flex;flex-direction:column;padding:12px;gap:10px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);flex-shrink:0;transition:background .25s,border-color .25s}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.logo-badge{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#2c60c4);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 14px var(--accent-glow)}
.brand-title{font-family:var(--font-mono);font-size:11px;color:var(--text);font-weight:700;letter-spacing:.02em;line-height:1.3}
.brand-sub{font-size:10px;color:var(--text-muted);font-weight:400;margin-top:1px;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s}
.brand-sub:hover{border-bottom-color:var(--text-dim)}
.title-input{font-size:10px;font-family:var(--font-main);background:var(--surface-3);color:var(--text);border:1px solid var(--accent);border-radius:4px;padding:1px 6px;outline:none;width:200px}
.view-toggle{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.view-toggle button{padding:5px 12px;font-size:9px;font-family:var(--font-mono);font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-radius:6px;border:none;cursor:pointer;color:var(--text-muted);background:transparent;transition:all .18s}
.view-toggle button.active{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--accent-glow)}
.view-toggle button:not(.active):hover{color:var(--text);background:var(--surface-3)}
.icon-btn{height:34px;padding:0 14px;display:flex;align-items:center;gap:7px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);font-size:9px;font-family:var(--font-mono);font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .18s;white-space:nowrap}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.icon-btn i{font-size:11px}
.icon-btn.danger{background:var(--accent-2-glow);border-color:var(--accent-2);color:var(--accent-2)}
.icon-btn.danger:hover{background:rgba(247,115,79,.3)}
.hamburger{display:none}
.theme-btn{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);font-size:13px;cursor:pointer;transition:all .18s;flex-shrink:0}
.theme-btn:hover{border-color:var(--yellow);color:var(--yellow);background:rgba(245,200,66,.12)}
[data-theme="light"] .icon-moon{display:none}
[data-theme="dark"] .icon-sun{display:none}
.dropdown-wrap{position:relative}
.dropdown-menu{display:none;position:absolute;right:0;top:calc(100% + 6px);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);min-width:175px;z-index:60;overflow:hidden;box-shadow:0 12px 32px var(--shadow);animation:fadeDown .15s ease}
.dropdown-menu.open{display:block}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:11px 15px;font-size:9px;font-family:var(--font-mono);font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);cursor:pointer;transition:all .15s;border-bottom:1px solid var(--border-light)}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:var(--surface-3);color:var(--text)}
.dropdown-item i{font-size:12px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-input{height:34px;padding:0 10px 0 32px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:10px;font-family:var(--font-main);outline:none;transition:all .18s;width:180px}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--accent);width:220px}
.search-input.has-results{border-color:var(--yellow);background:rgba(245,200,66,.07)}
.search-input.no-results{border-color:var(--accent-2);background:var(--accent-2-glow)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:10px;pointer-events:none}
.search-nav{display:none;align-items:center;gap:2px;position:absolute;right:4px;top:50%;transform:translateY(-50%)}
.search-wrap.active .search-nav{display:flex}
.search-wrap.active .search-input{padding-right:84px}
.snav-count{font-family:var(--font-mono);font-size:8px;color:var(--text-muted);padding:0 3px;white-space:nowrap}
.snav-btn{width:20px;height:20px;border-radius:4px;border:none;background:var(--surface-3);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s}
.snav-btn:hover{background:var(--accent);color:#fff}
mark.hl{background:rgba(245,200,66,.35);border-radius:3px;padding:0 1px;color:inherit}
mark.hl.cur{background:rgba(245,200,66,.72)}
.row-h.s-match{background:rgba(245,200,66,.05)}
.row-h.s-current{background:rgba(245,200,66,.13)!important;outline:1px solid rgba(245,200,66,.4);outline-offset:-1px}
#search-panel{display:none;align-items:center;gap:8px;padding:7px 18px;background:rgba(245,200,66,.05);border-bottom:1px solid rgba(245,200,66,.18);font-family:var(--font-mono);font-size:9px;color:var(--text-muted);flex-shrink:0}
#search-panel.on{display:flex}
#search-panel i{color:var(--yellow)}
.sp-count{color:var(--yellow);font-weight:700}
.sp-q{color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-cur{color:var(--text-muted);flex:1}
.sp-clear{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-muted);font-family:var(--font-mono);font-size:8px;padding:2px 8px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.06em}
.sp-clear:hover{border-color:var(--accent-2);color:var(--accent-2)}
.gantt-frame{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);position:relative;min-height:0;transition:background .25s,border-color .25s}
.gantt-top-row{display:flex;flex-shrink:0;height:var(--header-h);border-bottom:1px solid var(--border);background:var(--surface-2);transition:background .25s,border-color .25s}
.gantt-body-row{flex:1;display:flex;overflow:hidden;min-height:0}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
@media(max-width:768px){.hamburger{display:flex}#task-sidebar{position:absolute;left:-310px;z-index:50;height:100%;transition:left .28s cubic-bezier(.4,0,.2,1);box-shadow:6px 0 20px var(--shadow)}#task-sidebar.open{left:0}#sidebar-overlay.show{display:block}.gantt-top-row .sidebar-header{display:none!important}}
.sidebar-header{width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-end;padding:0 16px 10px;border-right:1px solid var(--border)}
.sidebar-header-label{font-family:var(--font-mono);font-size:8px;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
.sidebar-header-count{font-size:10px;color:var(--text-muted)}
#timeline-header-clip{flex:1;overflow:hidden;position:relative}
.gantt-header-inner{display:flex;flex-direction:column;height:var(--header-h)}
#task-sidebar{width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);transition:background .25s,border-color .25s}
#task-list{flex:1;overflow-y:auto}
#timeline-viewport{flex:1;overflow:auto;position:relative;background:var(--bg);transition:background .25s}
.hidden{display:none!important}
.row-h{height:var(--row-h);min-height:var(--row-h);max-height:var(--row-h);display:flex;align-items:center;border-bottom:1px solid var(--border-light);transition:background .12s;cursor:pointer}
.row-h:hover{background:var(--surface-2)}
.row-h.active{background:var(--accent-glow)}
.task-label{display:flex;align-items:center;width:100%;overflow:hidden;font-size:10px;color:var(--text);white-space:nowrap}
.task-id{font-family:var(--font-mono);font-size:8px;color:var(--accent);font-weight:700;margin-right:6px;flex-shrink:0}
.task-name{overflow:hidden;text-overflow:ellipsis;flex:1}
.chevron-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;margin-right:4px;transition:color .15s}
.chevron-btn:hover{color:var(--accent)}
.dot-marker{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px}
.dot-marker::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--text-dim)}
#month-header{display:flex;height:30px;flex-shrink:0;border-bottom:1px solid var(--border-light)}
.month-cell{flex-shrink:0;display:flex;align-items:center;padding:0 8px;font-family:var(--font-mono);font-size:8px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-right:1px solid var(--border);white-space:nowrap;overflow:hidden}
#unit-header{display:flex;height:32px;flex-shrink:0}
.unit-cell{flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border-light);font-family:var(--font-mono);font-size:9px;color:var(--text-dim)}
.unit-cell.today-col{background:rgba(79,142,247,.07);color:var(--accent);font-weight:700}
.unit-cell.weekend{background:var(--weekend)}
#bars-container{position:relative}
.bar-row{height:var(--row-h);min-height:var(--row-h);max-height:var(--row-h);position:relative;border-bottom:1px solid var(--border-light)}
.bar-row:nth-child(even){background:var(--stripe)}
.bar-row:hover{background:var(--bar-hover)}
.grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border-light);pointer-events:none}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);border-radius:6px;display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:filter .15s,transform .15s;min-width:10px;height:22px;font-family:var(--font-main);font-size:9px;font-weight:600}
.gantt-bar:hover{filter:brightness(1.12);transform:translateY(-50%) scaleY(1.08);z-index:5}
.gantt-bar .bar-label{padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-bar.milestone{border-radius:3px;transform:translateY(-50%) rotate(45deg);width:14px!important;height:14px!important}
.gantt-bar.milestone:hover{transform:translateY(-50%) rotate(45deg) scale(1.25)}
#today-line{position:absolute;top:0;bottom:0;width:1px;background:var(--accent-2);z-index:10;pointer-events:none}
#today-label{position:absolute;top:4px;left:50%;transform:translateX(-50%);background:var(--accent-2);color:#fff;font-family:var(--font-mono);font-size:7px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap}
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:400px;box-shadow:0 20px 60px var(--shadow);animation:slideUp .22s cubic-bezier(.4,0,.2,1);overflow:hidden}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-tag{font-family:var(--font-mono);font-size:8px;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.modal-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;transition:color .15s;flex-shrink:0}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.modal-field{display:flex;flex-direction:column;gap:4px}
.modal-field-label{font-family:var(--font-mono);font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}
.modal-field-value{font-size:11px;color:var(--text);font-weight:500}
.modal-obs{background:var(--surface-3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:10px;color:var(--text-muted);min-height:60px;line-height:1.6;font-style:italic}
.modal-pills{display:flex;gap:8px;flex-wrap:wrap}
.modal-pill{padding:4px 10px;border-radius:20px;font-size:9px;font-weight:600;font-family:var(--font-mono)}
.pill-blue{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(79,142,247,.3)}
.pill-orange{background:var(--accent-2-glow);color:var(--accent-2);border:1px solid rgba(247,115,79,.3)}
.modal-footer{padding:0 20px 18px}
.modal-btn{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface-3);color:var(--text);font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .18s}
.modal-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.footer{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 4px;font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;flex-wrap:wrap}
.footer a{color:var(--text-dim);text-decoration:none;transition:color .15s}
.footer a:hover{color:var(--accent)}
.stats-bar{display:flex;gap:8px;align-items:center}
.stat-chip{padding:4px 10px;border-radius:6px;background:var(--surface-3);border:1px solid var(--border);font-family:var(--font-mono);font-size:8px;color:var(--text-muted);display:flex;align-items:center;gap:5px}
.stat-dot{width:6px;height:6px;border-radius:50%}
#toast{position:fixed;bottom:20px;right:20px;z-index:200;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:10px;color:var(--text);font-family:var(--font-mono);display:flex;align-items:center;gap:8px;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;min-width:180px}
#toast.show{transform:translateY(0);opacity:1}

.modal-input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface-3);color:var(--text);font-size:10px;font-family:var(--font-main);outline:none;transition:border-color .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-input.mono{font-family:var(--font-mono)}
.modal-input[rows]{padding:8px 10px;line-height:1.5}
</style>
</head>
<body>

<div id="detail-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-tag" id="m-id"></div>
        <div class="modal-title" id="modal-title">Detalles</div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-pills">
        <span class="modal-pill pill-blue" id="m-level"></span>
        <span class="modal-pill pill-orange" id="m-owner-pill"></span>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Nombre de la tarea</div>
        <input class="modal-input" id="m-name" type="text" placeholder="Nombre">
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Responsable</div>
        <input class="modal-input" id="m-owner" type="text" placeholder="Responsable">
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="modal-field" style="flex:1;min-width:100px">
          <div class="modal-field-label">Inicio (dd/mm/aaaa)</div>
          <input class="modal-input mono" id="m-start" type="text" placeholder="dd/mm/aaaa">
        </div>
        <div class="modal-field" style="flex:1;min-width:100px">
          <div class="modal-field-label">Fin (dd/mm/aaaa)</div>
          <input class="modal-input mono" id="m-end" type="text" placeholder="dd/mm/aaaa">
        </div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Observaciones</div>
        <textarea class="modal-input" id="m-obs" rows="3" placeholder="Notas…" style="resize:vertical"></textarea>
      </div>
      <div id="m-error" style="display:none;font-size:9px;color:var(--accent-2);font-family:var(--font-mono);padding:4px 0"></div>
    </div>
    <div class="modal-footer" style="display:flex;gap:8px">
      <button class="modal-btn" style="flex:1" onclick="saveModal()"><i class="fas fa-check" style="margin-right:5px"></i>Guardar</button>
      <button class="modal-btn" style="flex:1;opacity:.6" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"><i class="fas fa-check-circle" style="color:var(--green)"></i><span id="toast-msg">Listo</span></div>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <button class="icon-btn hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="logo-badge">📅</div>
      <div>
        <div class="brand-title">GANTT PRO</div>
        <div class="brand-sub" id="project-title" onclick="startEditTitle()" title="Clic para editar">Visualizador de cronogramas</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="search-wrap" id="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input type="text" class="search-input" id="search-input" placeholder="Buscar tarea…" oninput="onSearch(this.value)" onkeydown="onSearchKey(event)">
        <div class="search-nav" id="search-nav">
          <span class="snav-count" id="snav-count">0/0</span>
          <button class="snav-btn" onclick="searchStep(-1)"><i class="fas fa-chevron-up"></i></button>
          <button class="snav-btn" onclick="searchStep(1)"><i class="fas fa-chevron-down"></i></button>
        </div>
      </div>
      <div class="view-toggle">
        <button onclick="setViewMode('days')" id="btn-days" class="active">Días</button>
        <button onclick="setViewMode('weeks')" id="btn-weeks">Semanas</button>
        <button onclick="setViewMode('months')" id="btn-months">Meses</button>
      </div>
      <div class="dropdown-wrap">
        <button class="icon-btn" onclick="toggleDropdown()"><i class="fas fa-database"></i> Datos</button>
        <div id="drop-menu" class="dropdown-menu">
          <label class="dropdown-item"><i class="fas fa-file-import" style="color:#4f8ef7"></i> Importar CSV<input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleFile(this)"></label>

<script>
/* ══ STATE ══ */
var tasks=[], viewMode='days', columnWidth=45, activeTaskId=null, lastRenderStart=null;
var searchQuery='', searchMatches=[], searchCursor=-1;
var projectStart=new Date(2026,2,1); // fallback only

var defaultCSV="ID;Tarea;Responsable;Inicio;Fin;Observaciones\n"+
"1;Levantamiento de Requisitos;Dir. Proy;01/03/2026;20/03/2026;Fase de definición técnica inicial.\n"+
"1.1;Revisión de Normativa;Ing. Diseño;01/03/2026;07/03/2026;Análisis de aeronavegabilidad aeronáutica.\n"+
"1.2;Hito: Requisitos Definidos;Cliente;20/03/2026;20/03/2026;Firma de acta inicial del proyecto.\n"+
"2;Bases de Certificación;Ing. Cert;21/03/2026;15/04/2026;Criterios de seguridad y validación.\n"+
"3;Fase de Ensayos;Jefe Lab;16/05/2026;10/07/2026;Validación técnica de ingeniería mecanizada.\n"+
"3.1;Ensayos de Laboratorio;Técnico NDT;16/05/2026;31/05/2026;Pruebas de materiales y fatiga.";

/* ══ BOOT ══ */
function loadInitialData(){
  fetch('gantt.csv')
    .then(function(r){if(!r.ok)throw 0;return r.arrayBuffer();})
    .then(function(b){smartDecode(b);})
    .catch(function(){tasks=parseCSV(defaultCSV);render();});
  setTimeout(scrollToToday,400);
}
function smartDecode(buf){
  var u8=new Uint8Array(buf),utf=true;
  try{new TextDecoder('utf-8',{fatal:true}).decode(u8);}catch(e){utf=false;}
  tasks=parseCSV(new TextDecoder(utf?'utf-8':'iso-8859-1').decode(u8));render();
}
// RFC4180-compliant CSV parser — handles ; separators, quoted fields, embedded ; and \n
function parseCSVRows(txt){
  var rows=[],row=[],field='',inQ=false;
  txt=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(var i=0;i<txt.length;i++){
    var ch=txt[i];
    if(inQ){
      if(ch==='"'){
        if(txt[i+1]==='"'){field+='"';i++;}  // escaped quote
        else inQ=false;
      } else { field+=ch; }
    } else {
      if(ch==='"'){ inQ=true; }
      else if(ch===';'){ row.push(field);field=''; }
      else if(ch==='\n'){ row.push(field);field='';if(row.length>0&&!(row.length===1&&row[0]===''))rows.push(row);row=[]; }
      else { field+=ch; }
    }
  }
  if(field||row.length)row.push(field);
  if(row.length>0&&!(row.length===1&&row[0]===''))rows.push(row);
  return rows;
}

function parseCSV(txt){
  var allRows=parseCSVRows(txt),data=[],errors=[];
  if(allRows.length<2)return data;
  var dataRows=allRows.slice(1); // skip header
  var rawIds=dataRows.map(function(r){return r.length>=6?r[0].trim():'';}).filter(Boolean);

  // ── Detect import mode ──
  // Mode A: IDs are dotted letter paths  (a, a.a, a.b, b …)  → convert to numeric paths
  // Mode B: IDs are single depth letters (a=lvl1, b=lvl2, c=lvl3) → generate numeric paths
  // Mode C: IDs are already numeric      (1, 1.1, 2 …)       → use as-is

  var modeA=rawIds.length>0 && rawIds.every(function(id){return /^[a-zA-Z][a-zA-Z.]*$/.test(id) && id.length>1;});
  var modeB=rawIds.length>0 && rawIds.every(function(id){return /^[a-cA-C]$/.test(id);});
  var idMap={};  // rawId (or index) → numeric id string

  if(modeB){
    // Single letter = depth indicator: a→1, b→2, c→3
    // Build full numeric path by tracking a stack of counters per level
    var stack=[];   // stack[level-1] = current counter at that depth
    for(var i=0;i<rawIds.length;i++){
      var letter=rawIds[i].toLowerCase();
      var level=letter==='a'?1:letter==='b'?2:3;
      // Trim stack to current level
      while(stack.length>=level) stack.pop();
      // Increment counter at this level
      var cnt=(stack.length>0?0:0); // not used directly
      // Find the last number at this level from existing stack
      stack.push((stack[level-2]||0)); // placeholder
      // Simpler: just count how many same-level items share the same parent
      // Rebuild: use a counters object keyed by parent path
      idMap[i]=null; // will fill below
    }
    // Redo with proper counter logic
    var levelCounters=[0,0,0]; // index = level-1
    var levelStack=['','','']; // parent path at each level
    idMap={};
    for(var i=0;i<rawIds.length;i++){
      var letter=rawIds[i].toLowerCase();
      var lvl=letter==='a'?1:letter==='b'?2:3;
      if(lvl===1){
        levelCounters[0]++;
        levelCounters[1]=0; levelCounters[2]=0;
        idMap[i]=String(levelCounters[0]);
      } else if(lvl===2){
        levelCounters[1]++;
        levelCounters[2]=0;
        idMap[i]=levelCounters[0]+'.'+levelCounters[1];
      } else {
        levelCounters[2]++;
        idMap[i]=levelCounters[0]+'.'+levelCounters[1]+'.'+levelCounters[2];
      }
    }
  } else if(modeA){
    // Dotted letter paths: convert each segment letter → number
    var letterToNum={},counters={};
    rawIds.forEach(function(id){
      var parts=id.split('.'),numParts=[];
      for(var p=0;p<parts.length;p++){
        var pk=numParts.join('.');
        if(!counters[pk])counters[pk]={};
        var l=parts[p];
        if(!counters[pk][l])counters[pk][l]=Object.keys(counters[pk]).length+1;
        numParts.push(counters[pk][l]);
      }
      letterToNum[id]=numParts.join('.');
    });
    rawIds.forEach(function(id,i){idMap[i]=letterToNum[id]||id;});
  }

  for(var i=0;i<dataRows.length;i++){
    var cols=dataRows[i];if(cols.length<6)continue;
    var rawId=cols[0].trim();
    var id=(modeA||modeB)?(idMap[i]||rawId):rawId;
    var ss=cols[3].trim(),es=cols[4].trim();
    var sd=parseDate(ss),ed=parseDate(es);
    if(isNaN(sd.getTime())||isNaN(ed.getTime())){errors.push('ID '+id+': fecha inválida ('+ss+' / '+es+')');continue;}
    if(ed<sd){errors.push('ID '+id+': fin ('+es+') anterior al inicio ('+ss+')');continue;}
    data.push({id:id,level:id.split('.').filter(Boolean).length,name:cols[1].trim(),owner:cols[2].trim(),start:ss,end:es,obs:cols[5].trim(),open:true});
  }
  if(errors.length)setTimeout(function(){alert('⚠️ '+errors.length+' error(es) en el CSV:\n\n'+errors.join('\n')+'\n\nEstas filas fueron omitidas.');},100);
  return data;
}
function parseDate(s){var p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}
function diffDays(a,b){return Math.round((a-b)/86400000);}

/* ══ THEME ══ */
function toggleTheme(){
  var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';
  h.dataset.theme=n;try{localStorage.setItem('gantt-theme',n);}catch(e){}
  showToast(n==='dark'?'🌙 Tema oscuro':'☀️ Tema claro');
}
(function(){try{var s=localStorage.getItem('gantt-theme');if(s)document.documentElement.dataset.theme=s;}catch(e){}})();

/* ══ EDITABLE TITLE ══ */
function startEditTitle(){
  var el=document.getElementById('project-title'),prev=el.innerText;
  var inp=document.createElement('input');
  inp.className='title-input';inp.value=prev;
  el.replaceWith(inp);inp.focus();inp.select();
  function commit(){
    var val=inp.value.trim()||prev;
    var neo=document.createElement('div');
    neo.className='brand-sub';neo.id='project-title';neo.innerText=val;
    neo.title='Clic para editar';neo.onclick=startEditTitle;
    inp.replaceWith(neo);
    try{localStorage.setItem('gantt-title',val);}catch(e){}
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.value=prev;inp.blur();}
  });
}
(function(){try{var t=localStorage.getItem('gantt-title');if(t){var el=document.getElementById('project-title');if(el)el.innerText=t;}}catch(e){}})();

/* ══ SEARCH ══ */
function onSearch(val){
  searchQuery=val.trim();searchCursor=-1;computeMatches();
  searchMatches.forEach(function(id){ensureVisible(id);});
  if(searchMatches.length)searchCursor=0;
  updateSearchUI();render();
  if(searchMatches.length)scrollToMatch(0);
}
function computeMatches(){
  if(!searchQuery){searchMatches=[];return;}
  var q=searchQuery.toLowerCase();
  searchMatches=tasks.filter(function(t){return t.name.toLowerCase().indexOf(q)>=0||t.id.indexOf(q)>=0||t.owner.toLowerCase().indexOf(q)>=0;}).map(function(t){return t.id;});
}
function updateSearchUI(){
  var hasQ=searchQuery.length>0,n=searchMatches.length,cur=searchCursor>=0?searchCursor+1:(n>0?1:0);
  document.getElementById('search-wrap').classList.toggle('active',hasQ&&n>0);
  document.getElementById('search-input').classList.toggle('has-results',hasQ&&n>0);
  document.getElementById('search-input').classList.toggle('no-results',hasQ&&n===0);
  document.getElementById('search-panel').classList.toggle('on',hasQ);
  if(hasQ){
    document.getElementById('snav-count').innerText=n>0?cur+'/'+n:'0/0';
    document.getElementById('sp-count').innerText=n;
    document.getElementById('sp-q').innerText='"'+searchQuery+'"';
    document.getElementById('sp-cur').innerText=n===0?'— sin coincidencias':(searchCursor>=0?'· mostrando '+(searchCursor+1)+' de '+n:'');
  }
}
function searchStep(dir){
  if(!searchMatches.length)return;
  searchCursor=(searchCursor+dir+searchMatches.length)%searchMatches.length;
  updateSearchUI();render();scrollToMatch(searchCursor);
  setTimeout(function(){var el=document.querySelector('[data-id="'+searchMatches[searchCursor]+'"]');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});},40);
}
function onSearchKey(e){
  if(e.key==='Enter'){e.shiftKey?searchStep(-1):searchStep(1);}
  if(e.key==='Escape')clearSearch();
  if(e.key==='ArrowDown'){e.preventDefault();searchStep(1);}
  if(e.key==='ArrowUp'){e.preventDefault();searchStep(-1);}
}
function clearSearch(){
  document.getElementById('search-input').value='';
  searchQuery='';searchMatches=[];searchCursor=-1;
  updateSearchUI();render();
}
function ensureVisible(id){
  var parts=id.split('.');
  for(var i=1;i<parts.length;i++){var pid=parts.slice(0,i).join('.');var p=tasks.filter(function(t){return t.id===pid;})[0];if(p)p.open=true;}
}
function scrollToMatch(idx){
  var id=searchMatches[idx];if(!id)return;
  var t=tasks.filter(function(x){return x.id===id;})[0];if(!t)return;
  var vp=document.getElementById('timeline-viewport');
  var sf=columnWidth/(viewMode==='days'?1:viewMode==='weeks'?7:30.4);
  var rs=lastRenderStart||projectStart;
  vp.scrollTo({left:Math.max(0,diffDays(parseDate(t.start),rs)*sf-vp.offsetWidth/3),behavior:'smooth'});
}

/* ══ VISIBILITY ══ */
function isParentCollapsed(t){
  var parts=t.id.split('.');
  for(var i=1;i<parts.length;i++){var pid=parts.slice(0,i).join('.');var p=tasks.filter(function(x){return x.id===pid;})[0];if(p&&!p.open)return true;}
  return false;
}

/* ══ RENDER ══ */
function barColors(t){
  if(t.start===t.end)return{bg:'#f5c842',text:'#1a1400',shadow:'rgba(245,200,66,.3)'};
  if(t.level===1)return{bg:'#4f8ef7',text:'#fff',shadow:'rgba(79,142,247,.35)'};
  if(t.level===2)return{bg:'#3ecf8e',text:'#00281a',shadow:'rgba(62,207,142,.3)'};
  return{bg:'var(--bar-l3-bg)',text:'var(--bar-l3-text)',shadow:'none',border:'var(--bar-l3-border)'};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlText(text,q,isCur){
  if(!q)return esc(text);
  var i=text.toLowerCase().indexOf(q.toLowerCase());if(i<0)return esc(text);
  return esc(text.slice(0,i))+'<mark class="hl'+(isCur?' cur':'')+'">'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}

function render(){
  var listObj=document.getElementById('task-list');
  var monthHdr=document.getElementById('month-header');
  var unitHdr=document.getElementById('unit-header');
  var barsObj=document.getElementById('bars-container');
  var todayLine=document.getElementById('today-line');

  listObj.innerHTML='';monthHdr.innerHTML='';unitHdr.innerHTML='';
  Array.from(barsObj.children).forEach(function(c){if(c.id!=='today-line')c.remove();});

  /* ── Dynamic horizon: scan tasks for min/max dates ── */
  var minD=null,maxD=null;
  tasks.forEach(function(t){
    var s=parseDate(t.start),e=parseDate(t.end);
    if(!minD||s<minD)minD=s;
    if(!maxD||e>maxD)maxD=e;
  });
  if(!minD){minD=new Date();maxD=new Date(minD.getTime()+250*86400000);}
  /* 5-day margin before, 15-day margin after */
  var renderStart=new Date(minD.getTime()-5*86400000);
  var renderEnd  =new Date(maxD.getTime()+15*86400000);
  lastRenderEnd=renderEnd;
  var DAYS=Math.max(30,Math.round((renderEnd-renderStart)/86400000));
  lastRenderStart=renderStart; // expose for scroll functions

  var sf=columnWidth/(viewMode==='days'?1:viewMode==='weeks'?7:30.4);
  var totW=DAYS*sf;

  /* ── HEADER ── */
  monthHdr.style.display='flex';

  if(viewMode==='days'){
    var i=0;
    while(i<DAYS){
      var d=new Date(renderStart.getFullYear(),renderStart.getMonth(),renderStart.getDate()+i);
      var dom=d.getDate();
      var daysToNext=(dom<16)?(16-dom):diffDays(new Date(d.getFullYear(),d.getMonth()+1,1),d);
      var span=Math.min(daysToNext,DAYS-i);
      var mc=document.createElement('div');mc.className='month-cell';
      mc.style.width=(span*columnWidth)+'px';
      var ms=d.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
      mc.innerText=ms.charAt(0).toUpperCase()+ms.slice(1);
      monthHdr.appendChild(mc);i+=span;
    }
    for(var di=0;di<DAYS;di++){
      var dd=new Date(renderStart.getFullYear(),renderStart.getMonth(),renderStart.getDate()+di);
      var isT=diffDays(dd,new Date())===0;
      var isW=dd.getDay()===0||dd.getDay()===6;
      var uc=document.createElement('div');
      uc.className='unit-cell'+(isT?' today-col':'')+(isW?' weekend':'');
      uc.style.width=columnWidth+'px';uc.style.height='32px';uc.innerText=dd.getDate();
      unitHdr.appendChild(uc);
    }
  } else if(viewMode==='weeks'){
    var units=Math.ceil(DAYS/7),cm=-1,mb=null;
    for(var wi=0;wi<units;wi++){
      var wd=new Date(renderStart.getFullYear(),renderStart.getMonth(),renderStart.getDate()+wi*7);
      if(wd.getMonth()!==cm){cm=wd.getMonth();mb=document.createElement('div');mb.className='month-cell';mb.style.width='0px';mb.innerText=wd.toLocaleDateString('es-ES',{month:'long',year:'numeric'});monthHdr.appendChild(mb);}
      mb.style.width=(parseFloat(mb.style.width)+columnWidth)+'px';
      var wuc=document.createElement('div');wuc.className='unit-cell';wuc.style.width=columnWidth+'px';wuc.style.height='32px';wuc.innerText='S'+(wi+1);unitHdr.appendChild(wuc);
    }
  } else {
    monthHdr.style.display='none';
    var mCount=Math.ceil(DAYS/30)+1;
    for(var mi=0;mi<mCount;mi++){
      var md=new Date(renderStart.getFullYear(),renderStart.getMonth()+mi,1);
      var muc=document.createElement('div');muc.className='unit-cell';
      muc.style.cssText='width:'+columnWidth+'px;height:62px;font-size:10px;color:var(--text-muted);font-weight:700;border-right:1px solid var(--border);';
      muc.innerText=md.toLocaleDateString('es-ES',{month:'long'}).toUpperCase();unitHdr.appendChild(muc);
    }
  }

  /* ── TASKS ── */
  var vis=0,mil=0;
  tasks.forEach(function(t){
    var collapsed=isParentCollapsed(t);
    var isMatch=searchMatches.indexOf(t.id)>=0;
    var isCur=searchMatches[searchCursor]===t.id;
    var hidden=collapsed||(searchQuery&&!isMatch);
    if(!hidden){vis++;if(t.start===t.end)mil++;}

    var cls=['row-h'];
    if(hidden)cls.push('hidden');
    if(activeTaskId===t.id)cls.push('active');
    if(isMatch&&!hidden)cls.push('s-match');
    if(isCur)cls.push('s-current');
    var lRow=document.createElement('div');
    lRow.className=cls.join(' ');
    lRow.style.paddingLeft=(t.level===1?12:t.level===2?26:42)+'px';
    lRow.style.paddingRight='12px';
    lRow.dataset.id=t.id;

    var hasKids=tasks.some(function(x){return x.id.indexOf(t.id+'.')===0&&x.level===t.level+1;});
    var ctrl;
    if(hasKids){
      ctrl=document.createElement('button');ctrl.className='chevron-btn';
      ctrl.innerHTML='<i class="fas fa-chevron-'+(t.open?'down':'right')+'"></i>';
      (function(tid){ctrl.addEventListener('click',function(e){e.stopPropagation();toggleNode(tid);});})(t.id);
    }else{ctrl=document.createElement('div');ctrl.className='dot-marker';}

    var lbl=document.createElement('div');lbl.className='task-label';
    lbl.innerHTML='<span class="task-id">'+esc(t.id)+'</span><span class="task-name" title="'+esc(t.name)+'">'+hlText(t.name,searchQuery,isCur)+'</span>';
    lRow.appendChild(ctrl);lRow.appendChild(lbl);
    (function(tid){lRow.addEventListener('click',function(){focusOnTask(tid);});})(t.id);
    listObj.appendChild(lRow);

    /* bar row */
    var sd=diffDays(parseDate(t.start),renderStart);
    var dur=diffDays(parseDate(t.end),parseDate(t.start))+1;
    var bRow=document.createElement('div');
    bRow.className='bar-row'+(hidden?' hidden':'');
    bRow.style.width=totW+'px';

    if(viewMode!=='months'){
      var step=viewMode==='days'?7:1,u2=viewMode==='days'?DAYS:Math.ceil(DAYS/7);
      for(var gi=0;gi<u2;gi+=step){var gl=document.createElement('div');gl.className='grid-line';gl.style.left=(gi*columnWidth)+'px';bRow.appendChild(gl);}
    }

    var col=barColors(t),isMil=t.start===t.end;
    var bar=document.createElement('div');
    bar.className='gantt-bar'+(isMil?' milestone':'');
    bar.style.left=(sd*sf+(isMil?sf/2-7:0))+'px';
    bar.style.width=isMil?'14px':Math.max(14,dur*sf)+'px';
    bar.style.background=col.bg;bar.style.color=col.text;
    if(col.shadow!=='none')bar.style.boxShadow='0 2px 10px '+col.shadow;
    if(col.border)bar.style.border='1px solid '+col.border;
    if(isCur)bar.style.outline='2px solid var(--yellow)';
    if(!isMil){var lb=document.createElement('div');lb.className='bar-label';lb.innerText=t.owner;bar.appendChild(lb);}
    (function(task){bar.addEventListener('click',function(){openModal(task);});})(t);
    bar.title=t.name+' — '+t.owner;
    bRow.appendChild(bar);barsObj.appendChild(bRow);
  });

  // Add 2 spacer rows at the bottom for comfortable scrolling
  for(var _sp=0;_sp<2;_sp++){
    var spRow=document.createElement('div');
    spRow.className='bar-row';spRow.style.width=totW+'px';spRow.style.background='transparent';spRow.style.border='none';
    barsObj.appendChild(spRow);
    var spL=document.createElement('div');spL.className='row-h';spL.style.border='none';spL.style.background='transparent';spL.style.cursor='default';
    listObj.appendChild(spL);
  }
  todayLine.style.left=(diffDays(new Date(),renderStart)*sf)+'px';
  document.getElementById('task-count').innerText=vis+' tarea'+(vis!==1?'s':'');
  document.getElementById('stat-tasks').innerText=vis-mil;
  document.getElementById('stat-milestones').innerText=mil;
  updateTodayBtn();
}

/* ══ CONTROLS ══ */
function setViewMode(m){
  viewMode=m;columnWidth=m==='days'?45:m==='weeks'?80:140;
  ['days','weeks','months'].forEach(function(x){document.getElementById('btn-'+x).className=m===x?'active':'';});
  document.getElementById('timeline-viewport').scrollTop=0;
  render();setTimeout(scrollToToday,80);
}
function toggleNode(id){var t=tasks.filter(function(x){return x.id===id;})[0];if(t){t.open=!t.open;render();}}
function focusOnTask(id,silent){
  if(!silent)activeTaskId=id;
  var t=tasks.filter(function(x){return x.id===id;})[0];if(!t)return;
  var vp=document.getElementById('timeline-viewport');
  var sf=columnWidth/(viewMode==='days'?1:viewMode==='weeks'?7:30.4);
  var rs=lastRenderStart||projectStart;
  vp.scrollTo({left:Math.max(0,diffDays(parseDate(t.start),rs)*sf-vp.offsetWidth/3),behavior:'smooth'});
  if(!silent)render();
}
var _modalTaskId=null;
function openModal(t){
  _modalTaskId=t.id;
  var mil=t.start===t.end;
  document.getElementById('m-id').innerText=t.id;
  document.getElementById('modal-title').innerText=t.name;
  document.getElementById('m-owner-pill').innerText='👤 '+t.owner;
  document.getElementById('m-level').innerText=mil?'◆ Hito':'Nivel '+t.level;
  document.getElementById('m-name').value=t.name;
  document.getElementById('m-owner').value=t.owner;
  document.getElementById('m-start').value=t.start;
  document.getElementById('m-end').value=t.end;
  document.getElementById('m-obs').value=t.obs||'';
  document.getElementById('m-error').style.display='none';
  document.getElementById('detail-modal').classList.add('open');
}
function saveModal(){
  var t=tasks.filter(function(x){return x.id===_modalTaskId;})[0];
  if(!t)return;
  var name=document.getElementById('m-name').value.trim();
  var owner=document.getElementById('m-owner').value.trim();
  var start=document.getElementById('m-start').value.trim();
  var end=document.getElementById('m-end').value.trim();
  var obs=document.getElementById('m-obs').value.trim();
  var errEl=document.getElementById('m-error');
  // Validate
  var sd=parseDate(start),ed=parseDate(end);
  if(!name){errEl.innerText='El nombre no puede estar vacío.';errEl.style.display='block';return;}
  if(isNaN(sd.getTime())||isNaN(ed.getTime())){errEl.innerText='Formato de fecha inválido. Usa dd/mm/aaaa.';errEl.style.display='block';return;}
  if(ed<sd){errEl.innerText='La fecha de fin no puede ser anterior al inicio.';errEl.style.display='block';return;}
  // Apply changes
  // Sanitize all text fields: ; → , and real newlines → literal \n
  function san(s){return s.replace(/;/g,',').replace(/\r?\n/g,'\\n');}
  t.name=san(name); t.owner=san(owner); t.start=start; t.end=end; t.obs=san(obs);
  closeModal();
  render();
  showToast('Tarea actualizada');
}
function closeModal(){document.getElementById('detail-modal').classList.remove('open');}
function handleFile(input){
  var r=new FileReader();
  r.onload=function(e){smartDecode(e.target.result);showToast('CSV importado');};
  r.readAsArrayBuffer(input.files[0]);toggleDropdown(false);
}
function csvField(v){
  // Sanitize: wrap in quotes if field contains ; or newline, escape inner quotes
  v=String(v==null?'':v).replace(/\r/g,'');
  if(v.indexOf(';')>=0||v.indexOf('\n')>=0||v.indexOf('"')>=0){
    return '"'+v.replace(/"/g,'""')+'"';
  }
  return v;
}
function exportCSV(){
  var csv='ID;Tarea;Responsable;Inicio;Fin;Observaciones\n';
  tasks.forEach(function(t){
    csv+=csvField(t.id)+';'+csvField(t.name)+';'+csvField(t.owner)+';'+
         csvField(t.start)+';'+csvField(t.end)+';'+csvField(t.obs)+'\n';
  });
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='gantt.csv';a.click();toggleDropdown(false);showToast('CSV exportado');
}
function todayInRange(){
  if(!lastRenderStart||!lastRenderEnd)return true;
  var today=new Date(); today.setHours(0,0,0,0);
  return today>=lastRenderStart && today<=lastRenderEnd;
}
function updateTodayBtn(){
  var btn=document.getElementById('btn-today');
  var line=document.getElementById('today-line');
  if(todayInRange()){
    btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer';
    line.style.display='block';
  } else {
    btn.disabled=true; btn.style.opacity='0.35'; btn.style.cursor='not-allowed';
    line.style.display='none';
  }
}
function scrollToToday(){
  if(!todayInRange())return;
  var vp=document.getElementById('timeline-viewport');
  var sf=columnWidth/(viewMode==='days'?1:viewMode==='weeks'?7:30.4);
  var rs=lastRenderStart||projectStart;
  vp.scrollTo({left:Math.max(0,diffDays(new Date(),rs)*sf-vp.offsetWidth/2),behavior:'smooth'});
}
function toggleSidebar(){document.getElementById('task-sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('task-sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('show');}
function toggleDropdown(f){var m=document.getElementById('drop-menu');if(f===false){m.classList.remove('open');}else{m.classList.toggle('open');}}
function showToast(msg){var el=document.getElementById('toast');document.getElementById('toast-msg').innerText=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2400);}

/* ══ SCROLL SYNC — bidireccional ══ */
var _lock=false;
document.getElementById('timeline-viewport').addEventListener('scroll',function(){
  if(_lock)return;_lock=true;
  document.getElementById('task-list').scrollTop=this.scrollTop;
  var h=document.getElementById('gantt-header-container');
  if(h)h.style.transform='translateX(-'+this.scrollLeft+'px)';
  _lock=false;
});
document.getElementById('task-list').addEventListener('scroll',function(){
  if(_lock)return;_lock=true;
  document.getElementById('timeline-viewport').scrollTop=this.scrollTop;
  _lock=false;
});
// Touch: drag task-list on mobile → moves bars viewport
(function(){
  var tl=document.getElementById('task-list');
  var vp=document.getElementById('timeline-viewport');
  var ty=0,st=0;
  tl.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;st=vp.scrollTop;},{passive:true});
  tl.addEventListener('touchmove',function(e){vp.scrollTop=st+(ty-e.touches[0].clientY);},{passive:true});
})();

/* GLOBAL EVENTS */
document.addEventListener('click',function(e){if(!e.target.closest('.dropdown-wrap'))toggleDropdown(false);});
document.getElementById('detail-modal').addEventListener('click',function(e){if(e.target.id==='detail-modal')closeModal();});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeModal();closeSidebar();clearSearch();}
  if(e.key==='t'&&!e.ctrlKey&&document.activeElement.tagName!=='INPUT')scrollToToday();
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('search-input').focus();}
});

loadInitialData();
</script>
