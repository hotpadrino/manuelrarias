<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <title>Mi Tabla en la Nube</title>
    <link rel="icon" href="data:,">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/281/281769.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #3ecf8e; color: white; }
        .formulario { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="formulario">
        <h3>Agregar nuevo dato</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="number" id="valor" placeholder="Valor">
        <button onclick="guardarDato()">Guardar en la Red</button>
    </div>

    <table id="tablaDatos">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        // 1. Configuración
        const SUPABASE_URL = 'https://yfbfbywjwslxsrgamqhj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_PXth9Sd24jgQOizXrmk5Tw_YVJh4V6j';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 2. Función para pedir los datos a la red
        async function cargarDatos() {
            const { data, error } = await db.from('tabla').select('*');
            if (error) {
                console.error('Error al cargar:', error.message);
            } else {
                mostrarEnTabla(data); // <--- Aquí es donde fallaba antes
            }
        }
        
        // 3. Función para DIBUJAR los datos en el HTML
        function mostrarEnTabla(datos) {
            const cuerpo = document.querySelector('#tablaDatos tbody');
            cuerpo.innerHTML = ''; 
            datos.forEach(fila => {
                cuerpo.innerHTML += `
                    <tr>
                        <td>${fila.id}</td>
                        <td>${fila.nombre}</td>
                        <td>${fila.telefono}</td>
                    </tr>`;
            });
        }
        
        // 4. Función para GUARDAR
        async function guardarDato() {
            const nom = document.getElementById('nombre').value;
            const tel = document.getElementById('telefono').value;
            const { error } = await db.from('tabla').insert([{ nombre: nom, telefono: tel }]);
            
            if (error) alert("Error: " + error.message);
            else {
                alert("¡Guardado!");
                cargarDatos(); 
            }
        }
        
        // 5. Arrancar la carga apenas abre la web
        cargarDatos();
                
    </script>
</body>
</html>
