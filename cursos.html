<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL DE ENTRENAMIENTO CAMAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ══════════════════════════════════════════════════
           VARIABLES CLARO / OSCURO
        ══════════════════════════════════════════════════ */
        :root, [data-theme="light"] {
            --t-bg: #f4f7f9;
            --t-card: #ffffff;
            --t-text: #2d3748;
            --t-text-muted: #718096;
            --t-border: #e2e8f0;
            --t-input-bg: #f8fafc;
            --t-accent: #2d7dd2;
            --t-h1: #003366;
            --t-h2: #1a3a6e;
            --t-hborder: #2d7dd2;
            --t-header-text: #ffffff;
            --t-table-hover: #f1f5f9;
        }

        [data-theme="dark"] {
            --t-bg: #0a1628;
            --t-card: rgba(10,22,40,0.85);
            --t-text: #d4dde8;
            --t-text-muted: #8fa3b8;
            --t-border: #1f2d3d;
            --t-input-bg: rgba(13,25,48,0.8);
            --t-accent: #4da6ff;
            --t-h1: #0a1628;
            --t-h2: #1a3a6e;
            --t-hborder: #2d7dd2;
            --t-header-text: #ffffff;
            --t-table-hover: rgba(77,166,255,0.05);
        }

        /* ══════════════════════════════════════════════════
           BASE
        ══════════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--t-bg);
            font-family: 'Barlow Condensed', sans-serif;
            color: var(--t-text);
            padding-top: 74px;
            min-height: 100vh;
            display: flex; flex-direction: column;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .main-content { flex-grow: 1; width: 100%; padding-bottom: 40px; }

        /* ══════════════════════════════════════════════════
           HEADER
        ══════════════════════════════════════════════════ */
        .header-caman {
            position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(135deg, var(--t-h1) 0%, var(--t-h2) 100%);
            border-bottom: 2px solid var(--t-hborder);
            padding: 10px 20px;
            z-index: 1050;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .brand-section { display:flex; align-items:center; gap:14px; min-width:0; }
        .header-caman img { height:44px; }
        .header-title-wrap { display:flex; flex-direction:column; gap:1px; }
        .header-label { font-family:'Share Tech Mono', monospace; font-size:.6rem; color:var(--t-accent); letter-spacing:3px; text-transform:uppercase; opacity:.8; }
        .header-title { font-family:'Orbitron', sans-serif; font-weight:700; font-size:1rem; margin:0; letter-spacing:2px; color:var(--t-header-text); white-space:nowrap; }

        /* ── Botón Tema y Usuario ── */
        .controls-section { display: flex; align-items: center; gap: 15px; }
        .btn-theme { background: transparent; border: 1px solid var(--t-accent); color: var(--t-accent); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .btn-theme:hover { background: var(--t-accent); color: var(--t-h1); }
        
        .user-section { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
        #userName { font-family:'Share Tech Mono', monospace; font-size:.78rem; color:var(--t-accent); white-space:nowrap; }
        .btn-logout { font-family:'Share Tech Mono', monospace; font-size:.7rem; padding:3px 14px; border-radius:3px; font-weight:600; letter-spacing:1px; border:1px solid var(--t-accent); color:var(--t-accent); background:transparent; transition:all .2s; cursor:pointer; }
        .btn-logout:hover { background:var(--t-accent); color:var(--t-h1); }

        /* ══════════════════════════════════════════════════
           COMPONENTES GENERALES
        ══════════════════════════════════════════════════ */
        .card-custom { background: var(--t-card); border: 1px solid var(--t-border); border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: background 0.3s; }
        .form-control-custom { background: var(--t-input-bg)!important; border: 1px solid var(--t-border)!important; color: var(--t-text)!important; font-family:'Share Tech Mono', monospace; transition: all 0.2s; }
        .form-control-custom:focus { border-color: var(--t-accent)!important; box-shadow: 0 0 0 3px rgba(45,125,210,0.15)!important; outline: none; }
        .btn-primary-custom { background: var(--t-accent); border: none; color: #fff; font-family:'Orbitron', sans-serif; letter-spacing:1px; border-radius: 3px; }
        .btn-primary-custom:hover { filter: brightness(1.1); color: #fff; }

        /* ══════════════════════════════════════════════════
           TABLA
        ══════════════════════════════════════════════════ */
        .filter-bar { background: var(--t-input-bg); border-bottom: 1px solid var(--t-border); padding: 12px 16px; }
        .table-custom { margin:0; width:100%; border-collapse: separate; border-spacing: 0; }
        .table-custom thead th { background: transparent; color: var(--t-text-muted); font-family:'Share Tech Mono', monospace; font-size:.75rem; text-transform:uppercase; letter-spacing:2px; border-bottom: 2px solid var(--t-border); padding:14px 16px; font-weight:600; }
        .table-custom tbody tr { transition:background .2s; }
        .table-custom tbody tr:hover { background: var(--t-table-hover); }
        .table-custom tbody td { padding:12px 16px; vertical-align:middle; border-bottom:1px solid var(--t-border); color: var(--t-text); }
        .td-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 600; }
        .td-sub { font-family:'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--t-accent); }

        /* Badges */
        .badge-vigente  { background:rgba(40, 167, 69, 0.1); border:1px solid #28a745; color:#28a745; font-family:'Share Tech Mono', monospace; font-size:.68rem; letter-spacing:1px; padding:4px 10px; border-radius:4px; }
        .badge-pronto   { background:rgba(255, 193, 7, 0.1); border:1px solid #ffc107; color:#d39e00; font-family:'Share Tech Mono', monospace; font-size:.68rem; letter-spacing:1px; padding:4px 10px; border-radius:4px; }
        .badge-vencido  { background:rgba(220, 53, 69, 0.1); border:1px solid #dc3545; color:#dc3545; font-family:'Share Tech Mono', monospace; font-size:.68rem; letter-spacing:1px; padding:4px 10px; border-radius:4px; }

        .vence-3-meses td:first-child { border-left:4px solid #ffc107; }
        .vencido td:first-child { border-left:4px solid #dc3545; }

        /* Acciones */
        .btn-accion { width:28px; height:28px; border-radius:3px; display:inline-flex; align-items:center; justify-content:center; font-size:.78rem; cursor:pointer; border:1px solid; background: transparent; }
        .btn-eliminar { border-color: #dc3545; color: #dc3545; }
        .btn-eliminar:hover { background: #dc3545; color: #fff; }
        .btn-editar   { border-color: #28a745; color: #28a745; }
        .btn-editar:hover   { background: #28a745; color: #fff; }
        .acciones-wrap { display:flex; align-items:center; justify-content:center; gap:6px; }

        .hidden { display:none!important; }
    </style>
</head>
<body>

<header class="header-caman">
    <div class="brand-section">
        <img src="https://www.fac.mil.co/sites/default/files/gallery/unidadesaereas/caman-logo.png" alt="CAMAN">
        <div class="header-title-wrap d-none d-sm-flex">
            <span class="header-label">Fuerza Aérea Colombiana</span>
            <h1 class="header-title">CONTROL DE ENTRENAMIENTO</h1>
        </div>
    </div>

    <div class="controls-section">
        <button id="themeToggle" class="btn-theme" onclick="toggleTheme()" title="Cambiar Tema">
            <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>

        <div id="userInfo" class="user-section hidden">
            <span id="userName">Cargando...</span>
            <button onclick="signOut()" class="btn-logout"><i class="bi bi-box-arrow-right me-1"></i>SALIR</button>
        </div>
    </div>
</header>

<main class="main-content container">

    <div id="authSection" class="card-custom mx-auto p-5 mt-5" style="max-width:400px;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill" style="font-size: 2.5rem; color: var(--t-accent);"></i>
            <h5 class="mt-2" style="font-family:'Orbitron', sans-serif;">Acceso al Sistema</h5>
        </div>
        <input type="email"    id="email"    class="form-control form-control-lg mb-3 form-control-custom" placeholder="Correo institucional">
        <input type="password" id="password" class="form-control form-control-lg mb-4 form-control-custom" placeholder="Contraseña">
        <button onclick="signIn()" id="loginBtn" class="btn btn-lg w-100 btn-primary-custom">ENTRAR</button>
    </div>

    <div id="mainSection" class="hidden mt-4">

        <div class="card-custom p-4 mb-4">
            <div style="font-family:'Share Tech Mono', monospace; font-size:.8rem; color:var(--t-text-muted); margin-bottom: 10px;"><i class="bi bi-cloud-download me-1"></i> TRAER REGISTROS DE BASE DE DATOS</div>
            <div class="input-group input-group-lg">
                <input type="text" id="searchCedula" class="form-control form-control-custom" placeholder="Ingrese número de cédula exacto...">
                <button onclick="fetchData()" class="btn btn-primary-custom px-4">BUSCAR</button>
            </div>
        </div>

        <div id="adminForm" class="card-custom p-4 mb-4 hidden border-primary">
            <div style="font-family:'Share Tech Mono', monospace; font-size:.8rem; color:var(--t-accent); margin-bottom: 15px;">
                <i class="bi bi-pencil-square me-1"></i> <span id="adminFormTitle">REGISTRAR NUEVO CURSO</span>
            </div>

            <div id="editBanner" class="hidden align-items-center mb-3 p-2 rounded" style="background: rgba(220,53,69,0.1); border: 1px solid #dc3545;">
                <i class="bi bi-exclamation-circle-fill text-danger me-2"></i>
                <span class="text-danger" style="font-size: 0.85rem;">Editando ID: <strong id="editIdLabel"></strong></span>
                <button class="btn btn-sm btn-danger ms-auto py-0" onclick="cancelEdit()">Cancelar</button>
            </div>

            <input type="hidden" id="inId">
            <div class="row g-3">
                <div class="col-12 col-md-2">
                    <input type="text" id="inCedula" class="form-control form-control-custom" placeholder="Cédula">
                </div>
                <div class="col-12 col-md-3">
                    <input type="text" id="inNombre" class="form-control form-control-custom" placeholder="Nombre (Ej. R. Arias)">
                </div>
                <div class="col-12 col-md-3">
                    <input type="text" id="inCurso" class="form-control form-control-custom" placeholder="Nombre de la Capacitación">
                </div>
                <div class="col-6 col-md-2">
                    <label class="small text-muted mb-1" style="font-family:'Share Tech Mono', monospace;">Realización</label>
                    <input type="date" id="inFecha" class="form-control form-control-custom">
                </div>
                <div class="col-6 col-md-2">
                    <label class="small text-muted mb-1" style="font-family:'Share Tech Mono', monospace;">Vencimiento</label>
                    <input type="date" id="inVence" class="form-control form-control-custom">
                </div>
                <div class="col-12 mt-3">
                    <button onclick="saveData()" id="btnGuardar" class="btn btn-primary-custom w-100 py-2">
                        <i class="bi bi-save me-1"></i> GUARDAR REGISTRO
                    </button>
                </div>
            </div>
        </div>

        <div class="card-custom overflow-hidden">
            <div class="filter-bar">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-funnel"></i></span>
                    <input type="text" id="localSearch" class="form-control form-control-custom border-0 shadow-none" placeholder="Filtrar resultados por cédula, nombre o capacitación..." onkeyup="filterTable()">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th class="ps-4">Cédula y Nombre</th>
                            <th>Capacitación</th>
                            <th>Vencimiento</th>
                            <th>Estado</th>
                            <th id="thAcciones" class="hidden text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr>
                            <td colspan="5" class="text-center py-5 text-muted" style="font-family:'Share Tech Mono', monospace;">
                                <i class="bi bi-database me-2"></i> ESPERANDO CONSULTA
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    /* ══════════ SUPABASE ══════════ */
    const SUPABASE_URL = 'https://yfbfbywjwslxsrgamqhj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_PXth9Sd24jgQOizXrmk5Tw_YVJh4V6j';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let sessionUser = null;
    let isAdmin     = false;
    let editingId   = null;

    /* ══════════ TEMA CLARO/OSCURO ══════════ */
    const THEME_KEY = 'caman_theme_v2';
    
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem(THEME_KEY, theme);
        const icon = document.getElementById('themeIcon');
        icon.className = theme === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
    }

    // Cargar tema guardado
    const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
    applyTheme(savedTheme);

    /* ══════════ AUTH ══════════ */
    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = 'VERIFICANDO...';
        btn.disabled = true;

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            alert("Error: " + error.message);
            btn.innerHTML = 'ENTRAR'; btn.disabled = false; return;
        }
        sessionUser = data.user;
        await checkUserRole();
    }

    async function checkUserRole() {
        const { data } = await _supabase
            .from('entrenamientos_usuarios').select('es_admin, nombre')
            .eq('email', sessionUser.email).single();

        if (data) {
            isAdmin = data.es_admin;
            document.getElementById('userName').innerHTML = `${data.nombre} [${isAdmin ? 'ADMIN' : 'USER'}]`;
            renderUI();
        } else {
            document.getElementById('loginBtn').innerHTML = 'ENTRAR'; 
            document.getElementById('loginBtn').disabled = false;
        }
    }

    function renderUI() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        if (isAdmin) {
            document.getElementById('adminForm').classList.remove('hidden');
            document.getElementById('thAcciones').classList.remove('hidden');
        }
    }

    async function signOut() {
        await _supabase.auth.signOut();
        location.reload();
    }

    /* ══════════ FILTRO LOCAL ══════════ */
    function filterTable() {
        const term = document.getElementById('localSearch').value.toLowerCase();
        const rows = document.querySelectorAll('#dataTable tr.data-row');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(term) ? '' : 'none';
        });
    }

    /* ══════════ CRUD ══════════ */
    async function fetchData() {
        const cedula = document.getElementById('searchCedula').value;
        if (!cedula) return;

        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-primary">Cargando datos...</td></tr>';
        document.getElementById('localSearch').value = ''; // Limpiar filtro al buscar

        const { data, error } = await _supabase.from('entrenamientos').select('*')
            .eq('cedula', cedula).order('fecha_vencimiento', { ascending: true });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">ERROR: ${error.message}</td></tr>`;
            return;
        }
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No hay registros para esta cédula.</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.className = "data-row"; // Clase necesaria para el filtro local
            
            const s = getStatusInfo(row.fecha_vencimiento);
            if (s.class) tr.classList.add(s.class);

            const accionesHtml = isAdmin ? `
                <td class="text-center">
                    <div class="acciones-wrap">
                        <button class="btn-accion btn-editar" onclick='startEdit(${JSON.stringify(row).replace(/'/g, "\\'").replace(/"/g, '&quot;')})' title="Editar"><i class="bi bi-pencil-fill"></i></button>
                        <button class="btn-accion btn-eliminar" onclick="deleteRecord('${row.id}')" title="Eliminar"><i class="bi bi-trash3-fill"></i></button>
                    </div>
                </td>` : '';

            // Renderizamos Cedula y Nombre en la misma celda
            tr.innerHTML = `
                <td class="ps-4">
                    <div class="td-sub"><i class="bi bi-person-vcard me-1"></i> ${row.cedula}</div>
                    <div class="td-title mt-1">${row.nombre || 'Sin Nombre Registrado'}</div>
                </td>
                <td class="td-title">${row.curso}</td>
                <td class="td-sub"><i class="bi bi-calendar-event me-1 text-muted"></i>${row.fecha_vencimiento}</td>
                <td><span class="${s.badgeClass}">${s.text}</span></td>
                ${accionesHtml}
            `;
            tbody.appendChild(tr);
        });
    }

    /* ── Iniciar Edición ── */
    function startEdit(row) {
        editingId = row.id;
        document.getElementById('inId').value     = row.id;
        document.getElementById('inCedula').value = row.cedula || '';
        document.getElementById('inNombre').value = row.nombre || '';
        document.getElementById('inCurso').value  = row.curso  || '';
        document.getElementById('inFecha').value  = row.fecha_realizacion || '';
        document.getElementById('inVence').value  = row.fecha_vencimiento || '';

        document.getElementById('editIdLabel').textContent    = row.id;
        document.getElementById('adminFormTitle').textContent = 'MODIFICAR CURSO EXISTENTE';
        document.getElementById('editBanner').classList.remove('hidden');
        document.getElementById('editBanner').classList.add('d-flex');
        document.getElementById('btnGuardar').innerHTML       = '<i class="bi bi-arrow-repeat me-1"></i> ACTUALIZAR REGISTRO';

        document.getElementById('adminForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Cancelar Edición ── */
    function cancelEdit() {
        editingId = null;
        ['inId','inCedula','inNombre','inCurso','inFecha','inVence'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('adminFormTitle').textContent = 'REGISTRAR NUEVO CURSO';
        document.getElementById('editBanner').classList.add('hidden');
        document.getElementById('editBanner').classList.remove('d-flex');
        document.getElementById('btnGuardar').innerHTML = '<i class="bi bi-save me-1"></i> GUARDAR REGISTRO';
    }

    /* ── Guardar Datos ── */
    async function saveData() {
        const payload = {
            cedula:            document.getElementById('inCedula').value,
            nombre:            document.getElementById('inNombre').value,
            curso:             document.getElementById('inCurso').value,
            fecha_realizacion: document.getElementById('inFecha').value,
            fecha_vencimiento: document.getElementById('inVence').value
        };

        if(!payload.cedula || !payload.curso || !payload.fecha_vencimiento) {
            alert("Complete los campos requeridos (Cédula, Curso, Vencimiento).");
            return;
        }

        let error;
        if (editingId) {
            ({ error } = await _supabase.from('entrenamientos').update(payload).eq('id', editingId));
        } else {
            ({ error } = await _supabase.from('entrenamientos').insert([payload]));
        }

        if (error) { alert(error.message); return; }
        cancelEdit();
        
        // Forzar recarga de los datos de la misma cédula que se guardó
        document.getElementById('searchCedula').value = payload.cedula;
        fetchData();
    }

    /* ── Eliminar ── */
    async function deleteRecord(id) {
        if (confirm("¿Confirmar eliminación de este registro?")) {
            await _supabase.from('entrenamientos').delete().eq('id', id);
            if (editingId === id) cancelEdit();
            fetchData();
        }
    }

    /* ── Estado ── */
    function getStatusInfo(fecha) {
        const hoy = new Date(), vence = new Date(fecha);
        const diff = (vence - hoy) / (1000 * 60 * 60 * 24);
        if (vence < hoy) return { class:'vencido',       badgeClass:'badge-vencido', text:'VENCIDO' };
        if (diff  <= 90) return { class:'vence-3-meses', badgeClass:'badge-pronto',  text:'VENCE PRONTO' };
        return                  { class:'',               badgeClass:'badge-vigente', text:'VIGENTE' };
    }
</script>
</body>
</html>
