<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Explorador Global 3D</title>
  <script src="//unpkg.com/globe.gl"></script>
  <style>
    body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
    #globeViz { position: absolute; top: 0; }
    
    /* Botón Hamburguesa - Más grande para dedos */
    .menu-toggle {
      display: none; position: absolute; top: 15px; right: 15px; z-index: 100;
      background: #222; border: 1px solid #555; color: white; 
      padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 24px;
    }

    /* Menú Lateral */
    .ui-overlay {
      position: absolute; top: 20px; right: 20px; z-index: 90;
      display: flex; flex-direction: column; gap: 10px;
      background: rgba(0, 0, 0, 0.95); padding: 20px; border-radius: 12px; border: 1px solid #444;
      width: 200px; transition: all 0.3s ease-in-out;
    }

    button {
      padding: 12px; background: #222; color: #eee; border: 1px solid #555;
      border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500;
    }

    /* Etiquetas Océanos con fondo legible */
    .ocean-label {
      background: rgba(0, 0, 0, 0.8); padding: 4px 10px; border-radius: 4px;
      font-size: 13px; color: #00f2ff; border: 1px solid rgba(0, 242, 255, 0.5);
      white-space: nowrap; pointer-events: none; font-weight: bold;
    }

    /* --- AJUSTES PARA MÓVILES --- */
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      
      .ui-overlay { 
        position: fixed; top: 0; right: -100%; /* Totalmente fuera a la derecha */
        height: 100vh; width: 220px; 
        border-radius: 15px 0 0 15px;
        padding-top: 80px; box-sizing: border-box;
      }
      
      .ui-overlay.active { right: 0; } /* Se desliza al centro */
      
      button { font-size: 18px; padding: 15px; } /* Botones más grandes */
      
      .ocean-label { font-size: 16px; padding: 6px 12px; }
    }
  </style>
</head>

<body>
  <div id="globeViz"></div>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <div class="ui-overlay" id="mainMenu">
    <button onclick="navigate('regiones')">Regiones Colombia</button>
    <button onclick="navigate('oceanos')">Océanos y Mares</button>
    <button onclick="navigate('fronteras')">Fronteras Mundo</button>
    <hr style="width:100%; border: 0.5px solid #444;">
    <button onclick="resetView()" style="background: #0051a8;">🔄 Reset y Girar</button>
  </div>

  <script>
    const oceanosData = [
      { lat: 15, lng: -120, name: "Pacífico Norte" }, { lat: -30, lng: -140, name: "Pacífico Sur" },
      { lat: 25, lng: -45, name: "Atlántico Norte" }, { lat: -25, lng: -25, name: "Atlántico Sur" },
      { lat: -15, lng: 75, name: "Océano Índico" }, { lat: 80, lng: 0, name: "Océano Ártico" },
      { lat: -70, lng: 0, name: "Océano Antártico" }, { lat: 37, lng: 18, name: "Mar Mediterráneo" },
      { lat: 15, lng: -75, name: "Mar Caribe" }, { lat: 20, lng: 115, name: "Mar de China" },
      { lat: 25, lng: 38, name: "Mar Rojo" }, { lat: 42, lng: 32, name: "Mar Negro" }
    ];

    const regionesCOL = [
        { name: "Caribe", color: "#fdb462", lat: 10.5, lng: -74.5 },
        { name: "Andina", color: "#fb8072", lat: 5.5, lng: -75.2 },
        { name: "Pacífica", color: "#80b1d3", lat: 5, lng: -77.3 },
        { name: "Amazonía", color: "#4daf4a", lat: -0.5, lng: -71.5 },
        { name: "Orinoquía", color: "#b3de69", lat: 4, lng: -70.5 },
        { name: "Insular", color: "#bc80bd", lat: 12.5, lng: -81.7 }
    ];

    let worldData = null;

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .pointAltitude(0)
      .htmlElementsData([])
      .htmlElement(d => {
        const el = document.createElement('div');
        el.innerHTML = d.name;
        el.className = 'ocean-label';
        return el;
      })
      .polygonCapColor(() => 'rgba(0, 100, 255, 0.1)')
      .polygonSideColor(() => 'rgba(255, 255, 255, 0.05)')
      .polygonStrokeColor(() => '#888')
      .polygonLabel(({ properties: d }) => `
        <div style="background: rgba(0,0,0,0.9); padding: 8px; border-radius: 5px; border: 1px solid #0066ff; color: white; font-size: 16px;">
          <b>${d.NAME || d.name}</b>
        </div>
      `);

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    function toggleMenu() { 
      document.getElementById('mainMenu').classList.toggle('active'); 
    }

    function navigate(view) {
      world.controls().autoRotate = false;
      world.pointsData([]).htmlElementsData([]).polygonsData([]);
      
      const isMobile = window.innerWidth < 768;
      if (isMobile) document.getElementById('mainMenu').classList.remove('active');
      
      if (view === 'regiones') {
        world.pointsData(regionesCOL)
             .pointColor(d => d.color)
             .pointRadius(isMobile ? 0.7 : 1.2)
             .pointLabel(d => d.name);
        world.pointOfView({ lat: 4.5, lng: -74, altitude: 0.5 }, 1000);
      } 
      else if (view === 'oceanos') {
        world.htmlElementsData(oceanosData);
        world.pointOfView({ lat: 15, lng: -40, altitude: 2.5 }, 1000);
      } 
      else if (view === 'fronteras') {
        if (worldData) {
          world.polygonsData(worldData.features);
        } else {
          fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(geo => {
              worldData = geo;
              world.polygonsData(geo.features);
            });
        }
        world.pointOfView({ lat: 4.5, lng: -74, altitude: 2 }, 1000);
      }
    }

    function resetView() {
      world.pointsData([]).htmlElementsData([]).polygonsData([]);
      world.controls().autoRotate = true;
      world.pointOfView({ lat: 0, lng: 0, altitude: 2.5 }, 1000);
    }
  </script>
</body>
</html>
