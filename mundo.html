<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Explorador Global Dinámico</title>
  <script src="//unpkg.com/globe.gl"></script>
  <style>
    body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
    #globeViz { position: absolute; top: 0; }
    .ui-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      display: flex; flex-direction: column; gap: 10px;
      background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 12px; border: 1px solid #444;
    }
    button {
      padding: 12px 20px; background: #222; color: #eee; border: 1px solid #555;
      border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 14px; text-align: left;
    }
    button:hover { background: #444; border-color: #0066ff; }
    .info-panel {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px;
      max-width: 300px; display: none; border: 1px solid #0066ff;
    }
  </style>
</head>

<body>
  <div id="globeViz"></div>

  <div class="ui-overlay">
    <h2 style="margin:0 0 10px 0; font-size: 18px;">Explorador de Manuel</h2>
    <button onclick="navigate('regiones')">🇨🇴 Regiones de Colombia</button>
    <button onclick="navigate('oceanos')">🌊 Océanos y Mares</button>
    <button onclick="navigate('fronteras')">🗺️ Fronteras</button>
    <hr style="width:100%; border: 0.5px solid #444;">
    <button onclick="resetView()" style="background: #0051a8; font-weight: bold;">🔄 Resetear</button>
  </div>

  <div id="info" class="info-panel"></div>

  <script>
    const dataOceanos = [
      { lat: -15, lng: -140, name: "Océano Pacífico", color: "cyan" },
      { lat: 25, lng: -45, name: "Océano Atlántico", color: "cyan" },
      { lat: 36, lng: 18, name: "Mar Mediterráneo", color: "cyan" },
      { lat: 15, lng: -75, name: "Mar Caribe", color: "cyan" },
      { lat: -20, lng: 80, name: "Océano Índico", color: "cyan" }
    ];

    const regionesCOL = [
        { name: "Caribe", color: "#fdb462", lat: 11, lng: -75 },
        { name: "Andina", color: "#fb8072", lat: 4.5, lng: -75.5 },
        { name: "Pacífica", color: "#80b1d3", lat: 5, lng: -77 },
        { name: "Amazonía", color: "#4daf4a", lat: 0, lng: -72 },
        { name: "Orinoquía", color: "#b3de69", lat: 4, lng: -70 },
        { name: "Insular", color: "#bc80bd", lat: 12.5, lng: -81.7 }
    ];

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .labelsData([])
      .labelLat(d => d.lat)
      .labelLng(d => d.lng)
      .labelText(d => d.name)
      .labelSize(1.6)
      .labelDotRadius(0.8)
      .labelColor(d => d.color)
      .labelResolution(2);

    // Configuración de rotación inicial
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.6;

    function navigate(view) {
      // DETENER ROTACIÓN al elegir una opción
      world.controls().autoRotate = false;
      
      history.pushState({ view: view }, "", "#" + view);
      renderView(view);
    }

    window.onpopstate = (event) => {
      const view = event.state ? event.state.view : 'main';
      if (view === 'main') resetView();
      else renderView(view);
    };

    function renderView(view) {
      world.labelsData([]); 
      world.ringsData([]);
      document.getElementById('info').style.display = 'none';

      if (view === 'regiones') {
        world.labelsData(regionesCOL);
        world.pointOfView({ lat: 4.5, lng: -74, altitude: 1.5 }, 1000);
      } else if (view === 'oceanos') {
        world.labelsData(dataOceanos);
        world.pointOfView({ lat: 20, lng: -30, altitude: 2.5 }, 1000);
      } else if (view === 'fronteras') {
        world.ringsData([{ lat: 4.5, lng: -74 }]);
        document.getElementById('info').innerHTML = "<h3>Fronteras</h3><p>Límites terrestres y marítimos de Colombia.</p>";
        document.getElementById('info').style.display = 'block';
        world.pointOfView({ lat: 4.5, lng: -74, altitude: 1.8 }, 1000);
      }
    }

    function resetView() {
      history.pushState({ view: 'main' }, "", "#");
      world.labelsData([]);
      world.ringsData([]);
      document.getElementById('info').style.display = 'none';
      
      // VOLVER A GIRAR al resetear
      world.controls().autoRotate = true;
      world.pointOfView({ lat: 0, lng: 0, altitude: 2.5 }, 1000);
    }
  </script>
</body>
</html>
