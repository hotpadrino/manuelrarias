<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Explorador Global 3D</title>
  <script src="//unpkg.com/globe.gl"></script>
  <style>
    body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
    #globeViz { position: absolute; top: 0; }
    
    /* Botón Hamburguesa */
    .menu-toggle {
      display: none; position: absolute; top: 15px; right: 15px; z-index: 100;
      background: #222; border: 1px solid #555; color: white; 
      padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 20px;
    }

    /* Menú Lateral Derecho */
    .ui-overlay {
      position: absolute; top: 20px; right: 20px; z-index: 90;
      display: flex; flex-direction: column; gap: 10px;
      background: rgba(0, 0, 0, 0.95); padding: 20px; border-radius: 12px; border: 1px solid #444;
      width: 190px; transition: transform 0.3s ease-in-out;
    }

    button {
      padding: 12px; background: #222; color: #eee; border: 1px solid #555;
      border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #444; border-color: #0066ff; }

    /* Etiquetas de Océanos con fondo oscuro para legibilidad */
    .ocean-label {
      background: rgba(0, 0, 0, 0.7); padding: 3px 8px; border-radius: 4px;
      font-size: 12px; color: #00f2ff; border: 1px solid rgba(0, 242, 255, 0.4);
      white-space: nowrap; pointer-events: none; font-weight: bold;
    }

    /* Panel de información detallada (de regiones.htm) */
    .info-panel {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px;
      max-width: 280px; display: none; border: 1px solid #0066ff; z-index: 80;
    }

    /* --- AJUSTES PARA MÓVILES --- */
    @media (max-width: 768px) {
      .menu-toggle { display: block; } /* Mostrar hamburguesa */
      
      .ui-overlay { 
        right: 0; top: 0; height: auto;
        width: 170px; padding: 60px 15px 20px 15px;
        border-radius: 0 0 0 15px;
        transform: translateX(110%); /* Esconder menú */
      }
      .ui-overlay.active { transform: translateX(0); } /* Mostrar al activar */
      
      button { font-size: 13px; padding: 10px; }
      .info-panel { bottom: 10px; left: 10px; right: 10px; max-width: none; font-size: 14px; }
    }
  </style>
</head>

<body>
  <div id="globeViz"></div>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <div class="ui-overlay" id="mainMenu">
    <button onclick="navigate('regiones')">Regiones Colombia</button>
    <button onclick="navigate('oceanos')">Océanos y Mares</button>
    <button onclick="navigate('fronteras')">Fronteras Mundo</button>
    <hr style="width:100%; border: 0.5px solid #444; margin: 5px 0;">
    <button onclick="resetView()" style="background: #0051a8;">🔄 Reset y Girar</button>
  </div>

  <div id="info" class="info-panel"></div>

  <script>
    // Datos de océanos con etiquetas constantes
    const oceanosData = [
      { lat: 15, lng: -120, name: "Pacífico Norte" }, { lat: -30, lng: -140, name: "Pacífico Sur" },
      { lat: 25, lng: -45, name: "Atlántico Norte" }, { lat: -25, lng: -25, name: "Atlántico Sur" },
      { lat: -15, lng: 75, name: "Océano Índico" }, { lat: 80, lng: 0, name: "Océano Ártico" },
      { lat: -70, lng: 0, name: "Océano Antártico" }, { lat: 37, lng: 18, name: "Mar Mediterráneo" },
      { lat: 15, lng: -75, name: "Mar Caribe" }, { lat: 20, lng: 115, name: "Mar de China" },
      { lat: 25, lng: 38, name: "Mar Rojo" }, { lat: 42, lng: 32, name: "Mar Negro" }
    ];

    // Datos extraídos de regiones.htm
    const regionesCOL = [
        { name: "Caribe", color: "#fdb462", lat: 10.5, lng: -74.5, rel: "Llanuras costeras y Sierra Nevada", bio: "Manglares, sabanas, zonas secas", eco: "Turismo, ganadería, minería" },
        { name: "Andina", color: "#fb8072", lat: 5.5, lng: -75.2, rel: "Cordilleras de los Andes", bio: "Alta por pisos térmicos", eco: "Agricultura, industria, comercio" },
        { name: "Pacífica", color: "#80b1d3", lat: 5, lng: -77.3, rel: "Selva húmeda y costa", bio: "Muy alta (Chocó biogeográfico)", eco: "Pesca, minería, madera" },
        { name: "Amazonía", color: "#4daf4a", lat: -0.5, lng: -71.5, rel: "Selva tropical plana", bio: "Extremadamente alta", eco: "Recursos forestales, ecoturismo" },
        { name: "Orinoquía", color: "#b3de69", lat: 4, lng: -70.5, rel: "Llanuras (Llanos Orientales)", bio: "Fauna de sabana", eco: "Ganadería, petróleo" },
        { name: "Insular", color: "#bc80bd", lat: 12.5, lng: -81.7, rel: "Islas y cayos", bio: "Ecosistemas marinos", eco: "Turismo" }
    ];

    let worldData = null;

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .pointAltitude(0)
      .htmlElementsData([])
      .htmlElement(d => {
        const el = document.createElement('div');
        el.innerHTML = d.name;
        el.className = 'ocean-label';
        return el;
      })
      .polygonCapColor(() => 'rgba(0, 100, 255, 0.1)')
      .polygonSideColor(() => 'rgba(255, 255, 255, 0.05)')
      .polygonStrokeColor(() => '#888')
      .polygonLabel(({ properties: d }) => `
        <div style="background: rgba(0,0,0,0.9); padding: 8px; border-radius: 5px; border: 1px solid #0066ff; color: white;">
          <b>${d.NAME || d.name}</b>
        </div>
      `)
      .onPointClick(d => {
        if(d.rel) showInfo(d.name, `<b>Relieve:</b> ${d.rel}<br><b>Biodiversidad:</b> ${d.bio}<br><b>Economía:</b> ${d.eco}`);
      });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    function toggleMenu() { document.getElementById('mainMenu').classList.toggle('active'); }

    function navigate(view) {
      world.controls().autoRotate = false;
      world.pointsData([]).htmlElementsData([]).polygonsData([]);
      
      // Ocultar el panel de información al cambiar de vista
      document.getElementById('info').style.display = 'none';
      
      const isMobile = window.innerWidth < 768;
      if (isMobile) document.getElementById('mainMenu').classList.remove('active');
      
      if (view === 'regiones') {
        world.pointsData(regionesCOL)
             .pointColor(d => d.color)
             .pointRadius(isMobile ? 0.8 : 1.5)
             .pointLabel(d => d.name);
        world.pointOfView({ lat: 4.5, lng: -74, altitude: 1.5 }, 1000);
      } 
      else if (view === 'oceanos') {
        world.htmlElementsData(oceanosData);
        world.pointOfView({ lat: 15, lng: -40, altitude: 2.5 }, 1000);
      } 
      else if (view === 'fronteras') {
        if (worldData) {
          world.polygonsData(worldData.features);
        } else {
          fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(geo => { worldData = geo; world.polygonsData(geo.features); });
        }
        world.pointOfView({ lat: 4.5, lng: -74, altitude: 2 }, 1000);
      }
    }

    function resetView() {
      world.pointsData([]).htmlElementsData([]).polygonsData([]);
      document.getElementById('info').style.display = 'none';
      world.controls().autoRotate = true;
      world.pointOfView({ lat: 0, lng: 0, altitude: 2.5 }, 1000);
    }

    function showInfo(title, html) {
      const panel = document.getElementById('info');
      panel.innerHTML = `<h3 style="margin:0 0 8px 0; color:#00f2ff">${title}</h3>${html}`;
      panel.style.display = 'block';
    }
  </script>
</body>
</html>
